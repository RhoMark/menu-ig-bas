function SetupView({state, update, updateProfile, onDone}) {
  const [step, setStep] = useState(0);
  const p = state.profile;

  const addMember = () => {
    const newId = (p.members.at(-1)?.id || 0) + 1;
    updateProfile({members: [...p.members, {id:newId, name:`Membre ${p.members.length+1}`, birthYear: new Date().getFullYear() - 30, sex:"F"}]});
  };
  const updateMember = (id, patch) => {
    updateProfile({members: p.members.map(m => m.id === id ? {...m, ...patch} : m)});
  };
  const removeMember = (id) => {
    if (p.members.length <= 1) return;
    updateProfile({members: p.members.filter(m => m.id !== id)});
  };

  const steps = [
    {title:"La famille", content: (
      <div className="space-y-3">
        <p className="text-slate-600 dark:text-slate-300">Indiquez les membres de la famille. Les quantités des recettes seront ajustées automatiquement selon l'âge.</p>
        {p.members.map(m => (
          <div key={m.id} className="flex flex-wrap gap-2 items-end bg-slate-50 dark:bg-slate-800 p-3 rounded">
            <div className="flex-1 min-w-[160px]">
              <label className="text-xs text-slate-500 dark:text-slate-400 block">Prénom</label>
              <input value={m.name} onChange={e=>updateMember(m.id,{name:e.target.value})}
                className="border rounded px-2 py-1 w-full" />
            </div>
            <div>
              <label className="text-xs text-slate-500 dark:text-slate-400 block">Année de naissance</label>
              <div className="flex items-center gap-2">
                <input type="number" min="1900" max={new Date().getFullYear()} value={m.birthYear || ""}
                  placeholder="Année"
                  onChange={e=>updateMember(m.id,{birthYear:parseInt(e.target.value)||0})}
                  className="border rounded px-2 py-1 w-24" />
                <span className="text-xs text-slate-500 dark:text-slate-400">{memberAge(m)} ans</span>
              </div>
            </div>
            <div>
              <label className="text-xs text-slate-500 dark:text-slate-400 block">Sexe</label>
              <select value={m.sex} onChange={e=>updateMember(m.id,{sex:e.target.value})}
                className="border rounded px-2 py-1">
                <option value="F">F</option><option value="M">M</option><option value="X">Autre</option>
              </select>
            </div>
            <div className="min-w-[200px]">
              <label className="text-xs text-slate-500 dark:text-slate-400 block" title="Détermine le seuil de charge glycémique (CG) journalière. Le profil le plus contraignant gagne pour le foyer.">
                Profil santé <span className="text-slate-400">ⓘ</span>
              </label>
              <select value={m.healthProfile || "healthy"} onChange={e=>updateMember(m.id,{healthProfile:e.target.value})}
                className="border rounded px-2 py-1 w-full">
                {Object.entries(HEALTH_PROFILE_LABELS).map(([key, label]) => (
                  <option key={key} value={key}>{label}</option>
                ))}
              </select>
            </div>
            {p.members.length > 1 && (
              <button onClick={()=>removeMember(m.id)} className="text-red-500 hover:text-red-700 dark:text-red-300 text-sm">Retirer</button>
            )}
          </div>
        ))}
        <button onClick={addMember} className="text-emerald-700 dark:text-emerald-300 hover:text-emerald-900 dark:text-emerald-100 text-sm font-medium">+ Ajouter un membre</button>
        <div className="mt-4">
          <label className="text-sm font-medium block mb-1">Localisation</label>
          <input value={p.location} onChange={e=>updateProfile({location:e.target.value})}
            placeholder="Ex. Lyon, France ou 69002"
            className="border rounded px-3 py-2 w-full" />
          <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">Utilisé pour adapter les ingrédients aux produits disponibles dans votre région.</p>
        </div>
      </div>
    )},
    {title:"Allergies & intolérances", content: (
      <div className="space-y-3">
        <div className="bg-red-50 dark:bg-red-950 border border-red-200 dark:border-red-800 rounded p-3">
          <p className="text-red-800 dark:text-red-200 text-sm font-medium">⚠️ Allergies et intolérances — enjeu de sécurité</p>
          <p className="text-red-700 dark:text-red-300 text-xs mt-1">Les recettes contenant ces éléments seront strictement exclues.</p>
        </div>
        <div className="flex flex-wrap gap-2">
          {dataRef.allergens().map(({id: k, label: v}) => (
            <label key={k} className={`flex items-center gap-2 px-3 py-2 rounded border cursor-pointer ${
              p.globalAllergies.includes(k) ? "bg-red-100 dark:bg-red-900 border-red-400 text-red-800 dark:text-red-200" : "bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700"
            }`}>
              <input type="checkbox" checked={p.globalAllergies.includes(k)}
                onChange={e => updateProfile({
                  globalAllergies: e.target.checked
                    ? [...p.globalAllergies, k]
                    : p.globalAllergies.filter(x => x !== k)
                })} />
              {v}
            </label>
          ))}
        </div>
      </div>
    )},
    {title:"Exclusions (goûts, préférences)", content: (
      <div className="space-y-3">
        <div className="bg-amber-50 dark:bg-amber-950 border border-amber-200 dark:border-amber-800 rounded p-3">
          <p className="text-amber-800 dark:text-amber-200 text-sm font-medium">Exclusions préférentielles</p>
          <p className="text-amber-700 dark:text-amber-300 text-xs mt-1">Ingrédients simplement évités par goût ou conviction. Moins prioritaires que les allergies.</p>
        </div>
        <p className="text-sm text-slate-600 dark:text-slate-300">Listez les ingrédients à éviter (un par ligne) :</p>
        <ExclusionsTextarea value={p.globalExclusions} onChange={(arr) => updateProfile({globalExclusions: arr})} />
      </div>
    )},
    {title:"Budget & contraintes pratiques", content: (
      <div className="space-y-4">
        <div>
          <label className="text-sm font-medium block mb-1">Budget hebdomadaire maximal (€)</label>
          <input type="number" min="0" value={p.budgetWeekly}
            onChange={e=>updateProfile({budgetWeekly: parseInt(e.target.value)||0})}
            className="border rounded px-3 py-2 w-40" />
          <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">Une alerte s'affichera si le menu dépasse ce montant.</p>
        </div>
        <div>
          <label className="text-sm font-medium block mb-1">Temps de préparation max par repas (minutes)</label>
          <input type="number" min="10" max="180" step="5" value={p.maxPrepMinutes}
            onChange={e=>updateProfile({maxPrepMinutes: parseInt(e.target.value)||60})}
            className="border rounded px-3 py-2 w-40" />
        </div>
        <div>
          <label className="text-sm font-medium block mb-2">Équipement disponible</label>
          <div className="flex flex-wrap gap-2">
            {dataRef.equipment().map(eq => (
              <label key={eq.id} className={`flex items-center gap-2 px-3 py-2 rounded border cursor-pointer ${
                p.equipment.includes(eq.id) ? "bg-emerald-100 dark:bg-emerald-900 border-emerald-400 text-emerald-800 dark:text-emerald-200" : "bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700"
              }`}>
                <input type="checkbox" checked={p.equipment.includes(eq.id)}
                  onChange={e => updateProfile({
                    equipment: e.target.checked
                      ? [...p.equipment, eq.id]
                      : p.equipment.filter(x => x !== eq.id)
                  })} />
                {eq.label}
              </label>
            ))}
          </div>
        </div>
      </div>
    )},
  ];

  return (
    <div className="max-w-3xl mx-auto">
      <div className="mb-6">
        <h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100">Bienvenue 👋</h2>
        <p className="text-slate-600 dark:text-slate-300">Quelques minutes pour configurer votre profil familial.</p>
      </div>
      <div className="flex gap-2 mb-6">
        {steps.map((s, i) => (
          <div key={i} className={`flex-1 h-2 rounded ${i <= step ? "bg-emerald-500" : "bg-slate-200 dark:bg-slate-700"}`}></div>
        ))}
      </div>
      <div className="bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 p-6">
        <h3 className="text-lg font-bold text-slate-800 dark:text-slate-100 mb-4">
          Étape {step+1}/{steps.length} — {steps[step].title}
        </h3>
        {steps[step].content}
        <div className="flex justify-between mt-6">
          <button onClick={()=>setStep(Math.max(0, step-1))}
            disabled={step===0}
            className="px-4 py-2 text-slate-600 dark:text-slate-300 hover:text-slate-800 dark:text-slate-100 disabled:opacity-30">
            ← Retour
          </button>
          {step < steps.length-1 ? (
            <button onClick={()=>setStep(step+1)}
              className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-md font-medium">
              Continuer →
            </button>
          ) : (
            <button onClick={onDone}
              className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-md font-medium">
              Générer mon premier menu 🚀
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ----- Menu View -----------------------------------------------------------
function MenuView({state, currentWeek, setCurrentWeek, currentMenu, regenerate, regenerateSlot, toggleLock, replaceSlot, onSelectRecipe, onPrint, onShopping, setAttendance}) {
  const [replacePanel, setReplacePanel] = useState(null); // {day, meal}
  const [attendancePanel, setAttendancePanel] = useState(null); // {day, meal}
  const endOfWeek = addDays(currentWeek, 6);
  const cost = estimateWeekCost(currentMenu, state.profile);
  // Bandeau budget V2.11.0 : 4 paliers selon le ratio cost/budget vs tolérance.
  // - "under"   : ≤ 95% du budget (vert clair, économies)
  // - "ok"      : 95-105% (vert, sur cible)
  // - "soft-over": 105% - (1+tolerance) (ambre, dans la marge)
  // - "hard-over": > (1+tolerance) (rouge, l'optimiseur n'a pas trouvé d'alternative)
  const budgetTier = (() => {
    if (!state.profile.budgetWeekly || state.profile.budgetWeekly <= 0) return null;
    const ratio = cost / state.profile.budgetWeekly;
    const tol  = (state.profile.budgetTolerance ?? 10) / 100;
    if (ratio <= 0.95) return "under";
    if (ratio <= 1.05) return "ok";
    if (ratio <= 1 + tol) return "soft-over";
    return "hard-over";
  })();
  const season = getSeason(currentWeek);
  const profileMeals = getMealsForProfile(state.profile);
  const dessertTime = state.profile.dessertTime || "dinner";

  const hasAny = DAYS.some(d => currentMenu[d]?.breakfast || currentMenu[d]?.lunch || currentMenu[d]?.dinner);

  return (
    <div className="space-y-4">
      <PoolDiagnostic profile={state.profile} currentWeek={currentWeek} />
      <div className="bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 p-4 flex flex-wrap items-center gap-3">
        <div className="flex items-center gap-2">
          <button onClick={()=>setCurrentWeek(addDays(currentWeek,-7))} className="px-2 py-1 bg-slate-100 dark:bg-slate-700 rounded hover:bg-slate-200 dark:hover:bg-slate-600">←</button>
          <div>
            <p className="font-bold text-slate-800 dark:text-slate-100">Semaine du {formatShort(currentWeek)} au {formatShort(endOfWeek)}</p>
            <p className="text-xs text-slate-500 dark:text-slate-400">{SEASON_FR[season]} · {state.profile.members.length} personne{state.profile.members.length>1?"s":""}</p>
          </div>
          <button onClick={()=>setCurrentWeek(addDays(currentWeek,7))} className="px-2 py-1 bg-slate-100 dark:bg-slate-700 rounded hover:bg-slate-200 dark:hover:bg-slate-600">→</button>
        </div>
        <div className="flex-1"></div>
        <div className="flex flex-col items-end">
          {(() => {
            const tierColors = {
              under:       "bg-emerald-100 dark:bg-emerald-900 text-emerald-800 dark:text-emerald-200 border-emerald-300 dark:border-emerald-700",
              ok:          "bg-emerald-100 dark:bg-emerald-900 text-emerald-800 dark:text-emerald-200 border-emerald-300 dark:border-emerald-700",
              "soft-over": "bg-amber-100 dark:bg-amber-900 text-amber-800 dark:text-amber-200 border-amber-300 dark:border-amber-700",
              "hard-over": "bg-red-100 dark:bg-red-900 text-red-800 dark:text-red-200 border-red-300 dark:border-red-700",
            };
            const tierLabels = {
              under:       "Sous le budget ✓",
              ok:          "Pile dans le budget ✓",
              "soft-over": "Légèrement au-dessus (dans la tolérance)",
              "hard-over": "Au-dessus de la tolérance ⚠️ ",
            };
            const tierClass = budgetTier ? tierColors[budgetTier] : "bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 border-slate-300 dark:border-slate-600";
            return (
              <div className={`px-3 py-2 rounded-md text-sm border ${tierClass}`}>
                <div>
                  💰 <strong>{cost.toFixed(2)} €</strong>
                  {state.profile.budgetWeekly > 0 && <span className="opacity-75"> / {state.profile.budgetWeekly} €</span>}
                </div>
                {budgetTier && (
                  <>
                    <div className="text-xs mt-0.5">{tierLabels[budgetTier]}</div>
                    <div className="mt-1 h-1.5 w-40 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                      <div className={`h-full ${
                        budgetTier === "hard-over" ? "bg-red-500" :
                        budgetTier === "soft-over" ? "bg-amber-500" :
                        "bg-emerald-500"
                      }`} style={{width: `${Math.min(100, (cost / state.profile.budgetWeekly) * 100).toFixed(0)}%`}} />
                    </div>
                  </>
                )}
              </div>
            );
          })()}
          {budgetTier === "hard-over" && (
            <div className="text-xs text-red-700 dark:text-red-300 mt-1 max-w-xs text-right">
              L'optimiseur n'a pas trouvé d'alternative moins chère.
              Augmente la tolérance ou élargis la base de recettes.
            </div>
          )}
        </div>
        <button onClick={() => regenerate({keepLocked:true})}
          className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-md text-sm font-medium">
          🔄 Régénérer
        </button>
        <button onClick={onPrint}
          className="bg-slate-700 hover:bg-slate-900 text-white px-4 py-2 rounded-md text-sm font-medium">
          🖨️ Imprimer
        </button>
        <button onClick={onShopping}
          className="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-md text-sm font-medium">
          🛒 Liste de courses
        </button>
      </div>

      {!hasAny && (
        <div className="bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 p-12 text-center">
          <p className="text-slate-600 dark:text-slate-300 mb-4">Aucun menu pour cette semaine.</p>
          <button onClick={() => regenerate({keepLocked:false})}
            className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-md font-medium">
            Générer automatiquement 🎲
          </button>
        </div>
      )}

      {hasAny && (() => {
        const cgTarget = householdCgTarget(state.profile);
        const cgLimitMember = householdCgLimitingMember(state.profile);
        const targetLabel = cgLimitMember
          ? `Cible CG ≤ ${cgTarget.low}/j (${cgLimitMember.name} — ${HEALTH_PROFILE_LABELS[cgLimitMember.healthProfile]})`
          : `Cible CG ≤ ${cgTarget.low}/j (foyer sans contraintes)`;
        return (
        <>
        <div className="bg-emerald-50 dark:bg-emerald-950 border border-emerald-200 dark:border-emerald-800 rounded-lg p-2 text-xs text-emerald-800 dark:text-emerald-200 mb-3" title="Charge glycémique cumulée par jour. Référence Harvard School of Public Health. Le seuil du foyer = MIN des seuils par membre (le profil le plus contraignant gagne).">
          🩺 {targetLabel}
        </div>
        <div className="grid grid-cols-1 md:grid-cols-7 gap-3">
          {DAYS.map((day, idx) => {
            const date = addDays(currentWeek, idx);
            const slot = currentMenu[day] || {};
            const attendance = slot.attendance || {};
            const dayCg = computeDayCg(currentMenu, day, state.profile);
            const tier = dayCgTier(dayCg.covered > 0 ? dayCg.cg : null, cgTarget);
            const tierClass = tier === "low" ? "bg-emerald-600" : tier === "medium" ? "bg-amber-500" : tier === "high" ? "bg-red-600" : "bg-slate-500";
            const tierLabel = tier === "low" ? "OK" : tier === "medium" ? "Modéré" : tier === "high" ? "Élevé" : "?";
            const cgDisplay = dayCg.covered > 0 ? `${dayCg.cg} CG` : "— CG";
            return (
              <div key={day} className="bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                <div className="bg-slate-800 text-white px-3 py-2">
                  <div className="flex items-center justify-between">
                    <p className="font-bold capitalize">{DAYS_SHORT[idx]}</p>
                    <span className={`text-[10px] font-bold text-white px-1.5 py-0.5 rounded ${tierClass}`} title={`Charge glycémique du jour : ${cgDisplay} (tier ${tierLabel}, cible ≤ ${cgTarget.low})`}>
                      {cgDisplay}
                    </span>
                  </div>
                  <p className="text-xs text-slate-300">{formatShort(date)}</p>
                </div>
                <div className="p-2 space-y-2">
                  {profileMeals.map(m => {
                    const recipe = RECIPES.find(r => r.id === slot[m.key]);
                    const locked = slot.locked?.[m.key];
                    const attendees = attendance[m.key];
                    const nAll = state.profile.members.length;
                    const nPresent = attendees == null ? nAll : attendees.length;
                    const partial = attendees != null && nPresent < nAll;
                    const showDessertHere = m.key === dessertTime; // affiche le dessert sous le bon repas
                    const dessertRecipe = showDessertHere ? RECIPES.find(r => r.id === slot.dessert) : null;
                    const dessertLocked = slot.locked?.dessert;
                    const dessertAttendees = attendance.dessert;
                    const dessertNPresent = dessertAttendees == null ? nAll : dessertAttendees.length;
                    const dessertPartial = dessertAttendees != null && dessertNPresent < nAll;
                    return (
                      <div key={m.key} className={`border rounded p-2 text-sm ${locked ? "bg-amber-50 dark:bg-amber-950 border-amber-300 dark:border-amber-700" : "bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700"}`}>
                        <div className="flex items-center justify-between mb-1">
                          <span className="text-xs font-medium text-slate-500 dark:text-slate-400">{m.icon} {m.label}</span>
                          <div className="flex gap-1">
                            <button title={partial ? `${nPresent}/${nAll} présents` : "Présence (tous)"} onClick={()=>setAttendancePanel({day, meal:m.key})} className={`text-xs hover:opacity-70 ${partial ? "text-amber-600 font-bold" : ""}`}>👥{partial ? nPresent : ""}</button>
                            <button title="Verrouiller" onClick={()=>toggleLock(day,m.key)} className="text-xs hover:opacity-70">
                              {locked ? "🔒" : "🔓"}
                            </button>
                            <button title="Remplacer" onClick={()=>setReplacePanel({day, meal:m.key})} className="text-xs hover:opacity-70">🔀</button>
                            <button title="Changer aléatoire" onClick={()=>regenerateSlot(day,m.key)} className="text-xs hover:opacity-70">🎲</button>
                          </div>
                        </div>
                        {recipe ? (
                          <button onClick={() => onSelectRecipe(recipe.id, {day, meal: m.key})}
                            className="text-left w-full hover:text-emerald-700 dark:text-emerald-300 font-medium text-slate-800 dark:text-slate-100">
                            <span className="flex items-start gap-1">
                              <span className="flex-1">{recipe.name}</span>
                              {recipeAdvanceInfo(recipe) && (
                                <span title={`À préparer ${recipeAdvanceInfo(recipe).label}`}
                                      className="text-amber-600 text-sm flex-shrink-0">
                                  {recipeAdvanceInfo(recipe).icon}
                                </span>
                              )}
                            </span>
                            <span className="block text-xs text-slate-500 dark:text-slate-400 font-normal mt-0.5">
                              ⏱ {recipeTimeLabel(recipe)} · {recipe.kcal}kcal
                              {recipeAdvanceInfo(recipe) && (
                                <span className="ml-1 text-amber-700 dark:text-amber-300 font-semibold">· {recipeAdvanceInfo(recipe).shortLabel} avance</span>
                              )}
                            </span>
                          </button>
                        ) : (
                          <p className="text-slate-400 dark:text-slate-500 italic">—</p>
                        )}
                        {/* Sous-panneau dessert attaché à ce repas */}
                        {showDessertHere && (
                          <div className={`mt-2 pt-2 border-t border-dashed ${dessertLocked ? "border-amber-400" : "border-slate-300 dark:border-slate-600"}`}>
                            <div className="flex items-center justify-between mb-0.5">
                              <span className="text-[11px] font-medium text-rose-600">🍰 Dessert</span>
                              <div className="flex gap-1">
                                <button title={dessertPartial ? `${dessertNPresent}/${nAll}` : "Présence (tous)"} onClick={()=>setAttendancePanel({day, meal:"dessert"})} className={`text-xs hover:opacity-70 ${dessertPartial ? "text-amber-600 font-bold" : ""}`}>👥{dessertPartial ? dessertNPresent : ""}</button>
                                <button title="Verrouiller" onClick={()=>toggleLock(day,"dessert")} className="text-xs hover:opacity-70">{dessertLocked ? "🔒" : "🔓"}</button>
                                <button title="Remplacer" onClick={()=>setReplacePanel({day, meal:"dessert"})} className="text-xs hover:opacity-70">🔀</button>
                                <button title="Changer" onClick={()=>regenerateSlot(day,"dessert")} className="text-xs hover:opacity-70">🎲</button>
                              </div>
                            </div>
                            {dessertRecipe ? (
                              <button onClick={() => onSelectRecipe(dessertRecipe.id, {day, meal: "dessert"})}
                                className="text-left w-full hover:text-rose-700 dark:text-rose-300 text-xs text-slate-700 dark:text-slate-200">
                                <span className="flex items-start gap-1">
                                  <span className="flex-1 font-medium">{dessertRecipe.name}</span>
                                  {recipeAdvanceInfo(dessertRecipe) && (
                                    <span title={`À préparer ${recipeAdvanceInfo(dessertRecipe).label}`}
                                          className="text-amber-600 flex-shrink-0">
                                      {recipeAdvanceInfo(dessertRecipe).icon}
                                    </span>
                                  )}
                                </span>
                                <span className="block text-[11px] text-slate-500 dark:text-slate-400 mt-0.5">
                                  ⏱ {recipeTimeLabel(dessertRecipe)} · {dessertRecipe.kcal}kcal
                                  {recipeAdvanceInfo(dessertRecipe) && (
                                    <span className="ml-1 text-amber-700 dark:text-amber-300 font-semibold">· {recipeAdvanceInfo(dessertRecipe).shortLabel} avance</span>
                                  )}
                                </span>
                              </button>
                            ) : (
                              <p className="text-slate-400 dark:text-slate-500 italic text-xs">— aucun dessert</p>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
        </>
        );
      })()}

      {replacePanel && (
        <ReplaceDialog
          day={replacePanel.day}
          meal={replacePanel.meal}
          season={season}
          profile={state.profile}
          currentId={currentMenu[replacePanel.day]?.[replacePanel.meal]}
          onPick={(id) => { replaceSlot(replacePanel.day, replacePanel.meal, id); setReplacePanel(null); }}
          onClose={() => setReplacePanel(null)}
        />
      )}
      {attendancePanel && (
        <AttendanceDialog
          day={attendancePanel.day}
          meal={attendancePanel.meal}
          profile={state.profile}
          current={currentMenu[attendancePanel.day]?.attendance?.[attendancePanel.meal]}

// Helper de recherche : minuscules + suppression d'accents pour rendre le filtre
// indulgent (taper "saumon" matche "Saumon", "saumon" et "saumon fumé"). Mutualisable
// si on veut harmoniser plus tard avec la barre de recherche de LibraryView.
function normalizeForSearch(s) {
  // NFD décompose "é" → "e" + U+0301 (accent aigu combinant). On vire ensuite
  // toute la plage U+0300..U+036F (combining diacritical marks). Résultat :
  // recherche tolérante à l'absence d'accents (ex : "saumon fume" matche
  // "Saumon fumé").
  return (s || "").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function ReplaceDialog({day, meal, season, profile, currentId, onPick, onClose}) {
  const [query, setQuery] = useState("");
  const inputRef = useRef(null);
  // Auto-focus à l'ouverture pour permettre de taper directement sans clic.
  useEffect(() => { inputRef.current?.focus(); }, []);
  // Pool de base : type/saison/allergies/exclusions, indépendant de la recherche
  const basePool = RECIPES.filter(r =>
    r.type === meal &&
    matchesSeason(r, season) &&
    !recipeHasAllergen(r, effectiveAllergies(profile, null)) &&
    !recipeHasExcluded(r, profile.globalExclusions) &&
    r.id !== currentId
  );
  // Filtre par recherche : nom + tags + ingrédients principaux (premiers 5 pour
  // éviter de matcher des items mineurs comme "sel" ou "huile d'olive").
  const q = normalizeForSearch(query.trim());
  const pool = q.length === 0 ? basePool : basePool.filter(r => {
    if (normalizeForSearch(r.name).includes(q)) return true;
    if ((r.tags || []).some(t => normalizeForSearch(t).includes(q))) return true;
    const ings = (r.ing || []).slice(0, 5);
    if (ings.some(([name]) => normalizeForSearch(name).includes(q))) return true;
    return false;
  });
  return (
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white dark:bg-slate-800 rounded-lg shadow-xl border border-slate-200 dark:border-slate-700 p-5 max-w-lg w-full max-h-[80vh] overflow-auto" onClick={e=>e.stopPropagation()}>
        <div className="flex justify-between items-center mb-3">
          <h3 className="text-lg font-bold">Remplacer — {ALL_MEALS.find(m=>m.key===meal).label} de {day}</h3>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-300">✕</button>
        </div>
        {/* V2.18.0 — Barre de recherche : filtre par nom, tags ou ingrédient principal */}
        <div className="relative mb-3">
          <input
            ref={inputRef}
            type="search"
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            placeholder="🔍 Rechercher (nom, ingrédient, tag…)"
            className="w-full border border-slate-300 dark:border-slate-600 rounded-md px-3 py-2 pr-8 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
          />
          {query && (
            <button
              type="button"
              onClick={() => { setQuery(""); inputRef.current?.focus(); }}
              aria-label="Effacer la recherche"
              className="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 text-lg leading-none">
              ✕
            </button>
          )}
        </div>
        <div className="text-xs text-slate-500 dark:text-slate-400 mb-2">
          {pool.length} recette{pool.length > 1 ? "s" : ""} {q && `pour « ${query.trim()} »`} (sur {basePool.length} éligibles)
        </div>
        <div className="space-y-2">
          {pool.map(r => (
            <button key={r.id} onClick={() => onPick(r.id)}
              className="w-full text-left p-3 bg-slate-50 dark:bg-slate-700 hover:bg-emerald-50 dark:hover:bg-emerald-950 hover:border-emerald-300 dark:hover:border-emerald-700 border border-slate-200 dark:border-slate-600 rounded transition">
              <p className="font-medium text-slate-800 dark:text-slate-100">
                {r.name}
                {recipeAdvanceInfo(r) && (
                  <span className="ml-1 text-amber-600" title={`À préparer ${recipeAdvanceInfo(r).label}`}>
                    {recipeAdvanceInfo(r).icon}
                  </span>
                )}
              </p>
              <p className="text-xs text-slate-500 dark:text-slate-400">
                ⏱ {recipeTimeLabel(r)} · {r.kcal}kcal · {recipeEffectiveCost(r).toFixed(2)}€/pers
                {recipeAdvanceInfo(r) && (
                  <span className="ml-1 text-amber-700 dark:text-amber-300 font-semibold">· {recipeAdvanceInfo(r).shortLabel} avance</span>
                )}
              </p>
            </button>
          ))}
          {pool.length === 0 && basePool.length === 0 && (
            <p className="text-slate-500 dark:text-slate-400 italic text-center py-4">Aucune alternative dans cette saison avec vos contraintes.</p>
          )}
          {pool.length === 0 && basePool.length > 0 && (
            <p className="text-slate-500 dark:text-slate-400 italic text-center py-4">
              Aucune recette ne correspond à « {query.trim()} ». Essaie un autre mot-clé ou efface la recherche.
            </p>
          )}
        </div>
      </div>
    </div>
  );
}

function RecipeModal({recipe, profile, attendees, rating, onRate, onClose}) {
  const hasContext = Array.isArray(attendees);
  const mult = hasContext ? mealEquivalents(profile, attendees) : totalEquivalents(profile);
  const nAll = profile.members?.length || 0;
  const nPresent = hasContext ? attendees.length : nAll;
  const isPartial = hasContext && nPresent < nAll;
  return (
    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 no-print" onClick={onClose}>
      <div className="bg-white dark:bg-slate-800 rounded-lg shadow-2xl border border-slate-200 dark:border-slate-700 max-w-3xl w-full max-h-[90vh] overflow-auto" onClick={e=>e.stopPropagation()}>
        <div className="bg-gradient-to-r from-emerald-700 to-teal-600 text-white p-5 rounded-t-lg sticky top-0 z-10">
          <div className="flex justify-between items-start gap-4">
            <div>
              <h2 className="text-2xl font-bold">{recipe.name}</h2>
              <div className="flex flex-wrap gap-3 mt-2 text-sm">
                <span>⏱ Préparation {recipe.prep} min</span>
                <span>🔥 Cuisson {recipe.cook} min</span>
                {recipe.rest > 0 && (
                  <span>❄️ Repos {recipe.rest >= 60 ? `${Math.round(recipe.rest/60*10)/10}h` : `${recipe.rest} min`}</span>
                )}
                <span>📊 Difficulté {"⭐".repeat(recipe.diff)}</span>
                <span>🔢 {recipe.kcal} kcal/pers</span>
                <span>💰 ~{recipeEffectiveCost(recipe).toFixed(2)}€/pers</span>
                {(() => {
                  const gly = computeRecipeGlycemic(recipe);
                  if (!gly) return null;
                  const tier = glycemicTier(gly.cg);
                  const cls = tier === "low" ? "bg-emerald-500 text-white"
                    : tier === "medium" ? "bg-amber-500 text-white"
                    : "bg-red-500 text-white";
                  const label = tier === "low" ? "IG bas ✓"
                    : tier === "medium" ? "IG modéré"
                    : "IG élevé ⚠️ ";
                  return (
                    <span className={`${cls} px-2 py-0.5 rounded-full font-semibold`}
                      title={`IG moyen pondéré : ${gly.ig} · Charge glycémique : ${gly.cg} (≤10 bas, 11-19 modéré, ≥20 élevé) · Calculé sur ${gly.covered}/${gly.total} ingrédients référencés (${gly.carbs}g de glucides estimés)`}>
                      {label} · CG {gly.cg}
                    </span>
                  );
                })()}
              </div>
              {recipeAdvanceInfo(recipe) && (
                <div className="mt-2 inline-flex items-center gap-2 bg-amber-100 dark:bg-amber-900 text-amber-900 dark:text-amber-100 px-3 py-1.5 rounded-full text-sm font-medium">
                  <span>{recipeAdvanceInfo(recipe).icon}</span>
                  <span>À commencer {recipeAdvanceInfo(recipe).label} avant le service</span>
                </div>
              )}
              {recipe.tags?.length > 0 && (
                <div className="flex flex-wrap gap-1 mt-2">
                  {recipe.tags.map(t => (
                    <span key={t} className="bg-white/20 px-2 py-0.5 rounded-full text-xs">{t}</span>
                  ))}
                </div>
              )}
            </div>
            <button onClick={onClose} className="text-white/80 hover:text-white text-2xl">✕</button>
          </div>
        </div>
        <div className="p-6 space-y-6">
          {recipe.allergens?.length > 0 && (() => {
            const concerned = membersAllergicTo(profile, recipe.allergens);
            const familyHits = (profile.globalAllergies || []).filter(a => recipe.allergens.includes(a));
            const isCritical = concerned.length > 0 || familyHits.length > 0;
            return (
              <div className={`border p-3 rounded text-sm ${isCritical ? "bg-red-100 dark:bg-red-900 border-red-500 text-red-900 dark:text-red-100" : "bg-red-50 dark:bg-red-950 border-red-200 dark:border-red-800 text-red-800 dark:text-red-200"}`}>
                <div className="flex gap-2 items-start">
                  <span className="text-xl leading-none">{isCritical ? "🚫" : "⚠️"}</span>
                  <div className="flex-1 space-y-1">
                    <div className="font-semibold">Contient :</div>
                    <div className="flex flex-wrap gap-1">
                      {recipe.allergens.map(a => {
                        const memberHits = concerned.filter(m => (m.allergies || []).includes(a));
                        const isFamilyHit = familyHits.includes(a);
                        const isHit = isFamilyHit || memberHits.length > 0;
                        return (
                          <span key={a} className={`px-2 py-0.5 rounded text-xs border inline-flex items-center gap-1 ${isHit ? "bg-red-600 text-white border-red-700 font-bold" : "bg-white dark:bg-slate-800 text-red-700 dark:text-red-300 border-red-300 dark:border-red-700"}`}>
                            <span>{isHit ? "🚫" : "⚠️"}</span>
                            <span>{dataRef.allergenLabel(a)}</span>
                            {memberHits.length > 0 && <span className="italic font-normal text-red-100">— {memberHits.map(m => m.name).join(", ")}</span>}
                            {isFamilyHit && memberHits.length === 0 && <span className="italic font-normal text-red-100">— famille</span>}
                          </span>
                        );
                      })}
                    </div>
                    {isCritical && (
                      <p className="font-bold mt-2">⚠️ Allergène incompatible avec votre foyer — cette recette ne devrait pas être proposée par la génération.</p>
                    )}
                  </div>
                </div>
              </div>
            );
          })()}
          <div>
            <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-2">🧺 Ingrédients <span className={`text-xs font-normal ${isPartial ? "text-amber-700 dark:text-amber-300 font-medium" : "text-slate-500 dark:text-slate-400"}`}>{isPartial
              ? `(pour ${nPresent} présent${nPresent>1?"s":""} sur ${nAll}, soit ${mult.toFixed(1)} équiv. adultes)`
              : `(pour la famille, soit ${mult.toFixed(1)} équiv. adultes)`
            }</span></h3>
            <ul className="space-y-1">
              {recipe.ing.map(([name,qty,unit,cat],i) => (
                <li key={i} className="flex justify-between text-sm border-b border-dashed border-slate-200 dark:border-slate-700 py-1">
                  <span>{name}</span>
                  <span className="font-mono text-slate-600 dark:text-slate-300">{formatQty(scaleQty(qty, mult, name, cat), unit, name)}</span>
                </li>
              ))}
            </ul>
          </div>
          <div>
            <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-2">👨‍🍳 Étapes</h3>
            <ol className="space-y-3">
              {recipe.steps.map((s,i) => (
                <li key={i} className="flex gap-3">
                  <span className="flex-shrink-0 w-7 h-7 rounded-full bg-emerald-600 text-white text-sm font-bold flex items-center justify-center">{i+1}</span>
                  <p className="text-slate-700 dark:text-slate-200 leading-relaxed">{s}</p>
                </li>
              ))}
            </ol>
          </div>
          <div className="bg-slate-50 dark:bg-slate-800 rounded p-4 flex flex-wrap items-center gap-3">
            <span className="font-medium text-slate-800 dark:text-slate-100">Noter cette recette :</span>
            <div className="flex gap-1">
              {[1,2,3,4,5].map(n => (
                <button key={n} onClick={() => onRate(n)}
                  className="text-2xl hover:scale-110 transition">
                  {n <= (rating||0) ? "⭐" : "☆"}
                </button>
              ))}
            </div>
            {rating && <span className="text-sm text-slate-600 dark:text-slate-300">({rating}/5)</span>}
            {rating === 1 && <span className="text-xs text-red-600">Sera évitée pour les prochains menus</span>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ----- Vue mensuelle (V2.14.0) ---------------------------------------------
// Affiche 5 semaines glissantes à partir de currentWeek (ancre) avec :
// - cartes hebdo (date, coût coloré, repas remplis, verrous)
// - récap mensuel : coût total, diversité, recettes uniques
// - action "Régénérer toutes les semaines vides" pour planifier 1 mois en 1 clic
// Réutilise les helpers existants : addDays, weekKey, estimateWeekCost,
// generateWeek, getAllActiveSlots, recipeEffectiveCost, etc.
function MonthView({state, currentWeek, setCurrentWeek, update, onGoToWeek}) {
  const activeSlots = getAllActiveSlots(state.profile);
  const slotsPerDay = activeSlots.length;
  const slotsPerWeek = slotsPerDay * 7;
  const monthFmt = new Intl.DateTimeFormat("fr-FR", {month: "long", year: "numeric"});

  // Les 5 semaines glissantes à partir de currentWeek (ancre)
  const weekInfos = [0,1,2,3,4].map(i => {
    const ws = addDays(currentWeek, i * 7);
    const wk = weekKey(ws);
    const menu = state.menus[wk] || {};
    let filled = 0, locks = 0;
    DAYS.forEach(d => {
      const slot = menu[d] || {};
      const locked = slot.locked || {};
      activeSlots.forEach(m => {
        if (slot[m]) filled++;
        if (locked[m]) locks++;
      });
    });
    const cost = estimateWeekCost(menu, state.profile);
    return {ws, wk, menu, cost, filled, locks};
  });

  const monthlyCost = weekInfos.reduce((s, w) => s + w.cost, 0);
  const monthlyBudget = (state.profile.budgetWeekly || 0) * 5;
  const tol = (state.profile.budgetTolerance ?? 10) / 100;
  const monthlyMax = monthlyBudget * (1 + tol);

  // Diversité : nombre de recettes uniques utilisées sur les 5 semaines
  const allRecipes = new Set();
  let totalSlotsUsed = 0;
  weekInfos.forEach(w => {
    DAYS.forEach(d => {
      const slot = w.menu[d] || {};
      activeSlots.forEach(m => {
        if (slot[m]) { allRecipes.add(slot[m]); totalSlotsUsed++; }
      });
    });
  });

  // Bandeau coût mensuel : tier identique à MenuView mais sur 5 semaines
  const monthlyTier = (() => {
    if (!monthlyBudget) return null;
    const ratio = monthlyCost / monthlyBudget;
    if (ratio <= 0.95) return "under";
    if (ratio <= 1.05) return "ok";
    if (ratio <= 1 + tol) return "soft-over";
    return "hard-over";
  })();

  const tierColors = {
    under:       "bg-emerald-100 dark:bg-emerald-900 text-emerald-800 dark:text-emerald-200 border-emerald-300 dark:border-emerald-700",
    ok:          "bg-emerald-100 dark:bg-emerald-900 text-emerald-800 dark:text-emerald-200 border-emerald-300 dark:border-emerald-700",
    "soft-over": "bg-amber-100 dark:bg-amber-900 text-amber-800 dark:text-amber-200 border-amber-300 dark:border-amber-700",
    "hard-over": "bg-red-100 dark:bg-red-900 text-red-800 dark:text-red-200 border-red-300 dark:border-red-700",
  };
  const tierLabels = {
    under:       "Sous le budget mensuel ✓",
    ok:          "Dans le budget mensuel ✓",
    "soft-over": "Légèrement au-dessus (dans la tolérance)",
    "hard-over": "Au-dessus de la tolérance ⚠️ ",
  };

  const regenerateEmpty = () => {
    update(s => {
      const newMenus = {...s.menus};
      let count = 0;
      weekInfos.forEach(w => {
        if (w.filled === 0) {
          newMenus[w.wk] = generateWeek({
            profile: s.profile,
            ratings: s.ratings,
            menus: newMenus,           // utilise les semaines déjà ajoutées pour anti-récurrence
            weekStart: w.ws,
            keepLocked: false,
          });
          count++;
        }
      });
      console.info(`[month] ${count} semaine(s) vide(s) régénérée(s)`);
      return {menus: newMenus};
    });
  };

  const emptyCount = weekInfos.filter(w => w.filled === 0).length;

  return (
    <div className="space-y-4">
      {/* Header navigation mensuelle */}
      <div className="bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 p-4 flex flex-wrap items-center gap-3">
        <button onClick={() => setCurrentWeek(addDays(currentWeek, -28))}
          className="px-3 py-2 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 rounded">← 4 sem.</button>
        <div className="flex-1">
          <h2 className="text-xl font-bold text-slate-800 dark:text-slate-100">🗓️ Vue mensuelle</h2>
          <p className="text-sm text-slate-500 dark:text-slate-400">
            Du {formatShort(currentWeek)} au {formatShort(addDays(currentWeek, 34))}
            {' · '}{monthFmt.format(addDays(currentWeek, 14))}
          </p>
        </div>
        <button onClick={() => setCurrentWeek(addDays(currentWeek, 28))}
          className="px-3 py-2 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 rounded">4 sem. →</button>
      </div>

      {/* Bandeau coût mensuel */}
      {monthlyBudget > 0 && (
        <div className={`rounded-lg shadow p-4 border ${monthlyTier ? tierColors[monthlyTier] : "bg-slate-100 dark:bg-slate-700"}`}>
          <div className="flex items-center gap-3 flex-wrap">
            <div className="flex-1">
              <div className="text-sm font-semibold mb-1">{tierLabels[monthlyTier]}</div>
              <div className="text-2xl font-bold">{monthlyCost.toFixed(2)} € <span className="text-sm font-normal opacity-75">/ {monthlyBudget.toFixed(0)} € (5 semaines)</span></div>
              <div className="mt-2 h-2 w-full max-w-md bg-white/60 rounded-full overflow-hidden">
                <div className={`h-full ${
                  monthlyTier === "hard-over" ? "bg-red-500" :
                  monthlyTier === "soft-over" ? "bg-amber-500" : "bg-emerald-500"
                }`} style={{width: `${Math.min(100, (monthlyCost / monthlyBudget) * 100).toFixed(0)}%`}} />
              </div>
            </div>
            <div className="flex flex-col items-end gap-1">
              <span className="text-xs uppercase tracking-wide opacity-75">Diversité</span>
              <span className="text-2xl font-bold">{allRecipes.size}</span>
              <span className="text-xs opacity-75">recettes sur {totalSlotsUsed} repas</span>
            </div>
          </div>
        </div>
      )}

      {/* Action batch régénération */}
      {emptyCount > 0 && (
        <div className="bg-sky-50 dark:bg-sky-950 border border-sky-200 dark:border-sky-800 rounded-lg p-4 flex items-center justify-between flex-wrap gap-3">
          <div className="text-sm text-sky-900 dark:text-sky-100">
            <strong>{emptyCount} semaine{emptyCount>1?"s":""} vide{emptyCount>1?"s":""}</strong> dans cette vue.
            Tu peux les générer toutes en un clic, l'anti-récurrence reste respectée.
          </div>
          <button onClick={regenerateEmpty}
            className="bg-sky-600 hover:bg-sky-700 text-white px-4 py-2 rounded text-sm font-medium">
            🎲 Générer les {emptyCount} semaine{emptyCount>1?"s":""} vide{emptyCount>1?"s":""}
          </button>
        </div>
      )}

      {/* Grille 5 cartes hebdo */}
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
        {weekInfos.map((w, i) => {
          const ratio = state.profile.budgetWeekly > 0 ? w.cost / state.profile.budgetWeekly : 0;
          const tier = !state.profile.budgetWeekly ? null
            : ratio <= 0.95 ? "under"
            : ratio <= 1.05 ? "ok"
            : ratio <= 1 + tol ? "soft-over"
            : "hard-over";
          const isEmpty = w.filled === 0;
          const isCurrent = i === 0;
          return (
            <button key={w.wk}
              onClick={() => onGoToWeek(w.ws)}
              className={`text-left bg-white dark:bg-slate-800 rounded-lg shadow-sm hover:shadow-md transition p-3 border-2 ${
                isCurrent ? "border-emerald-500" : "border-slate-200 dark:border-slate-700"
              }`}>
              <div className="text-xs text-slate-500 dark:text-slate-400 mb-1">
                Semaine {i+1}{isCurrent && " · en cours"}
              </div>
              <div className="font-semibold text-slate-800 dark:text-slate-100 text-sm mb-2">
                {formatShort(w.ws)} → {formatShort(addDays(w.ws, 6))}
              </div>
              {isEmpty ? (
                <div className="text-slate-400 dark:text-slate-500 italic text-sm py-2">Aucun repas planifié</div>
              ) : (
                <>
                  <div className={`inline-block px-2 py-0.5 rounded text-xs font-medium mb-2 ${
                    tier ? tierColors[tier] : "bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200"
                  }`}>
                    💰 {w.cost.toFixed(2)}€
                  </div>
                  <div className="text-xs text-slate-600 dark:text-slate-300 mb-1">
                    🍽️ {w.filled} / {slotsPerWeek} repas
                  </div>
                  {w.locks > 0 && (
                    <div className="text-xs text-slate-600 dark:text-slate-300">🔒 {w.locks} verrouillé{w.locks>1?"s":""}</div>
                  )}
                </>
              )}
              <div className="text-xs text-emerald-600 mt-2 font-medium">Voir / Éditer →</div>
            </button>
          );
        })}
      </div>

      {/* Hint diversité */}
      {totalSlotsUsed > 0 && (
        <div className="bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 p-4 text-sm text-slate-600 dark:text-slate-300">
          💡 <strong>Astuce diversité :</strong> sur ces 5 semaines, tu utilises{" "}
          <strong>{allRecipes.size} recettes uniques</strong> sur {totalSlotsUsed} repas
          {' '}({totalSlotsUsed > 0 ? Math.round(allRecipes.size/totalSlotsUsed*100) : 0}% de diversité).
          {totalSlotsUsed > 0 && allRecipes.size / totalSlotsUsed < 0.7 && (
            <span className="text-amber-700 dark:text-amber-300"> Tu pourrais varier davantage en régénérant certaines semaines.</span>
          )}
        </div>
      )}
    </div>
  );
}

// Textarea contrôlé pour exclusions : conserve le texte brut (newlines autorisés)
// et ne nettoie en tableau qu'à chaque changement, sans bloquer la saisie.
function ExclusionsTextarea({value, onChange}) {
  const [raw, setRaw] = useState(value.join("\n"));
  // Resynchronise si la prop externe change (ex: reset)
  useEffect(() => {
    const cleaned = raw.split("\n").map(s => s.trim()).filter(Boolean);
    if (JSON.stringify(cleaned) !== JSON.stringify(value)) {
      setRaw(value.join("\n"));
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [value.join("|")]);
  return (
    <>
      <textarea
        value={raw}
        onChange={e => {
          setRaw(e.target.value);
          const arr = e.target.value.split("\n").map(s => s.trim()).filter(Boolean);
          onChange(arr);
        }}
        placeholder={"champignons\nolives\nmenthe"}
        rows={5}
        className="border rounded px-3 py-2 w-full font-mono text-sm" />
      <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">Un ingrédient par ligne — utilisez Entrée pour aller à la ligne.</p>
    </>
  );
}

// Calcule la taille du pool éligible par type de repas pour la saison courante
function computePoolSizes(profile, currentWeek) {
  const season = getSeason(currentWeek);
  const filter = type => RECIPES.filter(r =>
    r.type === type &&
    matchesSeason(r, season) &&
    !recipeHasAllergen(r, effectiveAllergies(profile, null)) &&
    !recipeHasExcluded(r, profile.globalExclusions) &&
    recipeRespectsEquipment(r, profile.equipment) &&
    recipeRespectsTime(r, profile.maxPrepMinutes) &&
    recipeRespectsSkill(r, profile.skillLevel)
  ).length;
  return {
    season,
    breakfast: filter("breakfast"),
    lunch: filter("lunch"),
    dinner: filter("dinner"),
    dessert: filter("dessert"),
    snack: filter("snack"),
  };
}

// Cible "0 récurrence sur 3 mois" : 13 semaines × 7 jours = 91 plats distincts
// par catégorie (lunch / dinner). Tant que le pool est en-dessous, l'algo
// rouvrira progressivement les recettes plus anciennes (cf. `pickFromPool`).
const ROTATION_TARGET_3M = 91;

function PoolDiagnostic({profile, currentWeek}) {
  const pool = useMemo(() => computePoolSizes(profile, currentWeek), [profile, currentWeek]);
  const low = Math.min(pool.lunch, pool.dinner) < 7;
  const tightRotation = !low && (pool.lunch < ROTATION_TARGET_3M || pool.dinner < ROTATION_TARGET_3M);
  const tone = low ? "bg-amber-50 dark:bg-amber-950 border-amber-300 dark:border-amber-700" : tightRotation ? "bg-sky-50 dark:bg-sky-950 border-sky-200 dark:border-sky-800" : "bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700";
  return (
    <div className={`rounded-lg p-3 text-sm border ${tone}`}>
      <div className="flex flex-wrap items-center gap-3">
        <span className="font-medium text-slate-700 dark:text-slate-200">🎯 Recettes éligibles ({SEASON_FR[pool.season]}) :</span>
        <PoolBadge label="Petits-déjeuners" n={pool.breakfast} min={3} />
        <PoolBadge label="Déjeuners" n={pool.lunch} min={7} />
        <PoolBadge label="Dîners" n={pool.dinner} min={7} />
        <PoolBadge label="Desserts" n={pool.dessert} min={5} />
        {profile.snackEnabled && <PoolBadge label="Goûters" n={pool.snack} min={4} />}
      </div>
      {low && (
        <p className="mt-2 text-amber-800 dark:text-amber-200 text-xs">
          ⚠️ Votre pool est inférieur à 7 recettes pour au moins un type de repas : des recettes se répéteront dans la semaine.
          Pour élargir le choix : retirez des allergies ou exclusions, ajoutez de l'équipement, ou augmentez le temps max de préparation dans <strong>Paramètres</strong>.
        </p>
      )}
      {tightRotation && (
        <p className="mt-2 text-sky-800 dark:text-sky-200 text-xs">
          ℹ️ Pour ne jamais répéter une recette pendant 3 mois, la cible est <strong>{ROTATION_TARGET_3M} déjeuners et {ROTATION_TARGET_3M} dîners</strong> éligibles ; vous en avez {pool.lunch} et {pool.dinner}.
          L'algorithme priorise les recettes les plus anciennes lorsqu'il doit en réutiliser une.
        </p>
      )}
    </div>
  );
}
function PoolBadge({label, n, min}) {
  const ok = n >= min;
  return (
    <span className={`px-2 py-0.5 rounded text-xs ${ok ? "bg-emerald-100 dark:bg-emerald-900 text-emerald-800 dark:text-emerald-200" : "bg-red-100 dark:bg-red-900 text-red-800 dark:text-red-200"}`}>
      {label} : <strong>{n}</strong>{!ok && ` (min ${min} conseillé)`}
    </span>
  );
}

// ----- Settings View -------------------------------------------------------
function SettingsView({state, update, updateProfile}) {
  const p = state.profile;
  // pendingImport : null tant qu'aucun fichier n'a été choisi pour import,
  // sinon { payload, fileName }. Utilisé pour afficher le modal de
  // confirmation in-app (Safari iOS bloque silencieusement confirm/alert
  // appelés après un FileReader async).
  const [pendingImport, setPendingImport] = useState(null);
  // importStatus : { type: "info" | "error", msg } affiché dans le panneau
  // Sauvegarde. Remplace les alert() natifs (mêmes blocages iOS).
  const [importStatus, setImportStatus] = useState(null);
  // Alternative au file picker : sur PWA iOS standalone, l'input file ne
  // déclenche pas toujours `change` après sélection. Le textarea de paste
  // est un fallback 100% fiable (l'utilisateur colle le contenu JSON).
  const [pasteMode, setPasteMode] = useState(false);
  const [pasteText, setPasteText] = useState("");
  // Modal de confirmation pour la saisie d'une allergie (issue #8). On force
  // l'utilisateur à confirmer qu'il s'agit bien d'une allergie médicale et pas
  // d'une simple préférence (qui doit aller dans Exclusions). Évite de bloquer
  // par erreur des recettes potentiellement bonnes.
  // Forme : null ou {scope:"global"|"member", allergenId, memberId?, memberName?}.
  const [pendingAllergy, setPendingAllergy] = useState(null);
  const addMember = () => {
    const newId = (p.members.at(-1)?.id || 0) + 1;
    updateProfile({members: [...p.members, {id:newId, name:`Membre ${p.members.length+1}`, birthYear: new Date().getFullYear() - 30, sex:"F", allergies:[]}]});
  };
  const updateMember = (id, patch) => updateProfile({members: p.members.map(m => m.id === id ? {...m, ...patch} : m)});
  const removeMember = (id) => { if (p.members.length > 1) updateProfile({members: p.members.filter(m => m.id !== id)}); };

  // ----- Allergies : ajout avec confirmation, suppression directe -----
  const tryAddGlobalAllergy = (allergenId) => {
    setPendingAllergy({scope: "global", allergenId});
  };
  const removeGlobalAllergy = (allergenId) => {
    updateProfile({globalAllergies: (p.globalAllergies || []).filter(x => x !== allergenId)});
  };
  const tryAddMemberAllergy = (memberId, allergenId) => {
    const member = p.members.find(m => m.id === memberId);
    setPendingAllergy({scope: "member", memberId, memberName: member?.name || "?", allergenId});
  };
  const removeMemberAllergy = (memberId, allergenId) => {
    const member = p.members.find(m => m.id === memberId);
    updateMember(memberId, {allergies: (member?.allergies || []).filter(x => x !== allergenId)});
  };
  const confirmPendingAllergy = () => {
    if (!pendingAllergy) return;
    const {scope, memberId, allergenId} = pendingAllergy;
    if (scope === "global") {
      updateProfile({globalAllergies: [...(p.globalAllergies || []), allergenId]});
    } else if (scope === "member" && memberId) {
      const member = p.members.find(m => m.id === memberId);
      updateMember(memberId, {allergies: [...(member?.allergies || []), allergenId]});
    }
    setPendingAllergy(null);
  };
  const cancelPendingAllergy = () => setPendingAllergy(null);

  const resetAll = () => {
    if (confirm("Effacer toutes les données (profil, menus, notes) ?")) {
      localStorage.removeItem(STORAGE_KEY_V1);
      localStorage.removeItem(STORAGE_KEY_V2);
      window.location.reload();
    }
  };

  // ----- Export / Import (sync manuelle entre appareils) -----
  // Sérialise tout le bloc V2 du localStorage dans un JSON téléchargeable, et
  // permet de le restaurer sur un autre appareil. Format auto-portant : on
  // inclut un schema ("menu-ig-bas-export") + version d'app pour validation.
  // V2.14.2 : déchiffre AVANT d'écrire le fichier d'export. Sinon le JSON
  // contient l'enveloppe chiffrée et devient irrécupérable dès que la clé
  // AES locale (IndexedDB) disparaît — typiquement sur "Clear site data" ou
  // changement d'appareil. L'export doit rester portable pour servir de
  // backup.
  const exportData = async () => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY_V2);
      if (!raw) { alert("Aucune donnée à exporter pour l'instant."); return; }
      let dataObj;
      try { dataObj = JSON.parse(raw); }
      catch (e) {
        console.error("[export] localStorage non-JSON :", e);
        alert("Format de stockage invalide.");
        return;
      }
      if (dataObj?.encrypted) {
        try {
          const plaintext = await cryptoStore.decrypt(dataObj);
          dataObj = JSON.parse(plaintext);
        } catch (e) {
          console.error("[export] déchiffrement échoué :", e);
          alert("Impossible de déchiffrer les données pour l'export (clé locale absente). Export annulé.");
          return;
        }
      }
      const appVersion = (document.title.match(/V(\d+\.\d+\.\d+)/)?.[1]) || "?";
      const payload = {
        schema: "menu-ig-bas-export",
        schemaVersion: 1,
        exportedAt: new Date().toISOString(),
        appVersion,
        data: dataObj,
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const dateStr = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `menu-ig-bas-export-${dateStr}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e) {
      console.error("[export] échec :", e);
      alert("Échec de l'export. Voir la console pour le détail.");
    }
  };

  // Logique commune : valide + parse le texte JSON et déclenche le modal.
  // Renvoie true si le payload est valide et le modal va s'afficher, false sinon.
  const processImportText = (rawText, sourceLabel) => {
    let text = rawText;
    try {
      // Strip BOM UTF-8 si présent (Windows / certains éditeurs).
      if (typeof text === "string" && text.charCodeAt(0) === 0xFEFF) {
        text = text.slice(1);
        console.log("[import] BOM UTF-8 retiré");
      }
      const payload = JSON.parse(text);
      console.log("[import] JSON parsé, schema:", payload?.schema, "appVersion:", payload?.appVersion);
      // Accepte deux formats : V2 en clair ({schema:2, users, households, session})
      // ou enveloppe chiffrée legacy V2.10–V2.14.1 ({encrypted, iv, ct}). Cette
      // dernière n'est restaurable que sur l'appareil d'origine où la clé AES
      // existe encore dans IndexedDB — on la garde pour permettre la
      // récupération après un Clear site data partiel (le user a témoigné).
      const data = payload?.data;
      const isV2Plain = data?.schema === 2;
      const isEncryptedV2 = data?.encrypted === true && typeof data?.iv === "string" && typeof data?.ct === "string";
      if (payload?.schema !== "menu-ig-bas-export" || !data || (!isV2Plain && !isEncryptedV2)) {
        setImportStatus({type: "error", msg: "Ce fichier n'est pas un export Menu IG Bas (V2). Schema détecté : " + (payload?.schema || "absent")});
        return false;
      }
      if (isEncryptedV2) {
        console.info("[import] payload chiffré détecté — sera restauré tel quel et déchiffré au prochain chargement (nécessite la même clé locale)");
      }
      setImportStatus(null);
      setPendingImport({payload, fileName: sourceLabel});
      return true;
    } catch (err) {
      console.error("[import] échec parse:", err);
      setImportStatus({type: "error", msg: `JSON invalide : ${err.message || err}`});
      return false;
    }
  };

  const onImportFile = async (e) => {
    const input = e.target;
    const file = input.files?.[0];
    if (!file) {
      console.log("[import] aucun fichier sélectionné");
      return;
    }
    console.log("[import] fichier sélectionné:", file.name, "taille:", file.size);
    setImportStatus({type: "info", msg: `Lecture du fichier « ${file.name} » (${Math.round(file.size/1024)} Ko)…`});
    try {
      // file.text() (Promise-based) au lieu de FileReader.readAsText() : sur
      // iOS Safari, FileReader sur un fichier de l'app Files / iCloud peut
      // rester pendu sans jamais déclencher onload ni onerror.
      let text;
      if (typeof file.text === "function") {
        text = await file.text();
      } else {
        text = await new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = () => resolve(r.result);
          r.onerror = () => reject(r.error || new Error("FileReader error"));
          r.readAsText(file);
        });
      }
      console.log("[import] lecture terminée, longueur texte:", text?.length);
      processImportText(text, file.name);
    } catch (err) {
      console.error("[import] échec lecture fichier:", err);
      setImportStatus({type: "error", msg: `Lecture impossible : ${err.message || err}`});
    } finally {
      if (input) input.value = "";
    }
  };

  };

            </div>
            <div className="bg-amber-50 dark:bg-amber-950 border border-amber-300 dark:border-amber-700 rounded p-3 text-sm text-amber-900 dark:text-amber-100 mb-4">
              ⚠️ Vos données actuelles (profil, menus, notes) seront <strong>remplacées</strong>. Action irréversible — pensez à exporter d'abord si vous voulez garder l'état actuel.
            </div>
            <div className="flex gap-2 justify-end">
              <button onClick={cancelImport} className="px-4 py-2 text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-600 rounded">
                Annuler
              </button>
              <button onClick={confirmImport} className="px-4 py-2 bg-sky-600 hover:bg-sky-700 text-white rounded font-medium">
                Confirmer l'import
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ----- Print: Menu A4 paysage -----------------------------------------------
function PrintMenuPage({weekStart, menu, profile}) {
  const mult = totalEquivalents(profile);
  // Construit les lignes à imprimer selon la config (goûter, placement dessert)
  const rows = [];
  rows.push({key:"breakfast", label:"Petit-déjeuner", icon:"☀️"});
  rows.push({key:"lunch", label:"Déjeuner", icon:"🥗"});
  if ((profile.dessertTime || "dinner") === "lunch") {
    rows.push({key:"dessert", label:"Dessert", icon:"🍰"});
  }
  if (profile.snackEnabled) {
    rows.push({key:"snack", label:"Goûter", icon:"🍪"});
  }
  rows.push({key:"dinner", label:"Dîner", icon:"🌙"});
  if ((profile.dessertTime || "dinner") === "dinner") {
    rows.push({key:"dessert", label:"Dessert", icon:"🍰"});
  }
  // V2.16.0 : on force bg-white dark:bg-slate-800 + text-slate-900 sur le wrapper d'impression
  // pour que la prévisualisation reste lisible même quand l'app est en mode
  // sombre (sinon le body en bg-slate-900 transparait derrière la table A4).
  return (
    <div className="p-6 text-[10pt] font-sans bg-white text-slate-900">
      <style>{`
        @page { size: A4 landscape; margin: 1cm; }
        body { background: white !important; }
      `}</style>
      <div className="flex justify-between items-end mb-3 border-b-2 border-emerald-700 pb-2">
        <div>
          <h1 className="text-xl font-bold text-emerald-800 dark:text-emerald-200">🌿 Menu IG Bas — Semaine du {formatShort(weekStart)} au {formatShort(addDays(weekStart,6))}</h1>
          <p className="text-xs text-slate-600 dark:text-slate-300">{profile.members.length} pers. (≈ {mult.toFixed(1)} adultes équivalents) · {SEASON_FR[getSeason(weekStart)]}</p>
        </div>
        <div className="text-xs text-slate-500 dark:text-slate-400">Imprimé le {new Date().toLocaleDateString("fr-FR")}</div>
      </div>
      <table className="w-full border-collapse">
        <thead>
          <tr className="bg-emerald-700 text-white">
            <th className="border border-emerald-800 p-1 w-[90px]"></th>
            {DAYS.map((d,i) => (
              <th key={d} className="border border-emerald-800 p-1">
                <div className="capitalize">{d}</div>
                <div className="text-[8pt] font-normal opacity-80">{formatShort(addDays(weekStart,i))}</div>
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.map(m => (
            <tr key={m.key}>
              <td className={`border border-slate-300 dark:border-slate-600 p-1 font-bold ${m.key === "dessert" ? "bg-rose-50 dark:bg-rose-950 text-rose-800 dark:text-rose-200" : m.key === "snack" ? "bg-amber-50 dark:bg-amber-950" : "bg-slate-100 dark:bg-slate-700"}`}>{m.icon} {m.label}</td>
              {DAYS.map(d => {
                const slot = menu[d] || {};
                const r = RECIPES.find(x => x.id === slot[m.key]);
                return (
                  <td key={d} className={`border border-slate-300 dark:border-slate-600 p-1 align-top ${m.key === "dessert" ? "bg-rose-50 dark:bg-rose-950/30" : ""}`}>
                    {r ? (
                      <>
                        <div className="font-medium">
                          {r.name}
                          {recipeAdvanceInfo(r) && (
                            <span className="ml-1 text-amber-700 dark:text-amber-300" title={`À préparer ${recipeAdvanceInfo(r).label}`}>
                              {recipeAdvanceInfo(r).icon}
                            </span>
                          )}
                        </div>
                        <div className="text-[8pt] text-slate-500 dark:text-slate-400">
                          ⏱{recipeActiveMinutes(r)}min
                          {recipeRestMinutes(r) > 0 && ` +${recipeRestMinutes(r)>=60?Math.round(recipeRestMinutes(r)/60*10)/10+'h':recipeRestMinutes(r)+'min'} repos`}
                          {' · '}{r.kcal}kcal
                          {recipeAdvanceInfo(r) && (
                            <span className="text-amber-700 dark:text-amber-300 font-bold"> · {recipeAdvanceInfo(r).shortLabel} avance</span>
                          )}
                        </div>
                      </>
                    ) : <span className="text-slate-400 dark:text-slate-500 italic">—</span>}
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
      <p className="text-[8pt] text-slate-500 dark:text-slate-400 mt-3 text-center">Menu IG Bas {(/V\d+\.\d+\.\d+/.exec(document.title)?.[0]) || ""} · prototype</p>
    </div>
  );
}

// ----- Print: Shopping list ------------------------------------------------
// On exclut les articles déjà cochés (« j'ai dans le placard ») de l'impression.
function PrintShoppingPage({weekStart, menu, profile, pantryChecks}) {
  const byCatRaw = aggregateShoppingList(menu, profile);
  let skipped = 0;
  const byCat = {};
  Object.entries(byCatRaw).forEach(([cat, list]) => {
    const filtered = list.filter(it => {
      const k = `${it.name}|${it.unit}`;
      if (pantryChecks[k]) { skipped++; return false; }
      return true;
    });
    if (filtered.length) byCat[cat] = filtered;
  });
  return (
    <div className="p-6 text-[10pt] bg-white text-slate-900">
      <style>{`
        @page { size: A4 portrait; margin: 1.2cm; }
        body { background: white !important; }
      `}</style>
      <div className="border-b-2 border-amber-600 pb-2 mb-3">
        <h1 className="text-xl font-bold text-amber-800 dark:text-amber-200">🛒 Liste de courses — Semaine du {formatShort(weekStart)}</h1>
        <p className="text-xs text-slate-600 dark:text-slate-300">
          {profile.members.length} personne(s) · Imprimé le {new Date().toLocaleDateString("fr-FR")}
          {skipped > 0 && <span className="ml-2 text-emerald-700 dark:text-emerald-300">· {skipped} article(s) déjà coché(s) exclu(s)</span>}
        </p>
      </div>
      <div className="columns-2 gap-6">
        {Object.entries(byCat).map(([cat, list]) => (
          <div key={cat} className="mb-4 break-inside-avoid">
            <h2 className="font-bold text-slate-800 dark:text-slate-100 border-b border-slate-400 mb-1">{dataRef.categoryLabel(cat)}</h2>
            <ul className="text-[9.5pt]">
              {list.map((it,i) => (
                <li key={i} className="flex items-baseline gap-2 py-0.5">
                  <span className="inline-block border border-slate-400 w-3 h-3 flex-shrink-0"></span>
                  <span className="flex-1">{it.name}</span>
                  <span className="font-mono text-slate-700 dark:text-slate-200 text-[9pt]">{formatQtyShopping(it.qty, it.unit, it.name, it.category)}</span>
                </li>
              ))}
            </ul>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppLoader />);
</script>
