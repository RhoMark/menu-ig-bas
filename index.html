<!-- Service Worker : permet le mode hors-ligne (HTTPS uniquement) -->
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then(reg => {
      console.log("[SW] enregistré, scope:", reg.scope);
    }).catch(err => {
      console.warn("[SW] échec d'enregistrement:", err);
    });
  });
}
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  // V2.16.0 — Mode sombre/clair via classe `dark` sur <html>
  // Configuration Tailwind : on opte pour le mode `class` (toggle manuel)
  // plutôt que `media` (=prefers-color-scheme strict) pour permettre à
  // l'utilisateur de forcer un thème indépendamment du système.
  tailwind.config = { darkMode: 'class' };
  // Application immédiate du thème AVANT le mount React pour éviter le FOUC
  // (Flash of Unstyled Content : page blanche apparaît brièvement avant que
  // React ne charge si on attendait l'init React pour appliquer la classe).
  // Préférence stockée en localStorage, fallback sur prefers-color-scheme.
  (function applyTheme() {
    try {
      var saved = localStorage.getItem('menu-ig-bas-theme'); // 'light' | 'dark' | null (auto)
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var dark = saved === 'dark' || (!saved && prefersDark);
      if (dark) document.documentElement.classList.add('dark');
    } catch (e) { /* localStorage indispo : on reste en clair */ }
  })();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  /* V2.16.0 — Impression : on force le thème clair quel que soit le mode UI.
     Les pages PrintMenuPage / PrintShoppingPage ne portent volontairement pas
     de classes dark: ; ce reset ne sert qu'à neutraliser un éventuel <html
     class="dark"> qui s'appliquerait à des éléments imprimés. */
  @media print {
    .no-print { display: none !important; }
    html.dark, html.dark body { background: white !important; color: #000 !important; }
    body { background: white !important; }
  }
  /* V2.16.0 — Inputs natifs en mode sombre. La plupart des <input>/<select>/
     <textarea> du projet n'ont pas de classes bg/text explicites (ils
     comptent sur les valeurs par défaut du navigateur, blanc sur noir). En
     mode sombre on remet une couleur cohérente avec les surfaces slate-800. */
  html.dark input:not([type="checkbox"]):not([type="radio"]):not([type="range"]):not([type="color"]),
  html.dark select,
  html.dark textarea {
    background-color: rgb(30 41 59); /* slate-800 */
    color: rgb(241 245 249); /* slate-100 */
    border-color: rgb(71 85 105); /* slate-600 */
  }
  html.dark input::placeholder,
  html.dark textarea::placeholder {
    color: rgb(148 163 184); /* slate-400 */
  }
</style>

    .map(m => HEALTH_PROFILE_CG_TARGETS[m.healthProfile || "healthy"])
    .filter(t => t !== null);
  if (targets.length === 0) return HEALTH_PROFILE_CG_TARGETS.healthy;
  return {
    low:    Math.min(...targets.map(t => t.low)),
    medium: Math.min(...targets.map(t => t.medium)),
    high:   Math.min(...targets.map(t => t.high)),
  };
}
// Identifie le membre le plus contraignant (celui qui fixe le seuil bas
// du foyer). Utile pour afficher dans l'UI "cible CG : 80 / jour (à
// cause de Conjointe — SOPK)". Renvoie null si tous "healthy" ou aucun.
function householdCgLimitingMember(profile) {
  if (!profile?.members?.length) return null;
  const target = householdCgTarget(profile);
  if (!target) return null;
  // Trouve le 1er membre dont le low correspond au low foyer (et ≠ healthy).
  for (const m of profile.members) {
    const t = HEALTH_PROFILE_CG_TARGETS[m.healthProfile || "healthy"];
    if (t && t.low === target.low && (m.healthProfile && m.healthProfile !== "healthy")) {
      return m;
    }
  }
  return null;
}
// Calcule la CG cumulée d'une journée pour un foyer donné. Somme les CG
// des recettes assignées aux slots actifs (breakfast + lunch + snack +
// dinner + dessert). Renvoie {cg, covered, total} : `covered` = nombre
// de recettes avec CG calculable (data-glycemic + qty exploitable),
// `total` = nombre de slots actifs ce jour-là.
function computeDayCg(weekMenu, day, profile) {
  const slots = getAllActiveSlots(profile);
  const slot = weekMenu?.[day] || {};
  let totalCg = 0;
  let covered = 0;
  for (const meal of slots) {
    const rid = slot[meal];
    if (!rid) continue;
    const recipe = RECIPES.find(r => r.id === rid);
    if (!recipe) continue;
    const g = computeRecipeGlycemic(recipe);
    if (g?.cg != null) {
      totalCg += g.cg;
      covered++;
    }
  }
  return {cg: Math.round(totalCg), covered, total: slots.length};
}
// Tier d'une CG journalière par rapport au seuil foyer.
// Renvoie 'low' / 'medium' / 'high' / 'unknown'.
function dayCgTier(cgValue, householdTarget) {
  if (cgValue == null || !householdTarget) return "unknown";
  if (cgValue <= householdTarget.low) return "low";
  if (cgValue <= householdTarget.medium) return "medium";
  return "high";
}
// ============================================================================
// Calcul de coût recette à partir de data-prices (V2.13.0)
// ----------------------------------------------------------------------------
// Pour chaque ingrédient : convertir qty → grammes, lookup prix €/100g, sommer.
// Renvoie {cost, coverage, missing} où coverage est la fraction des grammes
// couverts par data-prices. Si certains ingrédients manquent, on extrapole pas
// — c'est juste une info pour décider du fallback.
// Le résultat est mémoïsé par recipe.id pour éviter les recalculs.
// ============================================================================
const _recipeCostCache = new Map();
function computeRecipeCost(recipe) {
  if (!recipe?.id) return null;
  if (_recipeCostCache.has(recipe.id)) return _recipeCostCache.get(recipe.id);
  let cost = 0, coveredG = 0, totalG = 0;
  const missing = [];
  for (const ing of (recipe.ing || [])) {
    const [name, qty, unit] = ing;
    const g = dataRef.qtyToGrams(name, qty, unit);
    if (g == null || g <= 0) continue;
    totalG += g;
    const p = dataRef.price(canonicalName(name));
    if (p) {
      coveredG += g;
      cost += g / 100 * p.price;
    } else {
      missing.push(name);
    }
  }
  const coverage = totalG > 0 ? coveredG / totalG : 0;
  const result = {cost: Math.round(cost * 100) / 100, coverage, missing};
  _recipeCostCache.set(recipe.id, result);
  return result;
}
// recipeEffectiveCost — wrapper qui décide entre prix calculé et legacy.
// Si la couverture est ≥ 80%, on utilise le calcul (sources auditables).
// Sinon, on tombe sur le `recipe.cost` legacy (calibré ×1.25 sur conso réelle).
// Ce seuil garantit la transition douce de la V2.12 vers la V2.13 sans casser
// l'expérience utilisateur sur les recettes où data-prices est incomplet.
const COST_COVERAGE_THRESHOLD = 0.80;
function recipeEffectiveCost(recipe) {
  if (!recipe) return 0;
  const computed = computeRecipeCost(recipe);
  if (computed && computed.coverage >= COST_COVERAGE_THRESHOLD) return computed.cost;
  return recipe.cost ?? 0;
}
// Rendu "joli" d'un nombre : fractions unicode pour ¼ ½ ¾ ⅓ ⅔ (tolérance ±0.03),
// sinon décimal arrondi au 0.1 avec virgule française.
function prettyNumber(qty) {
  const FRACS = [[0.25,"¼"],[1/3,"⅓"],[0.5,"½"],[2/3,"⅔"],[0.75,"¾"]];
  const whole = Math.floor(qty + 1e-9);
  const frac = qty - whole;
  if (Math.abs(frac) < 0.03) return String(whole);
  for (const [v, sym] of FRACS) {
    if (Math.abs(frac - v) < 0.03) return whole > 0 ? `${whole} ${sym}` : sym;
  }
  const rounded = Math.round(qty * 10) / 10;
  return Number.isInteger(rounded) ? String(rounded) : String(rounded).replace(".", ",");
}

// Formatage d'une quantité d'ingrédient dans une recette (avec fractions autorisées).
// name optionnel : si fourni et que l'unité est "u" et que l'ingrédient est un fruit/légume
// référencé, on affiche "N (≈Xg/pièce)" pour que l'utilisateur voie le poids d'une pièce.
function formatQty(qty, unit, name) {
  const u = dataRef.canonicalUnit(unit);
  // Unités discrètes (œuf, gousse, c.à.c, c.à.s, u, pincée…) : arrondi à
  // l'entier dès que qty ≥ 0,75. Sous ce seuil on garde l'affichage
  // fractionnaire (½ pomme, ¼ gousse, 0,5 c.à.c…) qui a du sens en cuisine.
  const isDiscrete = dataRef.isDiscreteUnit(u);
  if (u === "u" && name) {
    const w = dataRef.produceUnitWeight(canonicalName(name));
    if (w) {
      const displayQty = qty >= 0.75 ? Math.round(qty) : qty;
      const display = qty >= 0.75 ? String(displayQty) : prettyNumber(qty);
      const total = Math.round(displayQty * w);
      return `${display} u (≈${w} g/pièce soit ${total} g)`;
    }
  }
  if (isDiscrete && qty >= 0.75) {
    return `${Math.round(qty)} ${unit}`;
  }
  const rounded = Math.round(qty * 10) / 10;
  const asStr = Number.isInteger(rounded) ? String(rounded) : String(rounded).replace(".", ",");
  return `${asStr} ${unit}`;
}
// ----- Canonicalisation des ingrédients pour la liste de courses -----------
// On agrège les ingrédients équivalents (Avocat / Avocat mûr / Avocats →
// "Avocat") pour ne pas avoir 2 lignes pour la même chose, et pour mieux
// déclencher la conversion kg/L (totaux fusionnés plus élevés).
// Note : la canonicalisation et la classification des unités sont désormais
// portées par dataRef.canonicalUnit() / dataRef.isDiscreteUnit() (cf. data-units).
// Canonicalisation du nom : minuscule, sans accents, sans parenthèses, sans
// qualificatifs ("mûr", "frais", "en boîte", etc.), au singulier.
function canonicalName(name) {
  let n = (name || "").toString().trim().toLowerCase();
  n = n.replace(/œ/g, "oe").replace(/æ/g, "ae");
  // strip accents
  n = n.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  // remove parenthetical content : "Citron (jus)" → "Citron"
  n = n.replace(/\s*\([^)]*\)\s*/g, " ");
  // remove tail descriptors after comma : "Citron, jus" → "Citron"
  n = n.replace(/,.*$/, "");
  // remove qualifiers that don't change the shopping item
  const descriptors = /\b(mur|mure|murs|mures|frais|fraiche|fraiches|congele|congelee|congeles|congelees|surgele|surgelee|surgeles|surgelees|sec|seche|secs|seches|cuit|cuite|cuits|cuites|en boite|en boites|en bocal|degoutte|degouttee|egoutte|egouttee|nature|entier|entiere|complet|complete|complets|completes|bio|jeune|nouveau|nouvelle|grosse|gros|petite|petit|fume|fumee|fumes|fumees)\b/g;
  n = n.replace(descriptors, " ");
  // collapse spaces
  n = n.replace(/\s+/g, " ").trim();
  // singularize each word >3 chars finissant en "s" (sauf as/os/us/is comme "ananas", "pois", "riz")
  n = n.split(" ").map(w => {
    if (w.length > 3 && w.endsWith("s") && !/(as|os|us|is)$/.test(w)) return w.slice(0, -1);
    return w;
  }).join(" ");
  return n;
}
// Renvoie le label affiché (canonique en majuscule initiale)
function displayCanonName(canon) {
  if (!canon) return "";
  return canon.charAt(0).toUpperCase() + canon.slice(1);
}

// Fruits/légumes : la table de poids/pièce vit désormais dans <script id="data-ingredients">,
// et la résolution se fait via dataRef.produceUnitWeight() (cf. couche d'accès données).
// Descripteurs de préparation ("râpée", "hachée", "pelée"...) stripés SEULEMENT
// pour les produce : permet de fusionner "Pomme râpée" et "Pomme" au panier.
// On ne le fait pas globalement car ces descripteurs sont porteurs de sens
// pour d'autres catégories (ex : "Dinde hachée" ≠ "Dinde", "Tomates pelées" en pantry).
const PRODUCE_PREP_RE = /\b(bien|rape|rapee|rapes|rapees|hache|hachee|haches|hachees|emince|emincee|eminces|emincees|mixe|mixee|mixes|mixees|coupe|coupee|coupes|coupees|pele|pelee|peles|pelees|ecosse|ecossee|ecosses|ecossees|blanchi|blanchie|blanchis|blanchies)\b/g;
function stripProducePrep(canonName) {
  const s = (canonName || "").replace(PRODUCE_PREP_RE, " ").replace(/\s+/g, " ").trim();
  return s || canonName;
}

// Format spécifique liste de courses :
//   - produce en "u" avec poids connu → "N (≈Xg/pièce)" (N arrondi entier sup.)
//   - produce en "g" (vendu au poids) → arrondi au multiple de 50g (<500) ou 100g (≥500)
//   - g/ml → kg/L au-delà de 1000
//   - unités discrètes (u, gousse, tranche...) → entier supérieur (ceil)
function formatQtyShopping(qty, unit, name, category) {
  const u = dataRef.canonicalUnit(unit);
  const canon = name ? canonicalName(name) : null;
  const weight = canon ? dataRef.produceUnitWeight(canon) : null;
  // Produce "vendu au poids" → arrondi aux paliers 50g / 100g (avant conversion kg)
  if (u === "g" && category === "produce") {
    let rounded;
    if (qty < 500) rounded = Math.ceil(qty / 50) * 50;
    else rounded = Math.ceil(qty / 100) * 100;
    if (rounded >= 1000) {
      const kg = Math.round((rounded / 1000) * 100) / 100;
      const asStr = Number.isInteger(kg) ? String(kg) : String(kg).replace(".", ",");
      return `${asStr} kg`;
    }
    return `${rounded} g`;
  }
  if ((u === "g") && qty >= 1000) {
    const kg = qty / 1000;
    const rounded = Math.round(kg * 100) / 100;
    const asStr = Number.isInteger(rounded) ? String(rounded) : String(rounded).replace(".", ",");
    return `${asStr} kg`;
  }
  if ((u === "ml") && qty >= 1000) {
    const l = qty / 1000;
    const rounded = Math.round(l * 100) / 100;
    const asStr = Number.isInteger(rounded) ? String(rounded) : String(rounded).replace(".", ",");
    return `${asStr} L`;
  }
  if (dataRef.isDiscreteUnit(u)) {
    const ceiled = Math.ceil(qty - 1e-9); // 1.7 → 2, 4.0 → 4 (tolérance flottants)
    if (u === "u") {
      if (weight) return `${ceiled} (≈${weight} g/pièce)`;
      return `${ceiled}`;
    }
    return `${ceiled} ${u}`;
  }
  return formatQty(qty, unit, name);
}

// ----- Helpers temps (préparation / cuisson / repos) -----------------------
// Une recette peut déclarer :
//   prep    : minutes de préparation active (obligatoire)
//   cook    : minutes de cuisson (obligatoire)
//   rest    : minutes de repos passif / frigo (optionnel)
//   advance : délai minimum avant service ("30min" | "1h" | "2h" | ... | "veille")
// Le temps "actif" pour le planning = prep+cook. Le rest est affiché à part.
function recipeActiveMinutes(recipe) {
  return (recipe.prep || 0) + (recipe.cook || 0);
}
function recipeRestMinutes(recipe) {
  return recipe.rest || 0;
}
// Retourne un objet {icon, label, shortLabel, minutes} si avance requise, sinon null.
function recipeAdvanceInfo(recipe) {
  if (!recipe.advance) return null;
  const adv = String(recipe.advance).toLowerCase().trim();
  if (adv === "veille" || adv === "nuit" || adv === "overnight") {
    return {icon: "🌙", label: "La veille", shortLabel: "veille", minutes: 720};
  }
  const m = adv.match(/^(\d+)\s*h$/);
  if (m) {
    const h = parseInt(m[1], 10);
    return {icon: "⏰", label: `${h}h à l'avance`, shortLabel: `${h}h`, minutes: h * 60};
  }
  const mm = adv.match(/^(\d+)\s*min$/);
  if (mm) {
    const mins = parseInt(mm[1], 10);
    return {icon: "⏰", label: `${mins}min à l'avance`, shortLabel: `${mins}min`, minutes: mins};
  }
  return {icon: "⏰", label: adv, shortLabel: adv, minutes: 0};
}
// Libellé concis pour l'affichage (rest mis à part).
// Ex: "15min" ou "15min + 2h repos"
function recipeTimeLabel(recipe) {
  const active = recipeActiveMinutes(recipe);
  const rest = recipeRestMinutes(recipe);
  if (!rest) return `${active}min`;
  const restStr = rest >= 60
    ? (rest % 60 === 0 ? `${rest / 60}h` : `${Math.floor(rest / 60)}h${rest % 60}`)
    : `${rest}min`;
  return `${active}min + ${restStr} repos`;
}

// ----- Storage (V2 — modèle multi-tenant household/user) -------------------
// V1 (legacy)  : un seul "profile" + "menus" plats dans localStorage.
// V2 (actuel)  : structure préfigurant la BDD multi-compte :
//   { schema:2, users:{[id]:User}, households:{[id]:Household}, session:{activeUserId, activeHouseholdId} }
//
// Pour ne pas avoir à toucher tous les composants, le RUNTIME state (vu par
// React) reste plat avec les champs `profile`, `menus`, `ratings`, etc. — c'est
// une **projection** du household actif. À l'enregistrement, on re-projette en
// V2 dans le localStorage. Les composants ne savent pas (encore) qu'un modèle
// household existe — ils continueront à fonctionner tels quels.
//
// Migration V1 → V2 : automatique au chargement. V1 est conservé en backup.
const STORAGE_KEY_V1 = "menu-ig-bas-v1";
const STORAGE_KEY_V2 = "menu-ig-bas-v2";
// Champs reconnus dans `preferences` d'un household (whitelist anti-pollution).
const PREF_KEYS = ["location","globalAllergies","globalExclusions","budgetWeekly","budgetTolerance","equipment","maxPrepMinutes","skillLevel","dessertTime","snackEnabled"];
function makeId(prefix) {
  return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;
}
function emptyHouseholdPreferences() {
  return {
    location: "",
    globalAllergies: [],
    globalExclusions: [],
    budgetWeekly: 120,
    // Tolérance budget en % (V2.11.0) : Strict (0) / 5 / 10 / 15 / 20.
    // Le menu ne doit pas dépasser budgetWeekly × (1 + budgetTolerance/100).
    budgetTolerance: 10,
    equipment: ["stove","oven","bowl"],
    maxPrepMinutes: 60,
    skillLevel: 2,
    dessertTime: "dinner",
    snackEnabled: false,
  };
}
function emptyHousehold(id) {
  return {
    id,
    members: [{id:1, name:"Adulte 1", birthYear: new Date().getFullYear() - 40, sex:"F", allergies:[], healthProfile:"healthy"}],
    preferences: emptyHouseholdPreferences(),
    menus: {},
    ratings: {},
    pantry: {},
    journal: {},
    settings: { onboarded: false },
  };
}
function emptyV2State() {
  const userId = makeId("u");
  const householdId = makeId("h");
  return {
    schema: 2,
    users:      { [userId]:      { id: userId, name: "Utilisateur", householdId, createdAt: new Date().toISOString() } },
    households: { [householdId]: emptyHousehold(householdId) },
    session:    { activeUserId: userId, activeHouseholdId: householdId },
  };
}
// Convertit un état V1 (profile + menus + ratings + pantryChecks + journal)
// en état V2 multi-tenant : un user, un household qui hérite des données.
function migrateV1toV2(v1) {
  const userId = makeId("u");
  const householdId = makeId("h");
  const prevProfile = v1.profile || {};
  const {members = [{id:1, name:"Adulte 1", birthYear: new Date().getFullYear() - 40, sex:"F"}], ...prefsFromProfile} = prevProfile;
  // Backfill V2.8.1 : si un membre a `age` mais pas `birthYear`, on déduit
  // l'année de naissance approximative (à ±1 an près, l'utilisateur peut
  // affiner). On garde `age` côté donnée pour rétrocompat éventuelle, mais
  // memberAge() préférera birthYear.
  const currentYear = new Date().getFullYear();
  const migratedMembers = members.map(m =>
    (m.birthYear || !m.age) ? m : {...m, birthYear: currentYear - m.age}
  );
  return {
    schema: 2,
    users:      { [userId]: { id: userId, name: "Utilisateur", householdId, createdAt: new Date().toISOString() } },
    households: {
      [householdId]: {
        id: householdId,
        members: migratedMembers,
        preferences: { ...emptyHouseholdPreferences(), ...prefsFromProfile },
        menus:    v1.menus        || {},
        ratings:  v1.ratings      || {},
        pantry:   v1.pantryChecks || {},
        journal:  v1.journal      || {},
        settings: { onboarded: !!v1.onboarded },
      }
    },
    session: { activeUserId: userId, activeHouseholdId: householdId },
  };

// Projette un état V2 en runtime state plat (compatibilité composants).
function projectRuntime(v2) {
  const ah = v2.session.activeHouseholdId;
  const h = v2.households[ah] || emptyHousehold(ah);
  return {
    onboarded:    !!h.settings?.onboarded,
    // Consentement RGPD donné une fois et persisté (V2.11.0+).
    // Si null/undefined → l'app affiche le modal de bienvenue bloquant.
    consentedAt:  h.settings?.consentedAt || null,
    profile:      { ...h.preferences, members: h.members },
    menus:        h.menus    || {},
    ratings:      h.ratings  || {},
    pantryChecks: h.pantry   || {},
    journal:      h.journal  || {},
    // Données multi-tenant brutes — préfixées `_` pour signaler qu'elles
    // ne doivent pas être lues/écrites directement par les composants.
    // À terme, exposées via un module `dataUser` (commutation de household, etc.).
    _schema:      2,
    _users:       v2.users,
    _households:  v2.households,
    _session:     v2.session,
  };
}
// Écrit le runtime state (vue projetée) dans le V2 shape pour persistance.
// Ne modifie que le household actif : les autres restent intacts (multi-foyer).
function applyRuntimeToV2(runtime) {
  const ah = runtime._session.activeHouseholdId;
  const prevHouse = runtime._households[ah] || emptyHousehold(ah);
  const {members, ...flatPrefs} = runtime.profile || {};
  const preferences = {};
  PREF_KEYS.forEach(k => { if (flatPrefs[k] !== undefined) preferences[k] = flatPrefs[k]; });
  return {
    schema: 2,
    users:  runtime._users,
    households: {
      ...runtime._households,
      [ah]: {
        ...prevHouse,
        id:           ah,
        members:      members || prevHouse.members,
        preferences:  { ...prevHouse.preferences, ...preferences },
        menus:        runtime.menus,
        ratings:      runtime.ratings,
        pantry:       runtime.pantryChecks,
        journal:      runtime.journal,
        settings:     { ...prevHouse.settings, onboarded: !!runtime.onboarded, consentedAt: runtime.consentedAt || null },
      },
    },
    session: runtime._session,
  };
}
// ============================================================================
// Module crypto (V2.11.0+) — chiffrement local AES-GCM 256 au repos.
// ----------------------------------------------------------------------------
// La clé est générée aléatoirement à la 1re ouverture, stockée dans IndexedDB
// avec extractable: false (le navigateur garantit qu'elle ne sort jamais de
// l'origin, même via XSS). Format de l'enveloppe : { encrypted, v, iv, ct }.
// Cette signature de chiffrement est volontairement la même que celle prévue
// pour V3.x — seule la dérivation de clé changera (Argon2id du mot de passe).
// ============================================================================
const cryptoStore = (() => {
  const DB_NAME   = "menu-ig-bas-secure";
  const DB_STORE  = "keys";
  const KEY_ID    = "master";
  const TEXT_ENC  = new TextEncoder();
  const TEXT_DEC  = new TextDecoder();

  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => req.result.createObjectStore(DB_STORE);
      req.onsuccess = () => resolve(req.result);
      req.onerror   = () => reject(req.error);
    });
  }
  function idbOp(mode, action) {
    return openDB().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, mode);
      const store = tx.objectStore(DB_STORE);
      const result = action(store);
      tx.oncomplete = () => resolve(result?.result);
      tx.onerror    = () => reject(tx.error);
    }));
  }
  const idbGet    = k => idbOp("readonly",  s => s.get(k));
  const idbSet    = (k,v) => idbOp("readwrite", s => s.put(v, k));
  const idbDelete = k => idbOp("readwrite", s => s.delete(k));

  function bufToB64(buf) {
    const bytes = new Uint8Array(buf);
    let bin = "";
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin);
  }
  function b64ToBytes(b64) {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  async function getOrCreateKey() {
    const existing = await idbGet(KEY_ID);
    if (existing) return existing;
    const key = await crypto.subtle.generateKey(
      {name: "AES-GCM", length: 256},
      false, // extractable: false — la clé ne peut PAS sortir du navigateur
      ["encrypt", "decrypt"]
    );
    await idbSet(KEY_ID, key);
    console.info("[crypto] Nouvelle clé maître AES-GCM 256 générée");
    return key;
  }
  async function getKeyOnly() {
    return (await idbGet(KEY_ID)) || null;
  }
  async function deleteKey() {
    await idbDelete(KEY_ID);
  }

  async function encrypt(plaintext) {
    const key = await getOrCreateKey();
    const iv  = crypto.getRandomValues(new Uint8Array(12));
    const ct  = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, TEXT_ENC.encode(plaintext));
    return {encrypted: true, v: 1, iv: bufToB64(iv), ct: bufToB64(ct)};
  }
  async function decrypt(envelope) {
    const key = await getKeyOnly();
    if (!key) {
      const err = new Error("CRYPTO_KEY_MISSING");
      err.code = "CRYPTO_KEY_MISSING";
      throw err;
    }
    const iv = b64ToBytes(envelope.iv);
    const ct = b64ToBytes(envelope.ct);
    const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct);
    return TEXT_DEC.decode(pt);
  }

  return {encrypt, decrypt, getKeyOnly, deleteKey};
})();

// ----------------------------------------------------------------------------
// Backfill sur un objet V2 brut. Mutualisé entre les chemins de chargement.
// ----------------------------------------------------------------------------
function applyV2Backfills(v2) {
  // Backfill V2.8.1 : membres antérieurs à birthYear peuvent encore avoir
  // uniquement `age`. On déduit birthYear à ±1 an près.
  const currentYear = new Date().getFullYear();
  Object.values(v2.households || {}).forEach(h => {
    if (Array.isArray(h.members)) {
      h.members = h.members.map(m =>
        (m.birthYear || !m.age) ? m : {...m, birthYear: currentYear - m.age}
      );
    }
  });
  return v2;
}

// ----------------------------------------------------------------------------
// loadState : async depuis V2.11.0. Lit le blob (chiffré ou non), décrypte si
// besoin, applique les backfills, renvoie le runtime state. Lève une erreur
// `CRYPTO_KEY_MISSING` si le blob est chiffré mais la clé absente — capturé
// par AppLoader pour afficher l'écran de récupération.
// ----------------------------------------------------------------------------
async function loadState() {
  const raw2 = localStorage.getItem(STORAGE_KEY_V2);
  if (raw2) {
    let parsed;
    try { parsed = JSON.parse(raw2); } catch { parsed = null; }
    if (parsed?.encrypted) {
      // Format chiffré V2.11.0+ : on déchiffre puis on parse le JSON intérieur.
      const plaintext = await cryptoStore.decrypt(parsed); // peut throw CRYPTO_KEY_MISSING
      let v2;
      try { v2 = JSON.parse(plaintext); }
      catch (e) { console.error("[storage] payload chiffré illisible :", e); v2 = null; }
      if (v2 && v2.schema === 2 && v2.session?.activeHouseholdId && v2.households?.[v2.session.activeHouseholdId]) {
        return projectRuntime(applyV2Backfills(v2));
      }
      console.warn("[storage] payload chiffré présent mais structure invalide");
    } else if (parsed && parsed.schema === 2 && parsed.session?.activeHouseholdId && parsed.households?.[parsed.session.activeHouseholdId]) {
      // Format clair V2.x antérieur : on charge tel quel, le prochain saveState
      // le ré-écrira en chiffré (migration transparente V2.10).
      console.info("[storage] format clair détecté — sera chiffré au prochain save (migration V2.10)");
      return projectRuntime(applyV2Backfills(parsed));
    } else {
      console.warn("[storage] V2 trouvé mais invalide, fallback sur V1 ou état neuf");
    }
  }
  const raw1 = localStorage.getItem(STORAGE_KEY_V1);
  if (raw1) {
    try {
      const v1 = JSON.parse(raw1);
      const v2 = migrateV1toV2(v1);
      // L'écriture chiffrée se fera au premier saveState, on n'écrit rien ici.
      console.info("[storage] migration V1 → V2 préparée (chiffrement au prochain save)");
      return projectRuntime(applyV2Backfills(v2));
    } catch (e) {
      console.error("[storage] migration V1 a échoué :", e);
    }
  }
  return projectRuntime(emptyV2State());
}
// ----------------------------------------------------------------------------
// saveState : async, chiffre systématiquement avant d'écrire dans localStorage.
// Tous les saveState passés sont fire-and-forget côté React (useEffect ne wait
// pas la Promise) — c'est OK car le chiffrement prend ~5 ms.
// ----------------------------------------------------------------------------
async function saveState(runtime) {
  try {
    if (!runtime || !runtime._session) return;
    const v2 = applyRuntimeToV2(runtime);
    const envelope = await cryptoStore.encrypt(JSON.stringify(v2));
    localStorage.setItem(STORAGE_KEY_V2, JSON.stringify(envelope));
  } catch (e) {
    console.error("[storage] saveState a échoué :", e);
  }
}

// ----- Menu generation -----------------------------------------------------
// Renvoie la liste des recettes lunch/dinner servies dans les 90 jours précédant
// `currentWeekStart`, plus une carte `recipeId → timestamp ms de la semaine la plus récente
// d'utilisation`. La carte sert à départager les recettes lors d'un fallback en
// privilégiant la plus ancienne (cf. `pickFromPool` niveau 2).
function recipesUsedInLast3Months(menus, currentWeekStart) {
  const cutoff = new Date(currentWeekStart); cutoff.setDate(cutoff.getDate() - 90);
  const set = new Set();
  const lastUsedMap = new Map();
  Object.entries(menus).forEach(([wk, days]) => {
    const d = new Date(wk);
    if (d >= cutoff && d < new Date(currentWeekStart)) {
      const ts = d.getTime();
      DAYS.forEach(day => {
        if (days[day]) {
          ["lunch","dinner"].forEach(m => {
            const id = days[day][m];
            if (!id) return;
            set.add(id);
            const prev = lastUsedMap.get(id);
            if (prev == null || ts > prev) lastUsedMap.set(id, ts);
          });
        }
      });
    }
  });
  return {set, lastUsedMap};
}
// Sélection en cascade : on essaie d'abord d'éviter à la fois les recettes déjà
// servies cette semaine (hardAvoid, contrainte dure) et celles servies dans les
// 3 derniers mois (softAvoid). Si plus aucune recette « fraîche » n'est dispo,
// on choisit la plus ancienne hors-hardAvoid plutôt que de tirer au hasard
// dans tout le pool — ce qui évitait l'ancien bug "même recette que la semaine
// précédente alors que d'autres dormaient depuis 2 mois".
function pickFromPool(pool, {hardAvoid = new Set(), softAvoid = new Set(), lastUsedMap = new Map(), ratings = {}} = {}) {
  if (pool.length === 0) return null;
  // Niveau 1 — recettes ni servies cette semaine, ni servies depuis 3 mois.
  let candidates = pool.filter(r => !hardAvoid.has(r.id) && !softAvoid.has(r.id));
  if (candidates.length > 0) return weightedPick(candidates, ratings);
  // Niveau 2 — fraîches épuisées : on rouvre softAvoid mais on privilégie le plus ancien.
  candidates = pool.filter(r => !hardAvoid.has(r.id));
  if (candidates.length > 0) {
    const sorted = [...candidates].sort(byOldestFirst(lastUsedMap));
    const cutoff = Math.max(1, Math.ceil(sorted.length / 3));
    return weightedPick(sorted.slice(0, cutoff), ratings);
  }
  // Niveau 3 — extrême (toutes en hardAvoid) : prendre la plus ancienne du pool entier
  // pour ne pas laisser un slot vide. Ne devrait jamais arriver tant que pool ≥ 7.
  return [...pool].sort(byOldestFirst(lastUsedMap))[0];
}

function byOldestFirst(lastUsedMap) {
  // Recettes jamais servies (timestamp absent → 0) passent devant les plus récentes.
  return (a, b) => (lastUsedMap.get(a.id) ?? 0) - (lastUsedMap.get(b.id) ?? 0);
}

function weightedPick(list, ratings) {
  const weights = list.map(r => {
    const rating = ratings[r.id];
    if (rating === 1) return 0.2;
    if (rating === 2) return 0.6;
    if (rating === 4) return 1.6;
    if (rating === 5) return 2.4;
    return 1.0;
  });
  const total = weights.reduce((a,b)=>a+b, 0);
  let roll = Math.random() * total;
  for (let i = 0; i < list.length; i++) {
    roll -= weights[i];
    if (roll <= 0) return list[i];
  }
  return list[list.length-1];
}

// ----- Staples (féculents/légumineuses) — anti-doublon midi/soir -----------
// Règle métier : on n'enchaîne pas le même féculent ou la même légumineuse
// au déjeuner ET au dîner du même jour (ex. riz midi → pas de riz le soir).
// Variantes regroupées sous un même token (« riz complet », « riz basmati », etc. → « riz »).
const STAPLE_TOKENS = [
  // Féculents
  ["riz",            /\briz\b/i],
  ["pâtes",          /\bpâtes\b|\bspaghettis?\b|\btagliatelles?\b|\blasagnes?\b|\bpennes?\b|\bfusillis?\b|\bmacaronis?\b|\bcoquillettes?\b|\bvermicelles?\b|\bnouilles?\b|\bravioli/i],
  ["boulgour",       /\bboulgour\b/i],
  ["semoule",        /\bsemoule\b|\bcouscous\b/i],
  ["quinoa",         /\bquinoa\b/i],
  ["sarrasin",       /\bsarrasin\b|\bkasha\b/i],
  ["polenta",        /\bpolenta\b/i],
  ["millet",         /\bmillet\b/i],
  ["épeautre",       /\bépeautre\b/i],
  ["orge",           /\borge\b/i],
  ["pomme de terre", /\bpommes?\s+de\s+terre\b|\bpatates?\b(?!\s+douce)/i],
  ["patate douce",   /\bpatates?\s+douces?\b/i],
  // Légumineuses
  ["lentilles",      /\blentilles?\b/i],
  ["pois chiches",   /\bpois\s+chiches?\b/i],
  ["haricots rouges",/\bharicots?\s+rouges?\b/i],
  ["haricots blancs",/\bharicots?\s+blancs?\b/i],
  ["haricots noirs", /\bharicots?\s+noirs?\b/i],
  ["haricots mungo", /\bharicots?\s+mungo\b/i],
  ["fèves",          /\bfèves?\b/i],
  ["pois cassés",    /\bpois\s+cassés?\b/i],
  ["edamame",        /\bedamame\b/i],
  ["soja",           /\bsoja\b|\btofu\b|\btempeh\b/i],
];

function recipeStaples(recipe) {
  const found = new Set();
  recipe.ing.forEach(([name]) => {
    STAPLE_TOKENS.forEach(([token, re]) => {
      if (re.test(name)) found.add(token);
    });
  });
  return found;
}

// Renvoie les IDs servis dans le slot `mealKey` au cours des `days` jours
// précédant `weekStart`. Sert à empêcher qu'un goûter (ou dessert) du dimanche
// réapparaisse le lundi de la semaine suivante.
function recentMealSlots(menus, weekStart, mealKey, days = 7) {
  const start = new Date(weekStart);
  const cutoff = new Date(weekStart); cutoff.setDate(cutoff.getDate() - days);
  const set = new Set();
  Object.entries(menus).forEach(([wk, daysMap]) => {
    const wkDate = new Date(wk);
    DAYS.forEach((day, idx) => {
      const dayDate = addDays(wkDate, idx);
      if (dayDate >= cutoff && dayDate < start) {
        const id = daysMap[day]?.[mealKey];
        if (id) set.add(id);
      }
    });
  });
  return set;
}

function generateWeek({profile, ratings, menus, weekStart, keepLocked}) {
  const season = getSeason(weekStart);
  // Sécurité : on exclut large à la génération hebdo (allergies de TOUS les membres).
  // L'attendance par repas n'est connue qu'au remplacement manuel slot par slot.
  const allergies = effectiveAllergies(profile, null);
  const exclusions = profile.globalExclusions;
  const baseFilter = (type) => RECIPES.filter(r =>
    r.type === type &&
    matchesSeason(r, season) &&
    !recipeHasAllergen(r, allergies) &&
    !recipeHasExcluded(r, exclusions) &&
    recipeRespectsEquipment(r, profile.equipment) &&
    recipeRespectsTime(r, profile.maxPrepMinutes) &&
    recipeRespectsSkill(r, profile.skillLevel) &&
    (ratings[r.id] ?? 3) >= 3
  );
  const breakfasts = baseFilter("breakfast");
  const lunches    = baseFilter("lunch");
  const dinners    = baseFilter("dinner");
  const desserts   = baseFilter("dessert");
  const snacks     = baseFilter("snack");

  const {set: recentlyUsed, lastUsedMap} = recipesUsedInLast3Months(menus, weekStart);
  const existing = menus[weekKey(weekStart)] || {};

  const days = {};
  const usedThisWeek = new Set();           // lunch + dinner anti-redondance
  // Cooldown 7 jours pour desserts/snacks → couvre la jonction dimanche → lundi
  // de la semaine suivante (un même dessert/goûter ne reviendra pas avant 8 jours).
  const dessertsCooldown = recentMealSlots(menus, weekStart, "dessert", 7);
  const snacksCooldown   = recentMealSlots(menus, weekStart, "snack",   7);

  // Garde-fou CG journalier (V2.23.0) : on tente jusqu'à 3 fois la génération
  // d'une journée si elle dépasse le seuil "high" du foyer. Le seuil dépend du
  // profil santé du membre le plus contraignant (cf householdCgTarget). Tiers
  // low / medium / unknown sont acceptés ; seul "high" déclenche un re-roll.
  // Au-delà de 3 tentatives ou si le pool est trop pauvre, on accepte le
  // dernier essai (best-effort, l'UI affichera le badge orange/rouge).
  const cgTarget = householdCgTarget(profile);
  const CG_MAX_DAY_ATTEMPTS = 3;

  DAYS.forEach((day, i) => {
    const prev = existing[day] || {};
    const locked = prev.locked || {};

    let slot = null;
    let attempt = 0;
    while (attempt < CG_MAX_DAY_ATTEMPTS) {
      attempt++;
      // Snapshot des sets mutables pour pouvoir restorer en cas de re-roll
      const usedSnapshot     = new Set(usedThisWeek);
      const dessertsSnapshot = new Set(dessertsCooldown);
      const snacksSnapshot   = new Set(snacksCooldown);

      slot = {locked: {...locked}};
      // préserver l'attendance existante
      if (prev.attendance) slot.attendance = prev.attendance;

      // Breakfast: rotation déterministe pour garantir 7 petits-déjs différents si possible
      if (keepLocked && locked.breakfast && prev.breakfast) {
        slot.breakfast = prev.breakfast;
      } else if (breakfasts.length > 0) {
        slot.breakfast = breakfasts[(i + attempt - 1) % breakfasts.length].id;
      }

      // Lunch
      if (keepLocked && locked.lunch && prev.lunch) {
        slot.lunch = prev.lunch;
        usedThisWeek.add(prev.lunch);
      } else {
        const picked = pickFromPool(lunches, {hardAvoid: usedThisWeek, softAvoid: recentlyUsed, lastUsedMap, ratings});
        if (picked) { slot.lunch = picked.id; usedThisWeek.add(picked.id); }
      }

      // Dinner — anti-doublon semaine + anti-récurrence 3 mois + pas le même féculent/légumineuse que le lunch du jour
      if (keepLocked && locked.dinner && prev.dinner) {
        slot.dinner = prev.dinner;
        usedThisWeek.add(prev.dinner);
      } else {
        let dinnerPool = dinners;
        const lunchRecipe = slot.lunch ? RECIPES.find(r => r.id === slot.lunch) : null;
        if (lunchRecipe) {
          const lunchStaples = recipeStaples(lunchRecipe);
          if (lunchStaples.size > 0) {
            const filtered = dinners.filter(r => {
              const ds = recipeStaples(r);
              for (const s of lunchStaples) if (ds.has(s)) return false;
              return true;
            });
            // Filtre conservé seulement si ≥ 3 candidats — sinon mieux vaut un doublon staple qu'un slot dégradé.
            if (filtered.length >= 3) dinnerPool = filtered;
          }
        }
        const picked = pickFromPool(dinnerPool, {hardAvoid: usedThisWeek, softAvoid: recentlyUsed, lastUsedMap, ratings});
        if (picked) { slot.dinner = picked.id; usedThisWeek.add(picked.id); }
      }

      // Snack (goûter) — anti-doublon sur 8 jours glissants (cf. snacksCooldown)
      if (profile.snackEnabled) {
        if (keepLocked && locked.snack && prev.snack) {
          slot.snack = prev.snack;
          snacksCooldown.add(prev.snack);
        } else if (snacks.length > 0) {
          const picked = pickFromPool(snacks, {hardAvoid: snacksCooldown, ratings});
          if (picked) { slot.snack = picked.id; snacksCooldown.add(picked.id); }
        }
      }

      // Dessert — 1 par jour, anti-doublon sur 8 jours glissants (cf. dessertsCooldown)
      if (keepLocked && locked.dessert && prev.dessert) {
        slot.dessert = prev.dessert;
        dessertsCooldown.add(prev.dessert);
      } else if (desserts.length > 0) {
        const picked = pickFromPool(desserts, {hardAvoid: dessertsCooldown, ratings});
        if (picked) { slot.dessert = picked.id; dessertsCooldown.add(picked.id); }
      }

      // Garde-fou CG : calculer le tier de la journée. On accepte tout sauf
      // "high" (au-dessus du seuil élevé du foyer). On accepte aussi
      // "unknown" (data-glycemic insuffisante) pour ne pas bloquer.
      const dayCg = computeDayCg({[day]: slot}, day, profile);
      const tier = dayCgTier(dayCg.covered > 0 ? dayCg.cg : null, cgTarget);
      if (tier !== "high") break;

      // tier "high" → re-roll. On restaure les sets pour la prochaine tentative.
      // Les recettes choisies durant cette tentative sont retirées des sets
      // afin que le re-roll puisse les sélectionner à nouveau pour un autre
      // jour ou les éviter pour celui-ci si le pickFromPool tire ailleurs.
      if (attempt < CG_MAX_DAY_ATTEMPTS) {
        usedThisWeek.clear();     usedSnapshot.forEach(id => usedThisWeek.add(id));
        dessertsCooldown.clear(); dessertsSnapshot.forEach(id => dessertsCooldown.add(id));
        snacksCooldown.clear();   snacksSnapshot.forEach(id => snacksCooldown.add(id));
      }
    }

    days[day] = slot;
  });
  // Optimisation budget (V2.11.0) : si le coût total dépasse la tolérance,
  // on remplace itérativement les repas les plus chers par des alternatives
  // moins chères respectant toutes les contraintes (saison, allergies,
  // équipement, skill, anti-récurrence). Pure post-traitement, ne change rien
  // si pas de budget configuré.
  return optimizeForBudget({days, profile, season, ratings, recentlyUsed});
}

// optimizeForBudget — algorithme greedy de substitution post-génération.
// Critère d'arrêt : coût total ≤ budgetWeekly × (1 + budgetTolerance/100),
// OU plus aucune substitution possible, OU MAX_ITER atteint.
// À chaque itération, on cherche le swap qui produit la plus grosse économie.
function optimizeForBudget({days, profile, season, ratings, recentlyUsed}) {
  const target = profile.budgetWeekly;
  if (!target || target <= 0) return days;
  const tolerance = (profile.budgetTolerance ?? 10) / 100;
  const maxAllowed = target * (1 + tolerance);
  const MAX_ITER = 10;

  const allergies  = effectiveAllergies(profile, null);
  const exclusions = profile.globalExclusions;
  const baseFilter = (type) => RECIPES.filter(r =>
    r.type === type &&
    matchesSeason(r, season) &&
    !recipeHasAllergen(r, allergies) &&
    !recipeHasExcluded(r, exclusions) &&
    recipeRespectsEquipment(r, profile.equipment) &&
    recipeRespectsTime(r, profile.maxPrepMinutes) &&
    recipeRespectsSkill(r, profile.skillLevel) &&
    (ratings[r.id] ?? 3) >= 3 &&
    !recentlyUsed.has(r.id)
  );

  const ALL_KEYS = ["breakfast","lunch","dinner","snack","dessert"];

  for (let iter = 0; iter < MAX_ITER; iter++) {
    const cost = estimateWeekCost(days, profile);
    if (cost <= maxAllowed) return days;

    // Recense les recettes déjà utilisées cette semaine (pour éviter de
    // dupliquer un plat lors de la substitution).
    const usedThisWeek = new Set();
    DAYS.forEach(d => {
      const s = days[d] || {};
      ALL_KEYS.forEach(m => { if (s[m]) usedThisWeek.add(s[m]); });
    });

    let bestSwap = null; // {day, mealKey, newId, saving}
    for (const day of DAYS) {
      const slot = days[day] || {};
      const locked = slot.locked || {};
      const attendance = slot.attendance || {};
      for (const mealKey of ALL_KEYS) {
        if (locked[mealKey]) continue;
        const oldId = slot[mealKey];
        if (!oldId) continue;
        const oldRecipe = RECIPES.find(r => r.id === oldId);
        if (!oldRecipe) continue;
        const oldCost = recipeEffectiveCost(oldRecipe);
        const candidates = baseFilter(mealKey).filter(r =>
          recipeEffectiveCost(r) < oldCost &&
          r.id !== oldId &&
          !(usedThisWeek.has(r.id) && r.id !== oldId)
        );
        if (candidates.length === 0) continue;
        const cheapest = candidates.reduce((b, c) => recipeEffectiveCost(c) < recipeEffectiveCost(b) ? c : b);
        const mealMult = mealEquivalents(profile, attendance[mealKey]);
        const saving = (oldCost - recipeEffectiveCost(cheapest)) * mealMult;
        if (saving > 0 && (!bestSwap || saving > bestSwap.saving)) {
          bestSwap = {day, mealKey, newId: cheapest.id, saving};
        }
      }
    }
    if (!bestSwap) break; // plus rien à substituer
    days[bestSwap.day][bestSwap.mealKey] = bestSwap.newId;
  }
  return days;
}

// ----- Ingredient aggregation (shopping list) ------------------------------
function aggregateShoppingList(weekMenu, profile) {
  const activeSlots = getAllActiveSlots(profile); // inclut dessert + snack si activé
  const agg = {}; // key = `${lcName}|${unit}` → {name, qty, unit, category}
  DAYS.forEach(day => {
    const slot = weekMenu[day] || {};
    const attendance = slot.attendance || {};
    activeSlots.forEach(meal => {
      const rid = slot[meal];
      if (!rid) return;
      const recipe = RECIPES.find(r => r.id === rid);
      if (!recipe) return;
      // Multiplicateur par repas basé sur l'attendance (défaut = toute la famille)
      const attendees = attendance[meal]; // peut être undefined
      const mult = mealEquivalents(profile, attendees);
      if (mult <= 0) return; // personne présent → on n'ajoute rien
      recipe.ing.forEach(([name, qty, unit, category]) => {
        // Canonicalisation pour fusionner Avocat/Avocat mûr/Avocats, et gousse/gousses, etc.
        let cName = canonicalName(name);
        let cUnit = dataRef.canonicalUnit(unit);
        let cQty = qty;
        // Pour les fruits/légumes référencés, on normalise vers leur forme de base
        // (ex: "Pomme râpée" → "Pomme") et on convertit g → pièces via poids moyen.
        if (category === "produce") {
          const weight = dataRef.produceUnitWeight(cName);
          if (weight != null) {
            const stripped = stripProducePrep(cName);
            if (stripped !== cName && dataRef.ingredient(stripped)?.weightPerPiece != null) {
              cName = stripped;
            }
            if (cUnit === "g") {
              cQty = qty / weight;
              cUnit = "u";
            }
          }
        }
        // Clé enrichie de la catégorie pour éviter la fusion accidentelle entre
        // des items homonymes de catégories différentes (rare mais possible).
        const key = `${cName}|${cUnit}|${category}`;
        if (!agg[key]) {
          agg[key] = {name: displayCanonName(cName), qty: 0, unit: cUnit, category};
        }
        agg[key].qty += scaleQty(cQty, mult, cName, category);
      });
    });
  });
  // group by category
  const byCat = {};
  Object.values(agg).forEach(item => {
    if (!byCat[item.category]) byCat[item.category] = [];
    byCat[item.category].push(item);
  });
  // sort each by name
  Object.values(byCat).forEach(list => list.sort((a,b) => a.name.localeCompare(b.name, "fr")));
  return byCat;
}
function estimateWeekCost(weekMenu, profile) {
  const activeSlots = getAllActiveSlots(profile);
  let total = 0;
  DAYS.forEach(day => {
    const slot = weekMenu[day] || {};
    const attendance = slot.attendance || {};
    activeSlots.forEach(meal => {
      const rid = slot[meal];
      if (!rid) return;
      const recipe = RECIPES.find(r => r.id === rid);
      if (!recipe) return;
      const attendees = attendance[meal];
      const mult = mealEquivalents(profile, attendees);
      if (mult <= 0) return;
      total += recipeEffectiveCost(recipe) * mult;
    });
  });
  return total;
}

// Modal de bienvenue affiché au tout premier lancement (RGPD V2.11.0).
// Bloque l'accès à l'app tant que l'utilisateur n'a pas pris connaissance
// du modèle « 100 % local, aucun serveur ». Une fois validé, on persiste
// `consentedAt: <ISO>` dans le household pour ne plus l'afficher.
function ConsentModal({onConsent}) {
  return (

// AppLoader (V2.11.0) : entoure App pour gérer le chargement async (déchiffrement
// au démarrage). Trois phases : "loading" → "ready" → App, ou "recovery" si la
// clé maître est absente alors qu'un blob chiffré existe.
function AppLoader() {
  const [phase, setPhase] = useState("loading"); // "loading" | "ready" | "recovery"
  const [initialState, setInitialState] = useState(null);

  useEffect(() => {
    loadState()
      .then(s => { setInitialState(s); setPhase("ready"); })
      .catch(e => {
        if (e?.code === "CRYPTO_KEY_MISSING") {
          console.warn("[AppLoader] Clé absente, écran de récupération");
          setPhase("recovery");
        } else {
          console.error("[AppLoader] Échec du chargement :", e);
          setPhase("recovery"); // fallback générique : on propose les mêmes options
        }
      });
  }, []);

  if (phase === "loading") {
    return (
      <div className="fixed inset-0 flex items-center justify-center bg-slate-50 dark:bg-slate-800">
        <div className="text-center">
          <div className="text-3xl mb-3">🥗</div>
          <div className="text-slate-600 dark:text-slate-300 text-sm">Chargement…</div>
        </div>
      </div>
    );
  }
  if (phase === "recovery") {
    return <RecoveryView onResolved={() => window.location.reload()} />;
  }
  return <App initialState={initialState} />;
}

// RecoveryView (V2.11.0) : affiché si on a un blob chiffré dans localStorage
// mais plus de clé en IndexedDB (cas rare : nettoyage navigateur, ITP Safari
// sur PWA inutilisée pendant ≥7 jours, réinstallation). Deux chemins propres.
function RecoveryView({onResolved}) {
  const fileInputRef = useRef(null);
  const [status, setStatus] = useState(null); // {type, msg}

  const onFileSelected = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setStatus({type:"info", msg:"Lecture du fichier…"});
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      // V2.14.3 : on accepte plusieurs formes
      //  - export standard : { schema: "menu-ig-bas-export", data: { schema: 2, households, ... } }
      //  - V2 brut : { schema: 2, households, ... }
      //  Les exports chiffrés (data.encrypted) ne sont PAS récupérables ici car
      //  on n'a justement pas la clé d'origine — on tombe en erreur explicite.
      let v2 = null;
      if (data?.schema === "menu-ig-bas-export" && data?.data?.schema === 2 && data?.data?.households) {
        v2 = data.data;
      } else if (data?.schema === 2 && data?.households) {
        v2 = data;
      } else if (data?.schema === "menu-ig-bas-export" && data?.data?.encrypted) {
        setStatus({type:"error", msg:"Cet export est chiffré et nécessite la clé d'origine, qui a disparu. Utilise un export plus ancien (non chiffré) si tu en as un."});
        return;
      }
      if (!v2) {
        setStatus({type:"error", msg:"Format de fichier non reconnu (besoin d'un export Menu IG Bas, format V2 en clair)"});
        return;
      }
      // Re-chiffre avec la nouvelle clé locale (qui sera générée par cryptoStore.encrypt).
      const envelope = await cryptoStore.encrypt(JSON.stringify(v2));
      localStorage.setItem(STORAGE_KEY_V2, JSON.stringify(envelope));
      setStatus({type:"success", msg:"Import réussi, rechargement…"});
      setTimeout(onResolved, 800);
    } catch (e) {
      console.error("[Recovery] Import échoué :", e);
      setStatus({type:"error", msg: "Import échoué : " + (e.message || "fichier invalide")});
    }
  };

  const onReset = async () => {
    if (!confirm("Tout effacer définitivement ? Toutes tes données locales seront perdues.")) return;
    try {
      localStorage.removeItem(STORAGE_KEY_V2);
      localStorage.removeItem(STORAGE_KEY_V1);
      await cryptoStore.deleteKey();
      onResolved();
    } catch (e) {
      console.error("[Recovery] Reset échoué :", e);
      setStatus({type:"error", msg:"Reset échoué : " + (e.message || "erreur inconnue")});
    }
  };

  return (
    <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-50 p-4 overflow-auto">
      <div className="bg-white dark:bg-slate-800 rounded-lg shadow-xl border border-slate-200 dark:border-slate-700 max-w-xl w-full p-6 my-8">
        <h2 className="text-xl font-bold text-amber-700 dark:text-amber-300 mb-2">🔓 Données chiffrées sans clé</h2>
        <p className="text-sm text-slate-700 dark:text-slate-200 mb-3">
          Tes données sont présentes dans le navigateur mais <strong>la clé de chiffrement
          n'est plus accessible</strong>. Elles ne peuvent donc pas être lues.
        </p>
        <p className="text-xs text-slate-500 dark:text-slate-400 mb-5">
          Cela arrive typiquement après un nettoyage de stockage du navigateur, ou sur Safari iOS
          si l'app n'a pas été ouverte pendant plusieurs jours (politique ITP). Deux options :
        </p>

        <div className="space-y-3">
          <div className="border border-emerald-200 dark:border-emerald-800 bg-emerald-50 dark:bg-emerald-950 rounded p-3">
            <div className="font-semibold text-emerald-900 dark:text-emerald-100 mb-2">📥 Restaurer depuis un export JSON</div>
            <p className="text-xs text-slate-600 dark:text-slate-300 mb-3">
              Si tu as un fichier <code>menu-ig-bas-export-*.json</code> récent, sélectionne-le.
              Tes données seront re-chiffrées avec une nouvelle clé locale.
            </p>
            <input ref={fileInputRef} type="file" accept=".json,application/json"
              onChange={onFileSelected} className="hidden" />
            <button onClick={() => fileInputRef.current?.click()}
              className="bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium px-4 py-2 rounded">
              Choisir un fichier JSON…
            </button>
          </div>

          <div className="border border-red-200 dark:border-red-800 bg-red-50 dark:bg-red-950 rounded p-3">
            <div className="font-semibold text-red-900 dark:text-red-100 mb-2">🗑️ Tout réinitialiser</div>
            <p className="text-xs text-slate-600 dark:text-slate-300 mb-3">
              Si tu n'as pas de backup, tu peux repartir à zéro. Toutes les données chiffrées
              seront supprimées définitivement.
            </p>
            <button onClick={onReset}
              className="bg-red-600 hover:bg-red-700 text-white text-sm font-medium px-4 py-2 rounded">
              Tout effacer et recommencer
            </button>
          </div>
        </div>

        {status && (
          <div className={`mt-4 text-sm rounded px-3 py-2 ${
            status.type === "error" ? "bg-red-100 dark:bg-red-900 text-red-800 dark:text-red-200" :
            status.type === "success" ? "bg-emerald-100 dark:bg-emerald-900 text-emerald-800 dark:text-emerald-200" :
            "bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200"
          }`}>{status.msg}</div>
        )}
      </div>
    </div>
  );
}

function App({initialState}) {
  const [state, setState] = useState(initialState);
  const [currentWeek, setCurrentWeek] = useState(mondayOf(new Date()));
  const [view, setView] = useState(state.onboarded ? "menu" : "setup");
  const [selectedRecipe, setSelectedRecipe] = useState(null);
  const [printMode, setPrintMode] = useState(null); // null | "menu" | "shopping"

  useEffect(() => { saveState(state); }, [state]);

  const update = (updater) => setState(s => ({...s, ...(typeof updater === "function" ? updater(s) : updater)}));
  const updateProfile = (patch) => update(s => ({profile: {...s.profile, ...patch}}));

  const wk = weekKey(currentWeek);
  const currentMenu = state.menus[wk] || {};

  const regenerate = ({keepLocked = true} = {}) => {
    const days = generateWeek({
      profile: state.profile,
      ratings: state.ratings,
      menus: state.menus,
      weekStart: currentWeek,
      keepLocked,
    });
    update(s => ({menus: {...s.menus, [wk]: days}}));
  };
  const regenerateSlot = (day, meal) => {
    const season = getSeason(currentWeek);
    let pool = RECIPES.filter(r =>
      r.type === meal &&
      matchesSeason(r, season) &&
      !recipeHasAllergen(r, effectiveAllergies(state.profile, null)) &&
      !recipeHasExcluded(r, state.profile.globalExclusions) &&
      recipeRespectsEquipment(r, state.profile.equipment) &&
      recipeRespectsTime(r, state.profile.maxPrepMinutes) &&
      recipeRespectsSkill(r, state.profile.skillLevel) &&
      (state.ratings[r.id] ?? 3) >= 3
    );
    // avoid current week for same type
    const used = new Set();
    DAYS.forEach(d => {
      const slot = currentMenu[d] || {};
      if (meal === "lunch" || meal === "dinner") {
        if (slot.lunch && (d !== day || meal !== "lunch")) used.add(slot.lunch);
        if (slot.dinner && (d !== day || meal !== "dinner")) used.add(slot.dinner);
      } else if (meal === "dessert" || meal === "snack") {
        if (slot[meal] && d !== day) used.add(slot[meal]);
      }
    });
    // Cooldown 8 jours : pour dessert/snack, on étend l'évitement aux 7 jours précédents.
    if (meal === "dessert" || meal === "snack") {
      recentMealSlots(state.menus, currentWeek, meal, 7).forEach(id => used.add(id));
    }
    // Anti-staple : si on régénère un lunch (resp. dinner) et qu'il y a déjà un dinner (resp. lunch)
    // ce jour-là, on évite les recettes partageant féculent ou légumineuse.
    if (meal === "lunch" || meal === "dinner") {
      const otherMeal = meal === "lunch" ? "dinner" : "lunch";
      const otherId = currentMenu[day]?.[otherMeal];
      const otherRecipe = otherId ? RECIPES.find(r => r.id === otherId) : null;
      if (otherRecipe) {
        const otherStaples = recipeStaples(otherRecipe);
        if (otherStaples.size > 0) {
          const filtered = pool.filter(r => {
            const ds = recipeStaples(r);
            for (const s of otherStaples) if (ds.has(s)) return false;
            return true;
          });
          if (filtered.length >= 3) pool = filtered;
        }
      }
    }
    const isMain = (meal === "lunch" || meal === "dinner");
    const {set: softAvoid, lastUsedMap} = isMain
      ? recipesUsedInLast3Months(state.menus, currentWeek)
      : {set: new Set(), lastUsedMap: new Map()};
    const picked = pickFromPool(pool, {hardAvoid: used, softAvoid, lastUsedMap, ratings: state.ratings});
    if (picked) {
      update(s => ({menus: {...s.menus, [wk]: {...s.menus[wk], [day]: {...(s.menus[wk]?.[day]||{}), [meal]: picked.id}}}}));
    }
  };
  const toggleLock = (day, meal) => {
    update(s => {
      const daySlot = s.menus[wk]?.[day] || {};
      const locked = {...(daySlot.locked||{})};
      locked[meal] = !locked[meal];
      return {menus: {...s.menus, [wk]: {...(s.menus[wk]||{}), [day]: {...daySlot, locked}}}};
    });
  };
  const replaceSlot = (day, meal, recipeId) => {
    update(s => ({
      menus: {...s.menus, [wk]: {...(s.menus[wk]||{}), [day]: {...(s.menus[wk]?.[day]||{}), [meal]: recipeId}}},
    }));
  };
  const rateRecipe = (rid, score) => {
    update(s => ({ratings: {...s.ratings, [rid]: score}}));
  };
  const togglePantry = (key) => {
    update(s => ({pantryChecks: {...s.pantryChecks, [wk]: {...(s.pantryChecks[wk]||{}), [key]: !s.pantryChecks[wk]?.[key]}}}));
  };
  // Présence par repas : ids = null → reset (tous présents), sinon liste d'ids
  const setAttendance = (day, meal, ids) => {
    update(s => {
      const daySlot = s.menus[wk]?.[day] || {};
      const prevAtt = daySlot.attendance || {};
      const nextAtt = {...prevAtt};
      if (ids == null) delete nextAtt[meal];
      else nextAtt[meal] = ids;
      return {menus: {...s.menus, [wk]: {...(s.menus[wk]||{}), [day]: {...daySlot, attendance: nextAtt}}}};
    });
  };

  // Print trigger
  useEffect(() => {
    if (printMode) {
      const timer = setTimeout(() => {
        window.print();
        setPrintMode(null);
      }, 300);
      return () => clearTimeout(timer);
    }
  }, [printMode]);

  // Modal de consentement RGPD (V2.11.0) : bloque l'app tant que pas validé.
  // On le rend en plus du reste pour ne pas dérouter l'utilisateur (pas
  // d'écran blanc), mais le z-50 backdrop-blur assure le côté bloquant.
  if (!state.consentedAt) {
    return <ConsentModal onConsent={() => update({consentedAt: new Date().toISOString()})} />;
  }

  if (printMode === "menu") return <PrintMenuPage weekStart={currentWeek} menu={currentMenu} profile={state.profile} />;
  if (printMode === "shopping") return <PrintShoppingPage weekStart={currentWeek} menu={currentMenu} profile={state.profile} pantryChecks={state.pantryChecks[wk]||{}} />;

  return (
    <div className="min-h-screen flex flex-col">
      <TopBar view={view} setView={setView} />
      <main className="flex-1 container mx-auto px-4 py-6 max-w-7xl">
        {view === "setup" && (
          <SetupView state={state} update={update} updateProfile={updateProfile}
            onDone={() => { update({onboarded:true}); regenerate({keepLocked:false}); setView("menu"); }} />
        )}
        {view === "menu" && (
          <MenuView
            state={state}
            currentWeek={currentWeek}
            setCurrentWeek={setCurrentWeek}
            currentMenu={currentMenu}
            regenerate={regenerate}
            regenerateSlot={regenerateSlot}
            toggleLock={toggleLock}
            replaceSlot={replaceSlot}
            setAttendance={setAttendance}
            onSelectRecipe={(id, opts) => setSelectedRecipe({id, day: opts?.day, meal: opts?.meal})}
            onPrint={() => setPrintMode("menu")}
            onShopping={() => setView("shopping")}
          />
        )}
        {view === "library" && (
          <LibraryView state={state} onSelectRecipe={(id) => setSelectedRecipe({id})} rateRecipe={rateRecipe} />
        )}
        {view === "shopping" && (
          <ShoppingView
            currentWeek={currentWeek}
            currentMenu={currentMenu}
            profile={state.profile}
            pantryChecks={state.pantryChecks[wk]||{}}
            onTogglePantry={togglePantry}
            onPrint={() => setPrintMode("shopping")}
          />
        )}
        {view === "history" && (
          <HistoryView state={state} setCurrentWeek={setCurrentWeek} onGo={() => setView("menu")} />
        )}
        {view === "month" && (
          <MonthView
            state={state}
            currentWeek={currentWeek}
            setCurrentWeek={setCurrentWeek}
            update={update}
            onGoToWeek={(w) => { setCurrentWeek(w); setView("menu"); }}
          />
        )}
        {view === "settings" && (
          <SettingsView state={state} update={update} updateProfile={updateProfile} />
        )}
      </main>
      {selectedRecipe && (
        <RecipeModal
          recipe={RECIPES.find(r => r.id === selectedRecipe.id)}
          profile={state.profile}
          attendees={selectedRecipe.day && selectedRecipe.meal
            ? currentMenu[selectedRecipe.day]?.attendance?.[selectedRecipe.meal]
            : undefined}
          rating={state.ratings[selectedRecipe.id]}
          onRate={(s) => rateRecipe(selectedRecipe.id, s)}
          onClose={() => setSelectedRecipe(null)}
        />
      )}
      <footer className="no-print bg-slate-900 text-slate-400 dark:text-slate-500 text-center py-3 text-xs">
        Menu IG Bas {(/V\d+\.\d+\.\d+/.exec(document.title)?.[0]) || ""} — prototype local • Données stockées dans votre navigateur ·{" "}
        <a href="https://github.com/RhoMark/menu-ig-bas/blob/main/PRIVACY.md"
          target="_blank" rel="noopener noreferrer"
          className="underline hover:text-slate-200">Confidentialité</a>
      </footer>
    </div>
  );
}

// ----- ThemeToggle (V2.16.0) ------------------------------------------------
// Cycle 3 états : auto (suit prefers-color-scheme), light (forcé), dark (forcé).
// Persistance dans un localStorage SÉPARÉ ("menu-ig-bas-theme") — non chiffré
// car ce n'est pas une donnée santé. Ce stockage à part permet d'appliquer le
// thème AVANT le déchiffrement du V2 envelope (cf. <script> bootstrap dans
// <head>) et d'éviter le flash de page blanche au boot.
const THEME_STORAGE_KEY = "menu-ig-bas-theme";
function ThemeToggle() {
  const [theme, setTheme] = useState(() => localStorage.getItem(THEME_STORAGE_KEY) || "auto");
  // Applique le thème : auto → suit le système, sinon force la classe.
  useEffect(() => {
    const root = document.documentElement;
    let dark;
    if (theme === "auto") {
      localStorage.removeItem(THEME_STORAGE_KEY);
      dark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    } else {
      localStorage.setItem(THEME_STORAGE_KEY, theme);
      dark = theme === "dark";
    }
    root.classList.toggle("dark", dark);
  }, [theme]);
  // En mode auto, on suit les changements système (l'OS bascule à 19h par ex.)
  useEffect(() => {
    if (theme !== "auto" || !window.matchMedia) return;
    const mq = window.matchMedia("(prefers-color-scheme: dark)");
    const handler = (e) => document.documentElement.classList.toggle("dark", e.matches);
    mq.addEventListener("change", handler);
    return () => mq.removeEventListener("change", handler);
  }, [theme]);
  const cycle = () => setTheme(t => t === "auto" ? "light" : t === "light" ? "dark" : "auto");
  const icon  = theme === "auto" ? "🌓" : theme === "dark" ? "🌙" : "☀️";
  const label = theme === "auto" ? "Auto" : theme === "dark" ? "Sombre" : "Clair";
  return (
    <button onClick={cycle}
      title={`Thème : ${label} — clic pour changer`}
      aria-label={`Thème ${label}`}
      className="no-print px-3 py-2 rounded-md text-sm font-medium hover:bg-emerald-600/50 transition flex items-center gap-1.5 text-white">
      <span className="text-base">{icon}</span>
      <span className="hidden sm:inline">{label}</span>
    </button>
  );
}
