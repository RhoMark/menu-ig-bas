<script type="text/babel" data-presets="env,react">
// ============================================================================
// MENU IG BAS — V1
// App monofichier React. Stockage localStorage pour persistance basique.
// ============================================================================

const { useState, useEffect, useMemo, useReducer, useRef } = React;
const RECIPES = loadRefBlock("data-recipes", {items: []}).items;

// ----- Constantes ----------------------------------------------------------
const DAYS = ["lundi","mardi","mercredi","jeudi","vendredi","samedi","dimanche"];
const DAYS_SHORT = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
const ALL_MEALS = [
  {key:"breakfast", label:"Petit-déjeuner", icon:"☀️"},
  {key:"lunch",     label:"Déjeuner",       icon:"🥗"},

  {key:"dinner",    label:"Dîner",          icon:"🌙"},
  {key:"dessert",   label:"Dessert",        icon:"🍰"},
];
// Repas "plats principaux" (hors dessert rattaché) pour la génération et l'affichage principal
function getMealsForProfile(profile) {
  const meals = [
    {key:"breakfast", label:"Petit-déjeuner", icon:"☀️"},
    {key:"lunch",     label:"Déjeuner",       icon:"🥗"},
  ];
  if (profile?.snackEnabled) meals.push({key:"snack", label:"Goûter", icon:"🍪"});
  meals.push({key:"dinner", label:"Dîner", icon:"🌙"});
  return meals;
}
// Tous les slots (inclut dessert) pour aggrégation liste de courses
function getAllActiveSlots(profile) {
  const slots = ["breakfast", "lunch"];
  if (profile?.snackEnabled) slots.push("snack");
  slots.push("dinner");
  slots.push("dessert"); // dessert toujours présent, rattaché selon dessertTime
  return slots;
}
// Compatibilité : conservé pour certains helpers existants
const MEALS = [
  {key:"breakfast", label:"Petit-déjeuner", icon:"☀️"},
  {key:"lunch",     label:"Déjeuner",       icon:"🥗"},
  {key:"dinner",    label:"Dîner",          icon:"🌙"},
];
// ----- Couche d'accès aux données de référence (V2 — base JSON locale) -----
// Les données de référence (catégories, allergènes, équipements, unités,
// ingrédients, tags) sont stockées dans des balises <script type="application/json">
// en haut du <body>. Cette section :
//  - charge ces blocs au démarrage (loadRefBlock + REF)
//  - expose une API stable (`dataRef.*`) que le reste de l'app utilise
// À terme : remplacer le chargement local par un fetch vers une API serveur,
// sans toucher au code des composants ni des helpers.
function loadRefBlock(id, fallback) {
  try {
    const el = document.getElementById(id);
    if (!el) { console.error(`[dataRef] bloc manquant: #${id}`); return fallback; }
    return JSON.parse(el.textContent);
  } catch (e) {
    console.error(`[dataRef] JSON invalide #${id}:`, e);
    return fallback;
  }
}
const REF = (() => {
  const categories  = loadRefBlock("data-categories",  {items:[]}).items;
  const allergens   = loadRefBlock("data-allergens",   {items:[]}).items;
  const equipment   = loadRefBlock("data-equipment",   {items:[]}).items;
  const tags        = loadRefBlock("data-tags",        {items:[]}).items;
  const ingredients = loadRefBlock("data-ingredients", {items:[]}).items;
  const unitsData   = loadRefBlock("data-units",       {items:[], aliases:{}});
  const ingredientsById = new Map(ingredients.map(i => [i.id, i]));
  const unitsById       = new Map(unitsData.items.map(u => [u.id, u]));
  return {
    categories, allergens, equipment, tags,
    ingredients, ingredientsById,
    units: unitsData.items, unitsById,
    unitAliases: unitsData.aliases,
  };
})();
const dataRef = {
  // ----- Catégories rayon -----
  categoryLabel(id) {
    const c = REF.categories.find(c => c.id === id);
    return c ? c.label : id;
  },
  // ----- Allergènes -----
  allergens() { return REF.allergens; },
  allergenLabel(id) {
    const a = REF.allergens.find(a => a.id === id);
    return a ? a.label : id;
  },
  // ----- Équipement de cuisine -----
  equipment() { return REF.equipment; },
  // ----- Unités -----
  canonicalUnit(unit) {
    const u = (unit || "").toString().trim().toLowerCase();
    return REF.unitAliases[u] || u;
  },
  isDiscreteUnit(unit) {
    const u = dataRef.canonicalUnit(unit);
    const def = REF.unitsById.get(u);
    return def ? def.type === "discrete" : false;
  },
  // ----- Ingrédients -----
  ingredient(id) { return REF.ingredientsById.get(id) || null; },
  // Renvoie le poids/pièce (g) si l'ingrédient référencé est unitaire, sinon null.
  // Tente d'abord le nom canonique direct, puis le nom strippé des marqueurs de
  // préparation (râpée, hachée, mûre…).
  produceUnitWeight(canonName) {
    if (!canonName) return null;
    const direct = REF.ingredientsById.get(canonName);
    if (direct && direct.weightPerPiece != null) return direct.weightPerPiece;
    const stripped = stripProducePrep(canonName);
    if (stripped !== canonName) {
      const ind = REF.ingredientsById.get(stripped);
      if (ind && ind.weightPerPiece != null) return ind.weightPerPiece;
    }
    return null;
  },
  // ----- Tags -----
  tagLabel(id) {
    const t = REF.tags.find(t => t.id === id);
    return t ? t.label : id;
  },
};
const SEASON_FR = {spring:"Printemps", summer:"Été", autumn:"Automne", winter:"Hiver"};

// ----- Validation catalogue ingrédients ------------------------------------
// Au démarrage, on parcourt toutes les recettes et on vérifie que chaque
// ingrédient (nom canonisé) a bien une entrée dans `data-ingredients`.
// Tout manquant est listé en console.warn pour faciliter l'enrichissement
// progressif du catalogue (cf. roadmap V2.1.x).
function validateRecipeCatalog(recipes, catalog) {
  const catalogIds = new Set(catalog.map(c => c.id));
  const missing = new Map();
  recipes.forEach(r => {
    r.ing.forEach(([name]) => {
      const k = canonicalName(name);
      if (!k) return;
      if (!catalogIds.has(k)) {
        if (!missing.has(k)) missing.set(k, {original: name, count: 0, recipes: new Set()});
        const m = missing.get(k);
        m.count++; m.recipes.add(r.id);
      }
    });
  });
  if (missing.size === 0) {
    console.log(`[catalogue] ✅ ${recipes.length} recettes — 100% des ingrédients ont une entrée catalogue (${catalog.length} entrées)`);
    return {ok: true, missing: []};
  }
  const list = [...missing.entries()].sort((a, b) => b[1].count - a[1].count);
  console.warn(`[catalogue] ⚠️ ${missing.size} ingrédient(s) sans entrée catalogue (sur ${catalog.length} entrées) :`);
  list.forEach(([k, info]) => console.warn(`  • "${info.original}" → canon="${k}" — utilisé ${info.count}× (recettes : ${[...info.recipes].slice(0,3).join(", ")}${info.recipes.size>3?", …":""})`));
  return {ok: false, missing: list.map(([k, info]) => ({canon: k, original: info.original, count: info.count, recipes: [...info.recipes]}))};
}
// Exposer le résultat sur window pour debug et future intégration UI.
window.__catalogValidation = validateRecipeCatalog(RECIPES, REF.ingredients);

// ----- Helpers -------------------------------------------------------------
function mondayOf(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const day = (d.getDay() + 6) % 7; // 0=Mon
  d.setDate(d.getDate() - day);
  return d;
}
function addDays(d, n){ const x = new Date(d); x.setDate(x.getDate()+n); return x; }
function weekKey(d){ const m = mondayOf(d); return m.toISOString().slice(0,10); }
function formatDateFR(d){
  return d.toLocaleDateString("fr-FR", {weekday:"long", day:"numeric", month:"long"});
}
function formatShort(d){
  return d.toLocaleDateString("fr-FR", {day:"numeric", month:"short"});
}
function getSeason(date) {
  const m = (date.getMonth()+1);
  if (m>=3 && m<=5) return "spring";
  if (m>=6 && m<=8) return "summer";
  if (m>=9 && m<=11) return "autumn";
  return "winter";
}
function matchesSeason(recipe, season) {
  return recipe.seasons.includes("all") || recipe.seasons.includes(season);
}
// Échelle d'équivalents adultes révisée — tient compte de l'appétit des ados.
// Base : 1 = adulte 18-65 ans. Les ados en pleine croissance mangent souvent
// plus qu'un adulte moyen, d'où le coefficient 1.2 sur 12-17 ans.
// Référence indicative : ANSES (besoins caloriques par tranche d'âge).
function adultEquivalent(member) {
  const a = member.age;
  if (a <= 3)  return 0.35;  // petit enfant
  if (a <= 7)  return 0.55;  // enfant
  if (a <= 11) return 0.80;  // pré-ado
  if (a <= 17) return 1.20;  // ado (pic d'appétit, surtout garçons)
  if (a <= 65) return 1.00;  // adulte
  return 0.85;                // sénior
}
function totalEquivalents(profile) {
  if (!profile.members?.length) return 1;
  return profile.members.reduce((s,m) => s + adultEquivalent(m), 0);
}
// Équivalents pour un repas donné, en tenant compte de l'attendance (qui est présent)
function mealEquivalents(profile, attendees) {
  if (!profile.members?.length) return 1;
  if (!attendees || !Array.isArray(attendees) || attendees.length === 0) {
    // attendees non défini = tout le monde présent (défaut)
    return profile.members.reduce((s,m) => s + adultEquivalent(m), 0);
  }
  return profile.members
    .filter(m => attendees.includes(m.id))
    .reduce((s,m) => s + adultEquivalent(m), 0) || 0;
}
function ingredientHasAllergen(ing, allergens) {
  // Very conservative: allergens are declared on recipe level. No fuzzy match.
  return false;
}
function recipeHasAllergen(recipe, allergens) {
  if (!allergens?.length) return false;
  return recipe.allergens.some(a => allergens.includes(a));
}
function recipeHasExcluded(recipe, exclusions) {
  if (!exclusions?.length) return false;
  const lcExcl = exclusions.map(e => e.toLowerCase().trim()).filter(Boolean);
  return recipe.ing.some(([name]) =>
    lcExcl.some(ex => name.toLowerCase().includes(ex))
  );
}
function recipeRespectsEquipment(recipe, availEq) {
  if (!availEq?.length) return true;
  return recipe.eq.every(e => availEq.includes(e));
}
function recipeRespectsTime(recipe, maxMinutes) {
  if (!maxMinutes) return true;
  return (recipe.prep + recipe.cook) <= maxMinutes;
}
// Rendu "joli" d'un nombre : fractions unicode pour ¼ ½ ¾ ⅓ ⅔ (tolérance ±0.03),
// sinon décimal arrondi au 0.1 avec virgule française.
function prettyNumber(qty) {
  const FRACS = [[0.25,"¼"],[1/3,"⅓"],[0.5,"½"],[2/3,"⅔"],[0.75,"¾"]];
  const whole = Math.floor(qty + 1e-9);
  const frac = qty - whole;
  if (Math.abs(frac) < 0.03) return String(whole);
  for (const [v, sym] of FRACS) {
    if (Math.abs(frac - v) < 0.03) return whole > 0 ? `${whole} ${sym}` : sym;
  }
  const rounded = Math.round(qty * 10) / 10;
  return Number.isInteger(rounded) ? String(rounded) : String(rounded).replace(".", ",");
}

// Formatage d'une quantité d'ingrédient dans une recette (avec fractions autorisées).
// name optionnel : si fourni et que l'unité est "u" et que l'ingrédient est un fruit/légume
// référencé, on affiche "N (≈Xg/pièce)" pour que l'utilisateur voie le poids d'une pièce.
function formatQty(qty, unit, name) {
  const u = dataRef.canonicalUnit(unit);
  if (u === "u" && name) {
    const w = dataRef.produceUnitWeight(canonicalName(name));
    if (w) {
      const total = Math.round(qty * w);
      return `${prettyNumber(qty)} u (≈${w} g/pièce soit ${total} g)`;
    }
  }
  const rounded = Math.round(qty * 10) / 10;
  const asStr = Number.isInteger(rounded) ? String(rounded) : String(rounded).replace(".", ",");
  return `${asStr} ${unit}`;
}
// ----- Canonicalisation des ingrédients pour la liste de courses -----------
// On agrège les ingrédients équivalents (Avocat / Avocat mûr / Avocats →
// "Avocat") pour ne pas avoir 2 lignes pour la même chose, et pour mieux
// déclencher la conversion kg/L (totaux fusionnés plus élevés).
// Note : la canonicalisation et la classification des unités sont désormais
// portées par dataRef.canonicalUnit() / dataRef.isDiscreteUnit() (cf. data-units).
// Canonicalisation du nom : minuscule, sans accents, sans parenthèses, sans
// qualificatifs ("mûr", "frais", "en boîte", etc.), au singulier.
function canonicalName(name) {
  let n = (name || "").toString().trim().toLowerCase();
  n = n.replace(/œ/g, "oe").replace(/æ/g, "ae");
  // strip accents
  n = n.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  // remove parenthetical content : "Citron (jus)" → "Citron"
  n = n.replace(/\s*\([^)]*\)\s*/g, " ");
  // remove tail descriptors after comma : "Citron, jus" → "Citron"
  n = n.replace(/,.*$/, "");
  // remove qualifiers that don't change the shopping item
  const descriptors = /\b(mur|mure|murs|mures|frais|fraiche|fraiches|congele|congelee|congeles|congelees|surgele|surgelee|surgeles|surgelees|sec|seche|secs|seches|cuit|cuite|cuits|cuites|en boite|en boites|en bocal|degoutte|degouttee|egoutte|egouttee|nature|entier|entiere|complet|complete|complets|completes|bio|jeune|nouveau|nouvelle|grosse|gros|petite|petit|fume|fumee|fumes|fumees)\b/g;
  n = n.replace(descriptors, " ");
  // collapse spaces
  n = n.replace(/\s+/g, " ").trim();
  // singularize each word >3 chars finissant en "s" (sauf as/os/us/is comme "ananas", "pois", "riz")
  n = n.split(" ").map(w => {
    if (w.length > 3 && w.endsWith("s") && !/(as|os|us|is)$/.test(w)) return w.slice(0, -1);
    return w;
  }).join(" ");
  return n;
}
// Renvoie le label affiché (canonique en majuscule initiale)
function displayCanonName(canon) {
  if (!canon) return "";
  return canon.charAt(0).toUpperCase() + canon.slice(1);
}

// Fruits/légumes : la table de poids/pièce vit désormais dans <script id="data-ingredients">,
// et la résolution se fait via dataRef.produceUnitWeight() (cf. couche d'accès données).
// Descripteurs de préparation ("râpée", "hachée", "pelée"...) stripés SEULEMENT
// pour les produce : permet de fusionner "Pomme râpée" et "Pomme" au panier.
// On ne le fait pas globalement car ces descripteurs sont porteurs de sens
// pour d'autres catégories (ex : "Dinde hachée" ≠ "Dinde", "Tomates pelées" en pantry).
const PRODUCE_PREP_RE = /\b(bien|rape|rapee|rapes|rapees|hache|hachee|haches|hachees|emince|emincee|eminces|emincees|mixe|mixee|mixes|mixees|coupe|coupee|coupes|coupees|pele|pelee|peles|pelees|ecosse|ecossee|ecosses|ecossees|blanchi|blanchie|blanchis|blanchies)\b/g;
function stripProducePrep(canonName) {
  const s = (canonName || "").replace(PRODUCE_PREP_RE, " ").replace(/\s+/g, " ").trim();
  return s || canonName;
}

// Format spécifique liste de courses :
//   - produce en "u" avec poids connu → "N (≈Xg/pièce)" (N arrondi entier sup.)
//   - produce en "g" (vendu au poids) → arrondi au multiple de 50g (<500) ou 100g (≥500)
//   - g/ml → kg/L au-delà de 1000
//   - unités discrètes (u, gousse, tranche...) → entier supérieur (ceil)
function formatQtyShopping(qty, unit, name, category) {
  const u = dataRef.canonicalUnit(unit);
  const canon = name ? canonicalName(name) : null;
  const weight = canon ? dataRef.produceUnitWeight(canon) : null;
  // Produce "vendu au poids" → arrondi aux paliers 50g / 100g (avant conversion kg)
  if (u === "g" && category === "produce") {
    let rounded;
    if (qty < 500) rounded = Math.ceil(qty / 50) * 50;
    else rounded = Math.ceil(qty / 100) * 100;
    if (rounded >= 1000) {
      const kg = Math.round((rounded / 1000) * 100) / 100;
      const asStr = Number.isInteger(kg) ? String(kg) : String(kg).replace(".", ",");
      return `${asStr} kg`;
    }
    return `${rounded} g`;
  }
  if ((u === "g") && qty >= 1000) {
    const kg = qty / 1000;
    const rounded = Math.round(kg * 100) / 100;
    const asStr = Number.isInteger(rounded) ? String(rounded) : String(rounded).replace(".", ",");
    return `${asStr} kg`;
  }
  if ((u === "ml") && qty >= 1000) {
    const l = qty / 1000;
    const rounded = Math.round(l * 100) / 100;
    const asStr = Number.isInteger(rounded) ? String(rounded) : String(rounded).replace(".", ",");
    return `${asStr} L`;
  }
  if (dataRef.isDiscreteUnit(u)) {
    const ceiled = Math.ceil(qty - 1e-9); // 1.7 → 2, 4.0 → 4 (tolérance flottants)
    if (u === "u") {
      if (weight) return `${ceiled} (≈${weight} g/pièce)`;
      return `${ceiled}`;
    }
    return `${ceiled} ${u}`;
  }
  return formatQty(qty, unit, name);
}

// ----- Helpers temps (préparation / cuisson / repos) -----------------------
// Une recette peut déclarer :
//   prep    : minutes de préparation active (obligatoire)
//   cook    : minutes de cuisson (obligatoire)
//   rest    : minutes de repos passif / frigo (optionnel)
//   advance : délai minimum avant service ("30min" | "1h" | "2h" | ... | "veille")
// Le temps "actif" pour le planning = prep+cook. Le rest est affiché à part.
function recipeActiveMinutes(recipe) {
  return (recipe.prep || 0) + (recipe.cook || 0);
}
function recipeRestMinutes(recipe) {
  return recipe.rest || 0;
}
// Retourne un objet {icon, label, shortLabel, minutes} si avance requise, sinon null.
function recipeAdvanceInfo(recipe) {
  if (!recipe.advance) return null;
  const adv = String(recipe.advance).toLowerCase().trim();
  if (adv === "veille" || adv === "nuit" || adv === "overnight") {
    return {icon: "🌙", label: "La veille", shortLabel: "veille", minutes: 720};
  }
  const m = adv.match(/^(\d+)\s*h$/);
  if (m) {
    const h = parseInt(m[1], 10);
    return {icon: "⏰", label: `${h}h à l'avance`, shortLabel: `${h}h`, minutes: h * 60};
  }
  const mm = adv.match(/^(\d+)\s*min$/);
  if (mm) {
    const mins = parseInt(mm[1], 10);
    return {icon: "⏰", label: `${mins}min à l'avance`, shortLabel: `${mins}min`, minutes: mins};
  }
  return {icon: "⏰", label: adv, shortLabel: adv, minutes: 0};
}
// Libellé concis pour l'affichage (rest mis à part).
// Ex: "15min" ou "15min + 2h repos"
function recipeTimeLabel(recipe) {
  const active = recipeActiveMinutes(recipe);
  const rest = recipeRestMinutes(recipe);
  if (!rest) return `${active}min`;
  const restStr = rest >= 60
    ? (rest % 60 === 0 ? `${rest / 60}h` : `${Math.floor(rest / 60)}h${rest % 60}`)
    : `${rest}min`;
  return `${active}min + ${restStr} repos`;
}

// ----- Storage (V2 — modèle multi-tenant household/user) -------------------
// V1 (legacy)  : un seul "profile" + "menus" plats dans localStorage.
// V2 (actuel)  : structure préfigurant la BDD multi-compte :
//   { schema:2, users:{[id]:User}, households:{[id]:Household}, session:{activeUserId, activeHouseholdId} }
//
// Pour ne pas avoir à toucher tous les composants, le RUNTIME state (vu par
// React) reste plat avec les champs `profile`, `menus`, `ratings`, etc. — c'est
// une **projection** du household actif. À l'enregistrement, on re-projette en
// V2 dans le localStorage. Les composants ne savent pas (encore) qu'un modèle
// household existe — ils continueront à fonctionner tels quels.
//
// Migration V1 → V2 : automatique au chargement. V1 est conservé en backup.
const STORAGE_KEY_V1 = "menu-ig-bas-v1";
const STORAGE_KEY_V2 = "menu-ig-bas-v2";
// Champs reconnus dans `preferences` d'un household (whitelist anti-pollution).
const PREF_KEYS = ["location","globalAllergies","globalExclusions","budgetWeekly","equipment","maxPrepMinutes","skillLevel","dessertTime","snackEnabled"];
function makeId(prefix) {
  return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;
}
function emptyHouseholdPreferences() {
  return {
    location: "",
    globalAllergies: [],
    globalExclusions: [],
    budgetWeekly: 120,
    equipment: ["stove","oven","bowl"],
    maxPrepMinutes: 60,
    skillLevel: 2,
    dessertTime: "dinner",
    snackEnabled: false,
  };
}
function emptyHousehold(id) {
  return {
    id,
    members: [{id:1, name:"Adulte 1", age:40, sex:"F"}],
    preferences: emptyHouseholdPreferences(),
    menus: {},
    ratings: {},
    pantry: {},
    journal: {},
    settings: { onboarded: false },
  };
}
function emptyV2State() {
  const userId = makeId("u");
  const householdId = makeId("h");
  return {
    schema: 2,
    users:      { [userId]:      { id: userId, name: "Utilisateur", householdId, createdAt: new Date().toISOString() } },
    households: { [householdId]: emptyHousehold(householdId) },
    session:    { activeUserId: userId, activeHouseholdId: householdId },
  };
}
// Convertit un état V1 (profile + menus + ratings + pantryChecks + journal)
// en état V2 multi-tenant : un user, un household qui hérite des données.
function migrateV1toV2(v1) {
  const userId = makeId("u");
  const householdId = makeId("h");
  const prevProfile = v1.profile || {};
  const {members = [{id:1, name:"Adulte 1", age:40, sex:"F"}], ...prefsFromProfile} = prevProfile;
  return {
    schema: 2,
    users:      { [userId]: { id: userId, name: "Utilisateur", householdId, createdAt: new Date().toISOString() } },
    households: {
      [householdId]: {
        id: householdId,
        members,
        preferences: { ...emptyHouseholdPreferences(), ...prefsFromProfile },
        menus:    v1.menus        || {},
        ratings:  v1.ratings      || {},
        pantry:   v1.pantryChecks || {},
        journal:  v1.journal      || {},
        settings: { onboarded: !!v1.onboarded },
      }
    },
    session: { activeUserId: userId, activeHouseholdId: householdId },
  };
}
// Projette un état V2 en runtime state plat (compatibilité composants).
function projectRuntime(v2) {
  const ah = v2.session.activeHouseholdId;
  const h = v2.households[ah] || emptyHousehold(ah);
  return {
    onboarded:    !!h.settings?.onboarded,
    profile:      { ...h.preferences, members: h.members },
    menus:        h.menus    || {},
    ratings:      h.ratings  || {},
    pantryChecks: h.pantry   || {},
    journal:      h.journal  || {},
    // Données multi-tenant brutes — préfixées `_` pour signaler qu'elles
    // ne doivent pas être lues/écrites directement par les composants.
    // À terme, exposées via un module `dataUser` (commutation de household, etc.).
    _schema:      2,
    _users:       v2.users,
    _households:  v2.households,
    _session:     v2.session,
  };
}
// Écrit le runtime state (vue projetée) dans le V2 shape pour persistance.
// Ne modifie que le household actif : les autres restent intacts (multi-foyer).
function applyRuntimeToV2(runtime) {
  const ah = runtime._session.activeHouseholdId;
  const prevHouse = runtime._households[ah] || emptyHousehold(ah);
  const {members, ...flatPrefs} = runtime.profile || {};
  const preferences = {};
  PREF_KEYS.forEach(k => { if (flatPrefs[k] !== undefined) preferences[k] = flatPrefs[k]; });
  return {
    schema: 2,
    users:  runtime._users,
    households: {
      ...runtime._households,
      [ah]: {
        ...prevHouse,
        id:           ah,
        members:      members || prevHouse.members,
        preferences:  { ...prevHouse.preferences, ...preferences },
        menus:        runtime.menus,
        ratings:      runtime.ratings,
        pantry:       runtime.pantryChecks,
        journal:      runtime.journal,
        settings:     { ...prevHouse.settings, onboarded: !!runtime.onboarded },
      },
    },
    session: runtime._session,
  };
}
function loadState() {
  try {
    const raw2 = localStorage.getItem(STORAGE_KEY_V2);
    if (raw2) {
      const v2 = JSON.parse(raw2);
      if (v2 && v2.schema === 2 && v2.session?.activeHouseholdId && v2.households?.[v2.session.activeHouseholdId]) {
        return projectRuntime(v2);
      }
      console.warn("[storage] V2 trouvé mais invalide, fallback sur V1 ou état neuf");
    }
    const raw1 = localStorage.getItem(STORAGE_KEY_V1);
    if (raw1) {
      const v1 = JSON.parse(raw1);
      const v2 = migrateV1toV2(v1);
      localStorage.setItem(STORAGE_KEY_V2, JSON.stringify(v2));
      console.info("[storage] migration V1 → V2 effectuée (V1 conservé en backup)");
      return projectRuntime(v2);
    }
  } catch (e) {
    console.error("[storage] loadState a échoué, état neuf :", e);
  }
  return projectRuntime(emptyV2State());
}
function saveState(runtime) {
  try {
    if (!runtime || !runtime._session) return;
    const v2 = applyRuntimeToV2(runtime);
    localStorage.setItem(STORAGE_KEY_V2, JSON.stringify(v2));
  } catch (e) {
    console.error("[storage] saveState a échoué :", e);
  }
}

// ----- Menu generation -----------------------------------------------------
// Renvoie la liste des recettes lunch/dinner servies dans les 90 jours précédant
// `currentWeekStart`, plus une carte `recipeId → timestamp ms de la semaine la plus récente
// d'utilisation`. La carte sert à départager les recettes lors d'un fallback en
// privilégiant la plus ancienne (cf. `pickFromPool` niveau 2).
function recipesUsedInLast3Months(menus, currentWeekStart) {
  const cutoff = new Date(currentWeekStart); cutoff.setDate(cutoff.getDate() - 90);
  const set = new Set();
  const lastUsedMap = new Map();
  Object.entries(menus).forEach(([wk, days]) => {
    const d = new Date(wk);
    if (d >= cutoff && d < new Date(currentWeekStart)) {
      const ts = d.getTime();
      DAYS.forEach(day => {
        if (days[day]) {
          ["lunch","dinner"].forEach(m => {
            const id = days[day][m];
            if (!id) return;
            set.add(id);
            const prev = lastUsedMap.get(id);
            if (prev == null || ts > prev) lastUsedMap.set(id, ts);
          });
        }
      });
    }
  });
  return {set, lastUsedMap};
}
// Sélection en cascade : on essaie d'abord d'éviter à la fois les recettes déjà
// servies cette semaine (hardAvoid, contrainte dure) et celles servies dans les
// 3 derniers mois (softAvoid). Si plus aucune recette « fraîche » n'est dispo,
// on choisit la plus ancienne hors-hardAvoid plutôt que de tirer au hasard
// dans tout le pool — ce qui évitait l'ancien bug "même recette que la semaine
// précédente alors que d'autres dormaient depuis 2 mois".
function pickFromPool(pool, {hardAvoid = new Set(), softAvoid = new Set(), lastUsedMap = new Map(), ratings = {}} = {}) {
  if (pool.length === 0) return null;
  // Niveau 1 — recettes ni servies cette semaine, ni servies depuis 3 mois.
  let candidates = pool.filter(r => !hardAvoid.has(r.id) && !softAvoid.has(r.id));
  if (candidates.length > 0) return weightedPick(candidates, ratings);
  // Niveau 2 — fraîches épuisées : on rouvre softAvoid mais on privilégie le plus ancien.
  candidates = pool.filter(r => !hardAvoid.has(r.id));
  if (candidates.length > 0) {
    const sorted = [...candidates].sort(byOldestFirst(lastUsedMap));
    const cutoff = Math.max(1, Math.ceil(sorted.length / 3));
    return weightedPick(sorted.slice(0, cutoff), ratings);
  }
  // Niveau 3 — extrême (toutes en hardAvoid) : prendre la plus ancienne du pool entier
  // pour ne pas laisser un slot vide. Ne devrait jamais arriver tant que pool ≥ 7.
  return [...pool].sort(byOldestFirst(lastUsedMap))[0];
}

function byOldestFirst(lastUsedMap) {
  // Recettes jamais servies (timestamp absent → 0) passent devant les plus récentes.
  return (a, b) => (lastUsedMap.get(a.id) ?? 0) - (lastUsedMap.get(b.id) ?? 0);
}

function weightedPick(list, ratings) {
  const weights = list.map(r => {
    const rating = ratings[r.id];
    if (rating === 1) return 0.2;
    if (rating === 2) return 0.6;
    if (rating === 4) return 1.6;
    if (rating === 5) return 2.4;
    return 1.0;
  });
  const total = weights.reduce((a,b)=>a+b, 0);
  let roll = Math.random() * total;
  for (let i = 0; i < list.length; i++) {
    roll -= weights[i];
    if (roll <= 0) return list[i];
  }
  return list[list.length-1];
}

// ----- Staples (féculents/légumineuses) — anti-doublon midi/soir -----------
// Règle métier : on n'enchaîne pas le même féculent ou la même légumineuse
// au déjeuner ET au dîner du même jour (ex. riz midi → pas de riz le soir).
// Variantes regroupées sous un même token (« riz complet », « riz basmati », etc. → « riz »).
const STAPLE_TOKENS = [
  // Féculents
  ["riz",            /\briz\b/i],
  ["pâtes",          /\bpâtes\b|\bspaghettis?\b|\btagliatelles?\b|\blasagnes?\b|\bpennes?\b|\bfusillis?\b|\bmacaronis?\b|\bcoquillettes?\b|\bvermicelles?\b|\bnouilles?\b|\bravioli/i],
  ["boulgour",       /\bboulgour\b/i],
  ["semoule",        /\bsemoule\b|\bcouscous\b/i],
  ["quinoa",         /\bquinoa\b/i],
  ["sarrasin",       /\bsarrasin\b|\bkasha\b/i],
  ["polenta",        /\bpolenta\b/i],
  ["millet",         /\bmillet\b/i],
  ["épeautre",       /\bépeautre\b/i],
  ["orge",           /\borge\b/i],
  ["pomme de terre", /\bpommes?\s+de\s+terre\b|\bpatates?\b(?!\s+douce)/i],
  ["patate douce",   /\bpatates?\s+douces?\b/i],
  // Légumineuses
  ["lentilles",      /\blentilles?\b/i],
  ["pois chiches",   /\bpois\s+chiches?\b/i],
  ["haricots rouges",/\bharicots?\s+rouges?\b/i],
  ["haricots blancs",/\bharicots?\s+blancs?\b/i],
  ["haricots noirs", /\bharicots?\s+noirs?\b/i],
  ["haricots mungo", /\bharicots?\s+mungo\b/i],
  ["fèves",          /\bfèves?\b/i],
  ["pois cassés",    /\bpois\s+cassés?\b/i],
  ["edamame",        /\bedamame\b/i],
  ["soja",           /\bsoja\b|\btofu\b|\btempeh\b/i],
];

function recipeStaples(recipe) {
  const found = new Set();
  recipe.ing.forEach(([name]) => {
    STAPLE_TOKENS.forEach(([token, re]) => {
      if (re.test(name)) found.add(token);
    });
  });
  return found;
}

// Renvoie les IDs servis dans le slot `mealKey` au cours des `days` jours
// précédant `weekStart`. Sert à empêcher qu'un goûter (ou dessert) du dimanche
// réapparaisse le lundi de la semaine suivante.
function recentMealSlots(menus, weekStart, mealKey, days = 7) {
  const start = new Date(weekStart);
  const cutoff = new Date(weekStart); cutoff.setDate(cutoff.getDate() - days);
  const set = new Set();
  Object.entries(menus).forEach(([wk, daysMap]) => {
    const wkDate = new Date(wk);
    DAYS.forEach((day, idx) => {
      const dayDate = addDays(wkDate, idx);
      if (dayDate >= cutoff && dayDate < start) {
        const id = daysMap[day]?.[mealKey];
        if (id) set.add(id);
      }
    });
  });
  return set;
}

function generateWeek({profile, ratings, menus, weekStart, keepLocked}) {
  const season = getSeason(weekStart);
  const allergies = profile.globalAllergies;
  const exclusions = profile.globalExclusions;
  const baseFilter = (type) => RECIPES.filter(r =>
    r.type === type &&
    matchesSeason(r, season) &&
    !recipeHasAllergen(r, allergies) &&
    !recipeHasExcluded(r, exclusions) &&
    recipeRespectsEquipment(r, profile.equipment) &&
    recipeRespectsTime(r, profile.maxPrepMinutes) &&
    (ratings[r.id] ?? 3) >= 2
  );
  const breakfasts = baseFilter("breakfast");
  const lunches    = baseFilter("lunch");
  const dinners    = baseFilter("dinner");
  const desserts   = baseFilter("dessert");
  const snacks     = baseFilter("snack");

  const {set: recentlyUsed, lastUsedMap} = recipesUsedInLast3Months(menus, weekStart);
  const existing = menus[weekKey(weekStart)] || {};

  const days = {};
  const usedThisWeek = new Set();           // lunch + dinner anti-redondance
  // Cooldown 7 jours pour desserts/snacks → couvre la jonction dimanche → lundi
  // de la semaine suivante (un même dessert/goûter ne reviendra pas avant 8 jours).
  const dessertsCooldown = recentMealSlots(menus, weekStart, "dessert", 7);
  const snacksCooldown   = recentMealSlots(menus, weekStart, "snack",   7);

  DAYS.forEach((day, i) => {
    const prev = existing[day] || {};
    const locked = prev.locked || {};
    const slot = {locked: {...locked}};
    // préserver l'attendance existante
    if (prev.attendance) slot.attendance = prev.attendance;

    // Breakfast: rotation déterministe pour garantir 7 petits-déjs différents si possible
    if (keepLocked && locked.breakfast && prev.breakfast) {
      slot.breakfast = prev.breakfast;
    } else if (breakfasts.length > 0) {
      slot.breakfast = breakfasts[i % breakfasts.length].id;
    }

    // Lunch
    if (keepLocked && locked.lunch && prev.lunch) {
      slot.lunch = prev.lunch;
      usedThisWeek.add(prev.lunch);
    } else {
      const picked = pickFromPool(lunches, {hardAvoid: usedThisWeek, softAvoid: recentlyUsed, lastUsedMap, ratings});
      if (picked) { slot.lunch = picked.id; usedThisWeek.add(picked.id); }
    }

    // Dinner — anti-doublon semaine + anti-récurrence 3 mois + pas le même féculent/légumineuse que le lunch du jour
    if (keepLocked && locked.dinner && prev.dinner) {
      slot.dinner = prev.dinner;
      usedThisWeek.add(prev.dinner);
    } else {
      let dinnerPool = dinners;
      const lunchRecipe = slot.lunch ? RECIPES.find(r => r.id === slot.lunch) : null;
      if (lunchRecipe) {
        const lunchStaples = recipeStaples(lunchRecipe);
        if (lunchStaples.size > 0) {
          const filtered = dinners.filter(r => {
            const ds = recipeStaples(r);
            for (const s of lunchStaples) if (ds.has(s)) return false;
            return true;
          });
          // Filtre conservé seulement si ≥ 3 candidats — sinon mieux vaut un doublon staple qu'un slot dégradé.
          if (filtered.length >= 3) dinnerPool = filtered;
        }
      }
      const picked = pickFromPool(dinnerPool, {hardAvoid: usedThisWeek, softAvoid: recentlyUsed, lastUsedMap, ratings});
      if (picked) { slot.dinner = picked.id; usedThisWeek.add(picked.id); }
    }

    // Snack (goûter) — anti-doublon sur 8 jours glissants (cf. snacksCooldown)
    if (profile.snackEnabled) {
      if (keepLocked && locked.snack && prev.snack) {
        slot.snack = prev.snack;
        snacksCooldown.add(prev.snack);
      } else if (snacks.length > 0) {
        const picked = pickFromPool(snacks, {hardAvoid: snacksCooldown, ratings});
        if (picked) { slot.snack = picked.id; snacksCooldown.add(picked.id); }
      }
    }

    // Dessert — 1 par jour, anti-doublon sur 8 jours glissants (cf. dessertsCooldown)
    if (keepLocked && locked.dessert && prev.dessert) {
      slot.dessert = prev.dessert;
      dessertsCooldown.add(prev.dessert);
    } else if (desserts.length > 0) {
      const picked = pickFromPool(desserts, {hardAvoid: dessertsCooldown, ratings});
      if (picked) { slot.dessert = picked.id; dessertsCooldown.add(picked.id); }
    }

    days[day] = slot;
  });
  return days;
}

// ----- Ingredient aggregation (shopping list) ------------------------------
function aggregateShoppingList(weekMenu, profile) {
  const activeSlots = getAllActiveSlots(profile); // inclut dessert + snack si activé
  const agg = {}; // key = `${lcName}|${unit}` → {name, qty, unit, category}
  DAYS.forEach(day => {
    const slot = weekMenu[day] || {};
    const attendance = slot.attendance || {};
    activeSlots.forEach(meal => {
      const rid = slot[meal];
      if (!rid) return;
      const recipe = RECIPES.find(r => r.id === rid);
      if (!recipe) return;
      // Multiplicateur par repas basé sur l'attendance (défaut = toute la famille)
      const attendees = attendance[meal]; // peut être undefined
      const mult = mealEquivalents(profile, attendees);
      if (mult <= 0) return; // personne présent → on n'ajoute rien
      recipe.ing.forEach(([name, qty, unit, category]) => {
        // Canonicalisation pour fusionner Avocat/Avocat mûr/Avocats, et gousse/gousses, etc.
        let cName = canonicalName(name);
        let cUnit = dataRef.canonicalUnit(unit);
        let cQty = qty;
        // Pour les fruits/légumes référencés, on normalise vers leur forme de base
        // (ex: "Pomme râpée" → "Pomme") et on convertit g → pièces via poids moyen.
        if (category === "produce") {
          const weight = dataRef.produceUnitWeight(cName);
          if (weight != null) {
            const stripped = stripProducePrep(cName);
            if (stripped !== cName && dataRef.ingredient(stripped)?.weightPerPiece != null) {
              cName = stripped;
            }
            if (cUnit === "g") {
              cQty = qty / weight;
              cUnit = "u";
            }
          }
        }
        // Clé enrichie de la catégorie pour éviter la fusion accidentelle entre
        // des items homonymes de catégories différentes (rare mais possible).
        const key = `${cName}|${cUnit}|${category}`;
        if (!agg[key]) {
          agg[key] = {name: displayCanonName(cName), qty: 0, unit: cUnit, category};
        }
        agg[key].qty += cQty * mult;
      });
    });
  });
  // group by category
  const byCat = {};
  Object.values(agg).forEach(item => {
    if (!byCat[item.category]) byCat[item.category] = [];
    byCat[item.category].push(item);
  });
  // sort each by name
  Object.values(byCat).forEach(list => list.sort((a,b) => a.name.localeCompare(b.name, "fr")));
  return byCat;
}
function estimateWeekCost(weekMenu, profile) {
  const activeSlots = getAllActiveSlots(profile);
  let total = 0;
  DAYS.forEach(day => {
    const slot = weekMenu[day] || {};
    const attendance = slot.attendance || {};
    activeSlots.forEach(meal => {
      const rid = slot[meal];
      if (!rid) return;
      const recipe = RECIPES.find(r => r.id === rid);
      if (!recipe) return;
      const attendees = attendance[meal];
      const mult = mealEquivalents(profile, attendees);
      if (mult <= 0) return;
      total += recipe.cost * mult;
    });
  });
  return total;
}

function App() {
  const [state, setState] = useState(loadState());
  const [currentWeek, setCurrentWeek] = useState(mondayOf(new Date()));
  const [view, setView] = useState(state.onboarded ? "menu" : "setup");
  const [selectedRecipe, setSelectedRecipe] = useState(null);
  const [printMode, setPrintMode] = useState(null); // null | "menu" | "shopping"

  useEffect(() => { saveState(state); }, [state]);

  const update = (updater) => setState(s => ({...s, ...(typeof updater === "function" ? updater(s) : updater)}));
  const updateProfile = (patch) => update(s => ({profile: {...s.profile, ...patch}}));

  const wk = weekKey(currentWeek);
  const currentMenu = state.menus[wk] || {};

  const regenerate = ({keepLocked = true} = {}) => {
    const days = generateWeek({
      profile: state.profile,
      ratings: state.ratings,
      menus: state.menus,
      weekStart: currentWeek,
      keepLocked,
    });
    update(s => ({menus: {...s.menus, [wk]: days}}));
  };
  const regenerateSlot = (day, meal) => {
    const season = getSeason(currentWeek);
    let pool = RECIPES.filter(r =>
      r.type === meal &&
      matchesSeason(r, season) &&
      !recipeHasAllergen(r, state.profile.globalAllergies) &&
      !recipeHasExcluded(r, state.profile.globalExclusions) &&
      recipeRespectsEquipment(r, state.profile.equipment) &&
      recipeRespectsTime(r, state.profile.maxPrepMinutes) &&
      (state.ratings[r.id] ?? 3) >= 2
    );
    // avoid current week for same type
    const used = new Set();
    DAYS.forEach(d => {
      const slot = currentMenu[d] || {};
      if (meal === "lunch" || meal === "dinner") {
        if (slot.lunch && (d !== day || meal !== "lunch")) used.add(slot.lunch);
        if (slot.dinner && (d !== day || meal !== "dinner")) used.add(slot.dinner);
      } else if (meal === "dessert" || meal === "snack") {
        if (slot[meal] && d !== day) used.add(slot[meal]);
      }
    });
    // Cooldown 8 jours : pour dessert/snack, on étend l'évitement aux 7 jours précédents.
    if (meal === "dessert" || meal === "snack") {
      recentMealSlots(state.menus, currentWeek, meal, 7).forEach(id => used.add(id));
    }
    // Anti-staple : si on régénère un lunch (resp. dinner) et qu'il y a déjà un dinner (resp. lunch)
    // ce jour-là, on évite les recettes partageant féculent ou légumineuse.
    if (meal === "lunch" || meal === "dinner") {
      const otherMeal = meal === "lunch" ? "dinner" : "lunch";
      const otherId = currentMenu[day]?.[otherMeal];
      const otherRecipe = otherId ? RECIPES.find(r => r.id === otherId) : null;
      if (otherRecipe) {
        const otherStaples = recipeStaples(otherRecipe);
        if (otherStaples.size > 0) {
          const filtered = pool.filter(r => {
            const ds = recipeStaples(r);
            for (const s of otherStaples) if (ds.has(s)) return false;
            return true;
          });
          if (filtered.length >= 3) pool = filtered;
        }
      }
    }
    const isMain = (meal === "lunch" || meal === "dinner");
    const {set: softAvoid, lastUsedMap} = isMain
      ? recipesUsedInLast3Months(state.menus, currentWeek)
      : {set: new Set(), lastUsedMap: new Map()};
    const picked = pickFromPool(pool, {hardAvoid: used, softAvoid, lastUsedMap, ratings: state.ratings});
    if (picked) {
      update(s => ({menus: {...s.menus, [wk]: {...s.menus[wk], [day]: {...(s.menus[wk]?.[day]||{}), [meal]: picked.id}}}}));
    }
  };
  const toggleLock = (day, meal) => {
    update(s => {
      const daySlot = s.menus[wk]?.[day] || {};
      const locked = {...(daySlot.locked||{})};
      locked[meal] = !locked[meal];
      return {menus: {...s.menus, [wk]: {...(s.menus[wk]||{}), [day]: {...daySlot, locked}}}};
    });
  };
  const replaceSlot = (day, meal, recipeId) => {
    update(s => ({
      menus: {...s.menus, [wk]: {...(s.menus[wk]||{}), [day]: {...(s.menus[wk]?.[day]||{}), [meal]: recipeId}}},
    }));
  };
  const rateRecipe = (rid, score) => {
    update(s => ({ratings: {...s.ratings, [rid]: score}}));
  };
  const togglePantry = (key) => {
    update(s => ({pantryChecks: {...s.pantryChecks, [wk]: {...(s.pantryChecks[wk]||{}), [key]: !s.pantryChecks[wk]?.[key]}}}));
  };
  // Présence par repas : ids = null → reset (tous présents), sinon liste d'ids
  const setAttendance = (day, meal, ids) => {
    update(s => {
      const daySlot = s.menus[wk]?.[day] || {};
      const prevAtt = daySlot.attendance || {};
      const nextAtt = {...prevAtt};
      if (ids == null) delete nextAtt[meal];
      else nextAtt[meal] = ids;
      return {menus: {...s.menus, [wk]: {...(s.menus[wk]||{}), [day]: {...daySlot, attendance: nextAtt}}}};
    });
  };

  // Print trigger
  useEffect(() => {
    if (printMode) {
      const timer = setTimeout(() => {
        window.print();
        setPrintMode(null);
      }, 300);
      return () => clearTimeout(timer);
    }
  }, [printMode]);

  if (printMode === "menu") return <PrintMenuPage weekStart={currentWeek} menu={currentMenu} profile={state.profile} />;
  if (printMode === "shopping") return <PrintShoppingPage weekStart={currentWeek} menu={currentMenu} profile={state.profile} pantryChecks={state.pantryChecks[wk]||{}} />;

  return (
    <div className="min-h-screen flex flex-col">
      <TopBar view={view} setView={setView} />
      <main className="flex-1 container mx-auto px-4 py-6 max-w-7xl">
        {view === "setup" && (
          <SetupView state={state} update={update} updateProfile={updateProfile}
            onDone={() => { update({onboarded:true}); regenerate({keepLocked:false}); setView("menu"); }} />
        )}
        {view === "menu" && (
          <MenuView
            state={state}
            currentWeek={currentWeek}
            setCurrentWeek={setCurrentWeek}
            currentMenu={currentMenu}
            regenerate={regenerate}
            regenerateSlot={regenerateSlot}
            toggleLock={toggleLock}
            replaceSlot={replaceSlot}
            setAttendance={setAttendance}
            onSelectRecipe={(id, opts) => setSelectedRecipe({id, day: opts?.day, meal: opts?.meal})}
            onPrint={() => setPrintMode("menu")}
            onShopping={() => setView("shopping")}
          />
        )}
        {view === "library" && (
          <LibraryView state={state} onSelectRecipe={(id) => setSelectedRecipe({id})} rateRecipe={rateRecipe} />
        )}
        {view === "shopping" && (
          <ShoppingView
            currentWeek={currentWeek}
            currentMenu={currentMenu}
            profile={state.profile}
            pantryChecks={state.pantryChecks[wk]||{}}
            onTogglePantry={togglePantry}
            onPrint={() => setPrintMode("shopping")}
          />
        )}
        {view === "history" && (
          <HistoryView state={state} setCurrentWeek={setCurrentWeek} onGo={() => setView("menu")} />
        )}
        {view === "settings" && (
          <SettingsView state={state} update={update} updateProfile={updateProfile} />
        )}
      </main>
      {selectedRecipe && (
        <RecipeModal
          recipe={RECIPES.find(r => r.id === selectedRecipe.id)}
          profile={state.profile}
          attendees={selectedRecipe.day && selectedRecipe.meal
            ? currentMenu[selectedRecipe.day]?.attendance?.[selectedRecipe.meal]
            : undefined}
          rating={state.ratings[selectedRecipe.id]}
          onRate={(s) => rateRecipe(selectedRecipe.id, s)}
          onClose={() => setSelectedRecipe(null)}
        />
      )}
      <footer className="no-print bg-slate-900 text-slate-400 text-center py-3 text-xs">
        Menu IG Bas V2.4.3 — prototype local • Données stockées dans votre navigateur
      </footer>
    </div>
  );
}

  return (
    <div className="max-w-3xl mx-auto">
      <div className="mb-6">
        <h2 className="text-2xl font-bold text-slate-800">Bienvenue 👋</h2>
        <p className="text-slate-600">Quelques minutes pour configurer votre profil familial.</p>
      </div>
      <div className="flex gap-2 mb-6">
        {steps.map((s, i) => (
          <div key={i} className={`flex-1 h-2 rounded ${i <= step ? "bg-emerald-500" : "bg-slate-200"}`}></div>
        ))}
      </div>
      <div className="bg-white rounded-lg shadow p-6">
        <h3 className="text-lg font-bold text-slate-800 mb-4">
          Étape {step+1}/{steps.length} — {steps[step].title}
        </h3>
        {steps[step].content}
        <div className="flex justify-between mt-6">
          <button onClick={()=>setStep(Math.max(0, step-1))}
            disabled={step===0}
            className="px-4 py-2 text-slate-600 hover:text-slate-800 disabled:opacity-30">
            ← Retour
          </button>
          {step < steps.length-1 ? (
            <button onClick={()=>setStep(step+1)}
              className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-md font-medium">
              Continuer →
            </button>
          ) : (
            <button onClick={onDone}
              className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-md font-medium">
              Générer mon premier menu 🚀
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ----- Menu View -----------------------------------------------------------
function MenuView({state, currentWeek, setCurrentWeek, currentMenu, regenerate, regenerateSlot, toggleLock, replaceSlot, onSelectRecipe, onPrint, onShopping, setAttendance}) {
  const [replacePanel, setReplacePanel] = useState(null); // {day, meal}
  const [attendancePanel, setAttendancePanel] = useState(null); // {day, meal}
  const endOfWeek = addDays(currentWeek, 6);
  const cost = estimateWeekCost(currentMenu, state.profile);
  const overBudget = state.profile.budgetWeekly > 0 && cost > state.profile.budgetWeekly;
  const season = getSeason(currentWeek);
  const profileMeals = getMealsForProfile(state.profile);
  const dessertTime = state.profile.dessertTime || "dinner";

  const hasAny = DAYS.some(d => currentMenu[d]?.breakfast || currentMenu[d]?.lunch || currentMenu[d]?.dinner);

  return (
    <div className="space-y-4">
      <PoolDiagnostic profile={state.profile} currentWeek={currentWeek} />
      <div className="bg-white rounded-lg shadow p-4 flex flex-wrap items-center gap-3">
        <div className="flex items-center gap-2">
          <button onClick={()=>setCurrentWeek(addDays(currentWeek,-7))} className="px-2 py-1 bg-slate-100 rounded hover:bg-slate-200">←</button>
          <div>
            <p className="font-bold text-slate-800">Semaine du {formatShort(currentWeek)} au {formatShort(endOfWeek)}</p>
            <p className="text-xs text-slate-500">{SEASON_FR[season]} · {state.profile.members.length} personne{state.profile.members.length>1?"s":""}</p>
          </div>
          <button onClick={()=>setCurrentWeek(addDays(currentWeek,7))} className="px-2 py-1 bg-slate-100 rounded hover:bg-slate-200">→</button>
        </div>
        <div className="flex-1"></div>
        <div className={`px-3 py-2 rounded-md text-sm ${overBudget ? "bg-red-100 text-red-800" : "bg-emerald-100 text-emerald-800"}`}>
          💰 Coût estimé : <strong>{cost.toFixed(2)} €</strong>
          {state.profile.budgetWeekly > 0 && <span className="ml-1 opacity-75">/ {state.profile.budgetWeekly} €</span>}
          {overBudget && <span className="ml-1">⚠️</span>}
        </div>
        <button onClick={() => regenerate({keepLocked:true})}
          className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-md text-sm font-medium">
          🔄 Régénérer
        </button>
        <button onClick={onPrint}
          className="bg-slate-700 hover:bg-slate-900 text-white px-4 py-2 rounded-md text-sm font-medium">
          🖨️ Imprimer
        </button>
        <button onClick={onShopping}
          className="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-md text-sm font-medium">
          🛒 Liste de courses
        </button>
      </div>

      {!hasAny && (
        <div className="bg-white rounded-lg shadow p-12 text-center">
          <p className="text-slate-600 mb-4">Aucun menu pour cette semaine.</p>
          <button onClick={() => regenerate({keepLocked:false})}
            className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-md font-medium">
            Générer automatiquement 🎲
          </button>
        </div>
      )}

      {hasAny && (
        <div className="grid grid-cols-1 md:grid-cols-7 gap-3">
          {DAYS.map((day, idx) => {
            const date = addDays(currentWeek, idx);
            const slot = currentMenu[day] || {};
            const attendance = slot.attendance || {};
            return (
              <div key={day} className="bg-white rounded-lg shadow overflow-hidden">
                <div className="bg-slate-800 text-white px-3 py-2">
                  <p className="font-bold capitalize">{DAYS_SHORT[idx]}</p>
                  <p className="text-xs text-slate-300">{formatShort(date)}</p>
                </div>
                <div className="p-2 space-y-2">
                  {profileMeals.map(m => {
                    const recipe = RECIPES.find(r => r.id === slot[m.key]);
                    const locked = slot.locked?.[m.key];
                    const attendees = attendance[m.key];
                    const nAll = state.profile.members.length;
                    const nPresent = attendees == null ? nAll : attendees.length;
                    const partial = attendees != null && nPresent < nAll;
                    const showDessertHere = m.key === dessertTime; // affiche le dessert sous le bon repas
                    const dessertRecipe = showDessertHere ? RECIPES.find(r => r.id === slot.dessert) : null;
                    const dessertLocked = slot.locked?.dessert;
                    const dessertAttendees = attendance.dessert;
                    const dessertNPresent = dessertAttendees == null ? nAll : dessertAttendees.length;
                    const dessertPartial = dessertAttendees != null && dessertNPresent < nAll;
                    return (
                      <div key={m.key} className={`border rounded p-2 text-sm ${locked ? "bg-amber-50 border-amber-300" : "bg-slate-50 border-slate-200"}`}>
                        <div className="flex items-center justify-between mb-1">
                          <span className="text-xs font-medium text-slate-500">{m.icon} {m.label}</span>
                          <div className="flex gap-1">
                            <button title={partial ? `${nPresent}/${nAll} présents` : "Présence (tous)"} onClick={()=>setAttendancePanel({day, meal:m.key})} className={`text-xs hover:opacity-70 ${partial ? "text-amber-600 font-bold" : ""}`}>👥{partial ? nPresent : ""}</button>
                            <button title="Verrouiller" onClick={()=>toggleLock(day,m.key)} className="text-xs hover:opacity-70">
                              {locked ? "🔒" : "🔓"}
                            </button>
                            <button title="Remplacer" onClick={()=>setReplacePanel({day, meal:m.key})} className="text-xs hover:opacity-70">🔀</button>
                            <button title="Changer aléatoire" onClick={()=>regenerateSlot(day,m.key)} className="text-xs hover:opacity-70">🎲</button>
                          </div>
                        </div>
                        {recipe ? (
                          <button onClick={() => onSelectRecipe(recipe.id, {day, meal: m.key})}
                            className="text-left w-full hover:text-emerald-700 font-medium text-slate-800">
                            <span className="flex items-start gap-1">
                              <span className="flex-1">{recipe.name}</span>
                              {recipeAdvanceInfo(recipe) && (
                                <span title={`À préparer ${recipeAdvanceInfo(recipe).label}`}
                                      className="text-amber-600 text-sm flex-shrink-0">
                                  {recipeAdvanceInfo(recipe).icon}
                                </span>
                              )}
                            </span>
                            <span className="block text-xs text-slate-500 font-normal mt-0.5">
                              ⏱ {recipeTimeLabel(recipe)} · {recipe.kcal}kcal
                              {recipeAdvanceInfo(recipe) && (
                                <span className="ml-1 text-amber-700 font-semibold">· {recipeAdvanceInfo(recipe).shortLabel} avance</span>
                              )}
                            </span>
                          </button>
                        ) : (
                          <p className="text-slate-400 italic">—</p>
                        )}
                        {/* Sous-panneau dessert attaché à ce repas */}
                        {showDessertHere && (
                          <div className={`mt-2 pt-2 border-t border-dashed ${dessertLocked ? "border-amber-400" : "border-slate-300"}`}>
                            <div className="flex items-center justify-between mb-0.5">
                              <span className="text-[11px] font-medium text-rose-600">🍰 Dessert</span>
                              <div className="flex gap-1">
                                <button title={dessertPartial ? `${dessertNPresent}/${nAll}` : "Présence (tous)"} onClick={()=>setAttendancePanel({day, meal:"dessert"})} className={`text-xs hover:opacity-70 ${dessertPartial ? "text-amber-600 font-bold" : ""}`}>👥{dessertPartial ? dessertNPresent : ""}</button>
                                <button title="Verrouiller" onClick={()=>toggleLock(day,"dessert")} className="text-xs hover:opacity-70">{dessertLocked ? "🔒" : "🔓"}</button>
                                <button title="Remplacer" onClick={()=>setReplacePanel({day, meal:"dessert"})} className="text-xs hover:opacity-70">🔀</button>
                                <button title="Changer" onClick={()=>regenerateSlot(day,"dessert")} className="text-xs hover:opacity-70">🎲</button>
                              </div>
                            </div>
                            {dessertRecipe ? (
                              <button onClick={() => onSelectRecipe(dessertRecipe.id, {day, meal: "dessert"})}
                                className="text-left w-full hover:text-rose-700 text-xs text-slate-700">
                                <span className="flex items-start gap-1">
                                  <span className="flex-1 font-medium">{dessertRecipe.name}</span>
                                  {recipeAdvanceInfo(dessertRecipe) && (
                                    <span title={`À préparer ${recipeAdvanceInfo(dessertRecipe).label}`}
                                          className="text-amber-600 flex-shrink-0">
                                      {recipeAdvanceInfo(dessertRecipe).icon}
                                    </span>
                                  )}
                                </span>
                                <span className="block text-[11px] text-slate-500 mt-0.5">
                                  ⏱ {recipeTimeLabel(dessertRecipe)} · {dessertRecipe.kcal}kcal
                                  {recipeAdvanceInfo(dessertRecipe) && (
                                    <span className="ml-1 text-amber-700 font-semibold">· {recipeAdvanceInfo(dessertRecipe).shortLabel} avance</span>
                                  )}
                                </span>
                              </button>
                            ) : (
                              <p className="text-slate-400 italic text-xs">— aucun dessert</p>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {replacePanel && (
        <ReplaceDialog
          day={replacePanel.day}
          meal={replacePanel.meal}
          season={season}
          profile={state.profile}
          currentId={currentMenu[replacePanel.day]?.[replacePanel.meal]}
          onPick={(id) => { replaceSlot(replacePanel.day, replacePanel.meal, id); setReplacePanel(null); }}
          onClose={() => setReplacePanel(null)}
        />
      )}
      {attendancePanel && (
        <AttendanceDialog
          day={attendancePanel.day}
          meal={attendancePanel.meal}
          profile={state.profile}
          current={currentMenu[attendancePanel.day]?.attendance?.[attendancePanel.meal]}
          onSave={(ids) => { setAttendance(attendancePanel.day, attendancePanel.meal, ids); setAttendancePanel(null); }}
          onClose={() => setAttendancePanel(null)}
        />
      )}
    </div>
  );
}

// Dialogue de sélection des présents pour un repas donné
function AttendanceDialog({day, meal, profile, current, onSave, onClose}) {
  const all = profile.members;
  // Si current est undefined → considérer tout le monde présent
  const initial = current == null ? all.map(m => m.id) : current;
  const [selected, setSelected] = useState(initial);
  const toggle = (id) => {
    setSelected(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  };
  const allMeals = ALL_MEALS.find(m => m.key === meal) || {label:meal, icon:""};
  return (
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-lg shadow-xl p-5 max-w-md w-full" onClick={e=>e.stopPropagation()}>
        <div className="flex justify-between items-center mb-3">
          <h3 className="text-lg font-bold">Qui mange ? — {allMeals.icon} {allMeals.label} de {day}</h3>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600">✕</button>
        </div>
        <p className="text-xs text-slate-500 mb-3">Décochez les personnes absentes pour ce repas. Les quantités de la liste de courses seront ajustées automatiquement.</p>
        <div className="space-y-2">
          {all.map(m => (
            <label key={m.id} className={`flex items-center gap-2 px-3 py-2 rounded border cursor-pointer ${
              selected.includes(m.id) ? "bg-emerald-50 border-emerald-300" : "bg-slate-50 border-slate-200 opacity-60"
            }`}>
              <input type="checkbox" checked={selected.includes(m.id)} onChange={()=>toggle(m.id)} />
              <span className="flex-1 font-medium">{m.name}</span>
              <span className="text-xs text-slate-500">{m.age} ans · {m.sex}</span>
            </label>
          ))}
        </div>
        <div className="flex justify-between gap-2 mt-4">
          <button onClick={() => setSelected(all.map(m => m.id))} className="text-xs text-slate-600 hover:text-slate-900 underline">Tous présents</button>
          <div className="flex gap-2">
            <button onClick={onClose} className="px-4 py-2 text-slate-600">Annuler</button>
            <button onClick={() => onSave(selected.length === all.length ? null : selected)}
              className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-md text-sm font-medium">Enregistrer</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ReplaceDialog({day, meal, season, profile, currentId, onPick, onClose}) {
  const pool = RECIPES.filter(r =>
    r.type === meal &&
    matchesSeason(r, season) &&
    !recipeHasAllergen(r, profile.globalAllergies) &&
    !recipeHasExcluded(r, profile.globalExclusions) &&
    r.id !== currentId
  );
  return (
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-lg shadow-xl p-5 max-w-lg w-full max-h-[80vh] overflow-auto" onClick={e=>e.stopPropagation()}>
        <div className="flex justify-between items-center mb-3">
          <h3 className="text-lg font-bold">Remplacer — {ALL_MEALS.find(m=>m.key===meal).label} de {day}</h3>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600">✕</button>
        </div>
        <div className="space-y-2">
          {pool.map(r => (
            <button key={r.id} onClick={() => onPick(r.id)}
              className="w-full text-left p-3 bg-slate-50 hover:bg-emerald-50 hover:border-emerald-300 border border-slate-200 rounded transition">
              <p className="font-medium text-slate-800">
                {r.name}
                {recipeAdvanceInfo(r) && (
                  <span className="ml-1 text-amber-600" title={`À préparer ${recipeAdvanceInfo(r).label}`}>
                    {recipeAdvanceInfo(r).icon}
                  </span>
                )}
              </p>
              <p className="text-xs text-slate-500">
                ⏱ {recipeTimeLabel(r)} · {r.kcal}kcal · {r.cost.toFixed(2)}€/pers
                {recipeAdvanceInfo(r) && (
                  <span className="ml-1 text-amber-700 font-semibold">· {recipeAdvanceInfo(r).shortLabel} avance</span>
                )}
              </p>
            </button>
          ))}
          {pool.length === 0 && <p className="text-slate-500 italic text-center py-4">Aucune alternative dans cette saison avec vos contraintes.</p>}
        </div>
      </div>
    </div>
  );
}

// ----- Recipe Modal --------------------------------------------------------
function RecipeModal({recipe, profile, attendees, rating, onRate, onClose}) {
  const hasContext = Array.isArray(attendees);
  const mult = hasContext ? mealEquivalents(profile, attendees) : totalEquivalents(profile);
  const nAll = profile.members?.length || 0;
  const nPresent = hasContext ? attendees.length : nAll;
  const isPartial = hasContext && nPresent < nAll;
  return (
    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 no-print" onClick={onClose}>
      <div className="bg-white rounded-lg shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-auto" onClick={e=>e.stopPropagation()}>
        <div className="bg-gradient-to-r from-emerald-700 to-teal-600 text-white p-5 rounded-t-lg sticky top-0 z-10">
          <div className="flex justify-between items-start gap-4">
            <div>
              <h2 className="text-2xl font-bold">{recipe.name}</h2>
              <div className="flex flex-wrap gap-3 mt-2 text-sm">
                <span>⏱ Préparation {recipe.prep} min</span>
                <span>🔥 Cuisson {recipe.cook} min</span>
                {recipe.rest > 0 && (
                  <span>❄️ Repos {recipe.rest >= 60 ? `${Math.round(recipe.rest/60*10)/10}h` : `${recipe.rest} min`}</span>
                )}
                <span>📊 Difficulté {"⭐".repeat(recipe.diff)}</span>
                <span>🔢 {recipe.kcal} kcal/pers</span>
                <span>💰 ~{recipe.cost.toFixed(2)}€/pers</span>
              </div>
              {recipeAdvanceInfo(recipe) && (
                <div className="mt-2 inline-flex items-center gap-2 bg-amber-100 text-amber-900 px-3 py-1.5 rounded-full text-sm font-medium">
                  <span>{recipeAdvanceInfo(recipe).icon}</span>
                  <span>À commencer {recipeAdvanceInfo(recipe).label} avant le service</span>
                </div>
              )}
              {recipe.tags?.length > 0 && (
                <div className="flex flex-wrap gap-1 mt-2">
                  {recipe.tags.map(t => (
                    <span key={t} className="bg-white/20 px-2 py-0.5 rounded-full text-xs">{t}</span>
                  ))}
                </div>
              )}
            </div>
            <button onClick={onClose} className="text-white/80 hover:text-white text-2xl">✕</button>
          </div>
        </div>
        <div className="p-6 space-y-6">
          {recipe.allergens?.length > 0 && (
            <div className="bg-red-50 border border-red-200 p-3 rounded flex gap-2 items-start text-sm">
              <span>⚠️</span>
              <div>
                <p className="font-medium text-red-800">Contient : {recipe.allergens.map(a => dataRef.allergenLabel(a)).join(", ")}</p>
              </div>
            </div>
          )}
          <div>
            <h3 className="font-bold text-slate-800 mb-2">🧺 Ingrédients <span className={`text-xs font-normal ${isPartial ? "text-amber-700 font-medium" : "text-slate-500"}`}>{isPartial
              ? `(pour ${nPresent} présent${nPresent>1?"s":""} sur ${nAll}, soit ${mult.toFixed(1)} équiv. adultes)`
              : `(pour la famille, soit ${mult.toFixed(1)} équiv. adultes)`
            }</span></h3>
            <ul className="space-y-1">
              {recipe.ing.map(([name,qty,unit,cat],i) => (
                <li key={i} className="flex justify-between text-sm border-b border-dashed border-slate-200 py-1">
                  <span>{name}</span>
                  <span className="font-mono text-slate-600">{formatQty(qty*mult, unit, name)}</span>
                </li>
              ))}
            </ul>
          </div>
          <div>
            <h3 className="font-bold text-slate-800 mb-2">👨‍🍳 Étapes</h3>
            <ol className="space-y-3">
              {recipe.steps.map((s,i) => (
                <li key={i} className="flex gap-3">
                  <span className="flex-shrink-0 w-7 h-7 rounded-full bg-emerald-600 text-white text-sm font-bold flex items-center justify-center">{i+1}</span>
                  <p className="text-slate-700 leading-relaxed">{s}</p>
                </li>
              ))}
            </ol>
          </div>
          <div className="bg-slate-50 rounded p-4 flex flex-wrap items-center gap-3">
            <span className="font-medium text-slate-800">Noter cette recette :</span>
            <div className="flex gap-1">
              {[1,2,3,4,5].map(n => (
                <button key={n} onClick={() => onRate(n)}
                  className="text-2xl hover:scale-110 transition">
                  {n <= (rating||0) ? "⭐" : "☆"}
                </button>
              ))}
            </div>
            {rating && <span className="text-sm text-slate-600">({rating}/5)</span>}
            {rating === 1 && <span className="text-xs text-red-600">Sera évitée pour les prochains menus</span>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ----- Library View --------------------------------------------------------

  const filtered = RECIPES.filter(r => {

    <div className="space-y-4">

              <span className="text-xs bg-slate-100 px-2 py-0.5 rounded">{

                : r.type === "dinner" ? "🌙 Dîn"
                : r.type === "dessert" ? "🍰 Des"
                : r.type === "snack" ? "🍪 Goû"

            <div className="text-xs text-slate-600 space-x-2">
