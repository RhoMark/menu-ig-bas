// Textarea contrôlé pour exclusions : conserve le texte brut (newlines autorisés)
// et ne nettoie en tableau qu'à chaque changement, sans bloquer la saisie.
function ExclusionsTextarea({value, onChange}) {
  const [raw, setRaw] = useState(value.join("\n"));
  // Resynchronise si la prop externe change (ex: reset)
  useEffect(() => {
    const cleaned = raw.split("\n").map(s => s.trim()).filter(Boolean);
    if (JSON.stringify(cleaned) !== JSON.stringify(value)) {
      setRaw(value.join("\n"));
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [value.join("|")]);
  return (
    <>
      <textarea
        value={raw}
        onChange={e => {
          setRaw(e.target.value);
          const arr = e.target.value.split("\n").map(s => s.trim()).filter(Boolean);
          onChange(arr);
        }}
        placeholder={"champignons\nolives\nmenthe"}
        rows={5}
        className="border rounded px-3 py-2 w-full font-mono text-sm" />
      <p className="text-xs text-slate-500 mt-1">Un ingrédient par ligne — utilisez Entrée pour aller à la ligne.</p>
    </>
  );
}

// Calcule la taille du pool éligible par type de repas pour la saison courante
function computePoolSizes(profile, currentWeek) {
  const season = getSeason(currentWeek);
  const filter = type => RECIPES.filter(r =>
    r.type === type &&
    matchesSeason(r, season) &&
    !recipeHasAllergen(r, profile.globalAllergies) &&
    !recipeHasExcluded(r, profile.globalExclusions) &&
    recipeRespectsEquipment(r, profile.equipment) &&
    recipeRespectsTime(r, profile.maxPrepMinutes)
  ).length;
  return {
    season,
    breakfast: filter("breakfast"),
    lunch: filter("lunch"),
    dinner: filter("dinner"),
    dessert: filter("dessert"),
    snack: filter("snack"),
  };
}

// Cible "0 récurrence sur 3 mois" : 13 semaines × 7 jours = 91 plats distincts
// par catégorie (lunch / dinner). Tant que le pool est en-dessous, l'algo
// rouvrira progressivement les recettes plus anciennes (cf. `pickFromPool`).
const ROTATION_TARGET_3M = 91;

function PoolDiagnostic({profile, currentWeek}) {
  const pool = useMemo(() => computePoolSizes(profile, currentWeek), [profile, currentWeek]);
  const low = Math.min(pool.lunch, pool.dinner) < 7;
  const tightRotation = !low && (pool.lunch < ROTATION_TARGET_3M || pool.dinner < ROTATION_TARGET_3M);
  const tone = low ? "bg-amber-50 border-amber-300" : tightRotation ? "bg-sky-50 border-sky-200" : "bg-slate-50 border-slate-200";
  return (
    <div className={`rounded-lg p-3 text-sm border ${tone}`}>
      <div className="flex flex-wrap items-center gap-3">
        <span className="font-medium text-slate-700">🎯 Recettes éligibles ({SEASON_FR[pool.season]}) :</span>
        <PoolBadge label="Petits-déjeuners" n={pool.breakfast} min={3} />
        <PoolBadge label="Déjeuners" n={pool.lunch} min={7} />
        <PoolBadge label="Dîners" n={pool.dinner} min={7} />
        <PoolBadge label="Desserts" n={pool.dessert} min={5} />
        {profile.snackEnabled && <PoolBadge label="Goûters" n={pool.snack} min={4} />}
      </div>
      {low && (
        <p className="mt-2 text-amber-800 text-xs">
          ⚠️ Votre pool est inférieur à 7 recettes pour au moins un type de repas : des recettes se répéteront dans la semaine.
          Pour élargir le choix : retirez des allergies ou exclusions, ajoutez de l'équipement, ou augmentez le temps max de préparation dans <strong>Paramètres</strong>.
        </p>
      )}
      {tightRotation && (
        <p className="mt-2 text-sky-800 text-xs">
          ℹ️ Pour ne jamais répéter une recette pendant 3 mois, la cible est <strong>{ROTATION_TARGET_3M} déjeuners et {ROTATION_TARGET_3M} dîners</strong> éligibles ; vous en avez {pool.lunch} et {pool.dinner}.
          L'algorithme priorise les recettes les plus anciennes lorsqu'il doit en réutiliser une.
        </p>
      )}
    </div>
  );
}
function PoolBadge({label, n, min}) {
  const ok = n >= min;
  return (
    <span className={`px-2 py-0.5 rounded text-xs ${ok ? "bg-emerald-100 text-emerald-800" : "bg-red-100 text-red-800"}`}>
      {label} : <strong>{n}</strong>{!ok && ` (min ${min} conseillé)`}
    </span>
  );
}

// ----- Settings View -------------------------------------------------------
function SettingsView({state, update, updateProfile}) {
  const p = state.profile;
  // pendingImport : null tant qu'aucun fichier n'a été choisi pour import,
  // sinon { payload, fileName }. Utilisé pour afficher le modal de
  // confirmation in-app (Safari iOS bloque silencieusement confirm/alert
  // appelés après un FileReader async).
  const [pendingImport, setPendingImport] = useState(null);
  // importStatus : { type: "info" | "error", msg } affiché dans le panneau
  // Sauvegarde. Remplace les alert() natifs (mêmes blocages iOS).
  const [importStatus, setImportStatus] = useState(null);
  const addMember = () => {
    const newId = (p.members.at(-1)?.id || 0) + 1;
    updateProfile({members: [...p.members, {id:newId, name:`Membre ${p.members.length+1}`, age:30, sex:"F"}]});
  };
  const updateMember = (id, patch) => updateProfile({members: p.members.map(m => m.id === id ? {...m, ...patch} : m)});
  const removeMember = (id) => { if (p.members.length > 1) updateProfile({members: p.members.filter(m => m.id !== id)}); };

  const resetAll = () => {
    if (confirm("Effacer toutes les données (profil, menus, notes) ?")) {
      localStorage.removeItem(STORAGE_KEY_V1);
      localStorage.removeItem(STORAGE_KEY_V2);
      window.location.reload();
    }
  };

  // ----- Export / Import (sync manuelle entre appareils) -----
  // Sérialise tout le bloc V2 du localStorage dans un JSON téléchargeable, et
  // permet de le restaurer sur un autre appareil. Format auto-portant : on
  // inclut un schema ("menu-ig-bas-export") + version d'app pour validation.
  const exportData = () => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY_V2);
      if (!raw) { alert("Aucune donnée à exporter pour l'instant."); return; }
      const appVersion = (document.title.match(/V(\d+\.\d+\.\d+)/)?.[1]) || "?";
      const payload = {
        schema: "menu-ig-bas-export",
        schemaVersion: 1,
        exportedAt: new Date().toISOString(),
        appVersion,
        data: JSON.parse(raw),
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const dateStr = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `menu-ig-bas-export-${dateStr}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e) {
      console.error("[export] échec :", e);
      alert("Échec de l'export. Voir la console pour le détail.");
    }
  };

  const onImportFile = async (e) => {
    const input = e.target;
    const file = input.files?.[0];
    if (!file) {
      console.log("[import] aucun fichier sélectionné");
      return;
    }
    console.log("[import] fichier sélectionné:", file.name, "taille:", file.size);
    setImportStatus({type: "info", msg: `Lecture du fichier « ${file.name} » (${Math.round(file.size/1024)} Ko)…`});
    try {
      // file.text() (Promise-based) au lieu de FileReader.readAsText() : sur
      // iOS Safari, FileReader sur un fichier de l'app Files / iCloud peut
      // rester pendu sans jamais déclencher onload ni onerror. file.text()
      // n'a pas ce souci (supporté depuis iOS Safari 13.5).
      let text;
      if (typeof file.text === "function") {
        text = await file.text();
      } else {
        // Fallback FileReader pour très vieux browsers.
        text = await new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = () => resolve(r.result);
          r.onerror = () => reject(r.error || new Error("FileReader error"));
          r.readAsText(file);
        });
      }
      console.log("[import] lecture terminée, longueur texte:", text?.length);
      // Strip BOM UTF-8 si présent (parfois ajouté par Windows / certains éditeurs).
      if (typeof text === "string" && text.charCodeAt(0) === 0xFEFF) {
        text = text.slice(1);
        console.log("[import] BOM UTF-8 retiré");
      }
      const payload = JSON.parse(text);
      console.log("[import] JSON parsé, schema:", payload?.schema, "appVersion:", payload?.appVersion);
      if (payload?.schema !== "menu-ig-bas-export" || !payload.data || payload.data.schema !== 2) {
        setImportStatus({type: "error", msg: "Ce fichier n'est pas un export Menu IG Bas (V2). Schema détecté : " + (payload?.schema || "absent")});
        return;
      }
      setImportStatus(null);
      setPendingImport({payload, fileName: file.name});
    } catch (err) {
      console.error("[import] échec:", err);
      setImportStatus({type: "error", msg: `Lecture impossible : ${err.message || err}`});
    } finally {
      if (input) input.value = ""; // permet de re-sélectionner le même fichier
    }
  };
  const confirmImport = () => {
    try {
      localStorage.setItem(STORAGE_KEY_V2, JSON.stringify(pendingImport.payload.data));
      window.location.reload();
    } catch (err) {
      console.error("[import-apply] échec :", err);
      setImportStatus({type: "error", msg: `Échec de l'écriture : ${err.message || err}`});
      setPendingImport(null);
    }
  };
  const cancelImport = () => setPendingImport(null);

  return (
    <div className="space-y-4 max-w-3xl">
      <h2 className="text-xl font-bold">⚙️ Paramètres</h2>

      <div className="bg-white rounded-lg shadow p-5">
        <h3 className="font-bold text-slate-800 mb-3">Famille</h3>
        {p.members.map(m => (
          <div key={m.id} className="flex flex-wrap gap-2 items-end bg-slate-50 p-3 rounded mb-2">
            <input value={m.name} onChange={e=>updateMember(m.id,{name:e.target.value})} className="border rounded px-2 py-1 flex-1 min-w-[140px]" />
            <input type="number" value={m.age} onChange={e=>updateMember(m.id,{age:parseInt(e.target.value)||0})} className="border rounded px-2 py-1 w-20" />
            <select value={m.sex} onChange={e=>updateMember(m.id,{sex:e.target.value})} className="border rounded px-2 py-1">
              <option value="F">F</option><option value="M">M</option><option value="X">Autre</option>
            </select>
            {p.members.length > 1 && <button onClick={()=>removeMember(m.id)} className="text-red-500 text-sm">Retirer</button>}
          </div>
        ))}
        <button onClick={addMember} className="text-emerald-700 text-sm font-medium">+ Ajouter un membre</button>
        <div className="mt-3">
          <label className="text-xs text-slate-500 block">Localisation</label>
          <input value={p.location} onChange={e=>updateProfile({location:e.target.value})}
            placeholder="Ex. Lyon, France" className="border rounded px-3 py-2 w-full" />
        </div>
      </div>

      <div className="bg-white rounded-lg shadow p-5">
        <h3 className="font-bold text-red-800 mb-3">⚠️ Allergies et intolérances</h3>
        <div className="flex flex-wrap gap-2">
          {dataRef.allergens().map(({id: k, label: v}) => (
            <label key={k} className={`flex items-center gap-2 px-3 py-2 rounded border cursor-pointer ${
              p.globalAllergies.includes(k) ? "bg-red-100 border-red-400 text-red-800" : "bg-white border-slate-200"
            }`}>
              <input type="checkbox" checked={p.globalAllergies.includes(k)}
                onChange={e => updateProfile({
                  globalAllergies: e.target.checked ? [...p.globalAllergies, k] : p.globalAllergies.filter(x=>x!==k)
                })} />
              {v}
            </label>
          ))}
        </div>
      </div>

      <div className="bg-white rounded-lg shadow p-5">
        <h3 className="font-bold text-amber-800 mb-3">Exclusions préférentielles</h3>
        <ExclusionsTextarea value={p.globalExclusions} onChange={(arr) => updateProfile({globalExclusions: arr})} />
      </div>

      <div className="bg-white rounded-lg shadow p-5 space-y-3">

            </div>
            <div className="flex gap-2 justify-end">
              <button onClick={cancelImport} className="px-4 py-2 text-slate-700 hover:bg-slate-100 rounded">
                Annuler
              </button>
              <button onClick={confirmImport} className="px-4 py-2 bg-sky-600 hover:bg-sky-700 text-white rounded font-medium">
                Confirmer l'import
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ----- Print: Menu A4 paysage -----------------------------------------------
function PrintMenuPage({weekStart, menu, profile}) {
  const mult = totalEquivalents(profile);
  // Construit les lignes à imprimer selon la config (goûter, placement dessert)
  const rows = [];
  rows.push({key:"breakfast", label:"Petit-déjeuner", icon:"☀️"});
  rows.push({key:"lunch", label:"Déjeuner", icon:"🥗"});
  if ((profile.dessertTime || "dinner") === "lunch") {
    rows.push({key:"dessert", label:"Dessert", icon:"🍰"});
  }
  if (profile.snackEnabled) {
    rows.push({key:"snack", label:"Goûter", icon:"🍪"});
  }
  rows.push({key:"dinner", label:"Dîner", icon:"🌙"});
  if ((profile.dessertTime || "dinner") === "dinner") {
    rows.push({key:"dessert", label:"Dessert", icon:"🍰"});
  }
  return (
    <div className="p-6 text-[10pt] font-sans">
      <style>{`
        @page { size: A4 landscape; margin: 1cm; }
        body { background: white !important; }
      `}</style>
      <div className="flex justify-between items-end mb-3 border-b-2 border-emerald-700 pb-2">
        <div>
          <h1 className="text-xl font-bold text-emerald-800">🌿 Menu IG Bas — Semaine du {formatShort(weekStart)} au {formatShort(addDays(weekStart,6))}</h1>
          <p className="text-xs text-slate-600">{profile.members.length} pers. (≈ {mult.toFixed(1)} adultes équivalents) · {SEASON_FR[getSeason(weekStart)]}</p>
        </div>
        <div className="text-xs text-slate-500">Imprimé le {new Date().toLocaleDateString("fr-FR")}</div>
      </div>
      <table className="w-full border-collapse">
        <thead>
          <tr className="bg-emerald-700 text-white">
            <th className="border border-emerald-800 p-1 w-[90px]"></th>
            {DAYS.map((d,i) => (
              <th key={d} className="border border-emerald-800 p-1">
                <div className="capitalize">{d}</div>
                <div className="text-[8pt] font-normal opacity-80">{formatShort(addDays(weekStart,i))}</div>
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.map(m => (
            <tr key={m.key}>
              <td className={`border border-slate-300 p-1 font-bold ${m.key === "dessert" ? "bg-rose-50 text-rose-800" : m.key === "snack" ? "bg-amber-50" : "bg-slate-100"}`}>{m.icon} {m.label}</td>
              {DAYS.map(d => {
                const slot = menu[d] || {};
                const r = RECIPES.find(x => x.id === slot[m.key]);
                return (
                  <td key={d} className={`border border-slate-300 p-1 align-top ${m.key === "dessert" ? "bg-rose-50/30" : ""}`}>
                    {r ? (
                      <>
                        <div className="font-medium">
                          {r.name}
                          {recipeAdvanceInfo(r) && (
                            <span className="ml-1 text-amber-700" title={`À préparer ${recipeAdvanceInfo(r).label}`}>
                              {recipeAdvanceInfo(r).icon}
                            </span>
                          )}
                        </div>
                        <div className="text-[8pt] text-slate-500">
                          ⏱{recipeActiveMinutes(r)}min
                          {recipeRestMinutes(r) > 0 && ` +${recipeRestMinutes(r)>=60?Math.round(recipeRestMinutes(r)/60*10)/10+'h':recipeRestMinutes(r)+'min'} repos`}
                          {' · '}{r.kcal}kcal
                          {recipeAdvanceInfo(r) && (
                            <span className="text-amber-700 font-bold"> · {recipeAdvanceInfo(r).shortLabel} avance</span>
                          )}
                        </div>
                      </>
                    ) : <span className="text-slate-400 italic">—</span>}
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
      <p className="text-[8pt] text-slate-500 mt-3 text-center">Menu IG Bas V2.4.3 · prototype</p>
    </div>
  );
}

// ----- Print: Shopping list ------------------------------------------------
// On exclut les articles déjà cochés (« j'ai dans le placard ») de l'impression.
function PrintShoppingPage({weekStart, menu, profile, pantryChecks}) {
  const byCatRaw = aggregateShoppingList(menu, profile);
  let skipped = 0;
  const byCat = {};
  Object.entries(byCatRaw).forEach(([cat, list]) => {
    const filtered = list.filter(it => {
      const k = `${it.name}|${it.unit}`;
      if (pantryChecks[k]) { skipped++; return false; }
      return true;
    });
    if (filtered.length) byCat[cat] = filtered;
  });
  return (
    <div className="p-6 text-[10pt]">
      <style>{`
        @page { size: A4 portrait; margin: 1.2cm; }
        body { background: white !important; }
      `}</style>
      <div className="border-b-2 border-amber-600 pb-2 mb-3">
        <h1 className="text-xl font-bold text-amber-800">🛒 Liste de courses — Semaine du {formatShort(weekStart)}</h1>
        <p className="text-xs text-slate-600">
          {profile.members.length} personne(s) · Imprimé le {new Date().toLocaleDateString("fr-FR")}
          {skipped > 0 && <span className="ml-2 text-emerald-700">· {skipped} article(s) déjà coché(s) exclu(s)</span>}
        </p>
      </div>
      <div className="columns-2 gap-6">
        {Object.entries(byCat).map(([cat, list]) => (
          <div key={cat} className="mb-4 break-inside-avoid">
            <h2 className="font-bold text-slate-800 border-b border-slate-400 mb-1">{dataRef.categoryLabel(cat)}</h2>
            <ul className="text-[9.5pt]">
              {list.map((it,i) => (
                <li key={i} className="flex items-baseline gap-2 py-0.5">
                  <span className="inline-block border border-slate-400 w-3 h-3 flex-shrink-0"></span>
                  <span className="flex-1">{it.name}</span>
                  <span className="font-mono text-slate-700 text-[9pt]">{formatQtyShopping(it.qty, it.unit, it.name, it.category)}</span>
                </li>
              ))}
            </ul>
          </div>
        ))}
      </div>
    </div>
  );
}

// ============================================================================
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
